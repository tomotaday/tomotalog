// ひらがな⇔カタカナを吸収した検索用の正規化（カタカナ→ひらがなに統一して比較）
function kanaToHira(s) {
  return String(s).replace(/[\u30a1-\u30f6]/g, (ch) => String.fromCharCode(ch.charCodeAt(0) - 0x60));
}
function normKana(s) { return kanaToHira(String(s||"")).toLowerCase(); }
function kanaIncludes(text, query) {
  if (!query) return true;
  return normKana(text).includes(normKana(query));
}

function loadLS(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function saveLS(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

// テキストハイライト（検索ヒット部分に印をつける）
function highlightText(text, query) {
  if (!query || !text) return text;
  const s = String(text);
  const idx = s.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return s;
  return [
    s.slice(0, idx),
    <mark key="hl" style={{ background: C.accentLight, color: C.accentDeep, borderRadius: 3, padding: "0 1px", fontWeight: 700 }}>
      {s.slice(idx, idx + query.length)}
    </mark>,
    s.slice(idx + query.length),
  ];
}

// ══════════════════════════════════════════════════════════════
// IndexedDB（画像・内部バックアップスナップショット保存）
// ══════════════════════════════════════════════════════════════
function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open("tomotalog2db", 1);
    req.onupgradeneeded = () => { req.result.createObjectStore("kv", { keyPath: "id" }); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbSet(id, value) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction("kv", "readwrite");
    tx.objectStore("kv").put({ id, value, updatedAt: Date.now() });
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}
async function idbGet(id) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction("kv", "readonly");
    const r = tx.objectStore("kv").get(id);
    r.onsuccess = () => resolve(r.result ? r.result.value : null);
    r.onerror = () => reject(r.error);
  });
}
async function idbDelete(id) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction("kv", "readwrite");
    tx.objectStore("kv").delete(id);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 4000);
}

// JSZipはCDNから遅延読み込み（未接続時はJSON単体ファイルにフォールバック）
let _jszipPromise = null;
function loadJSZip() {
  if (window.JSZip) return Promise.resolve(window.JSZip);
  if (_jszipPromise) return _jszipPromise;
  _jszipPromise = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
    s.onload = () => resolve(window.JSZip);
    s.onerror = () => reject(new Error("JSZip読み込み失敗"));
    document.head.appendChild(s);
  });
  return _jszipPromise;
}

// 場所マスター ヘルパー（分類 → ブランド → 場所（任意）／将来のJSON連携・名称履歴に備えた拡張しやすい構造）
// ══════════════════════════════════════════════════════════════
// Place = {
//   id, category, brand, place(任意・第三階層), status:"active"|"inactive",
//   placeId(将来GoogleマップJSON用), lat, lng, address(将来用・今は保持しない方針だが器のみ),
//   memo, roles[](自宅・実家・職場など複数可、将来UI化), 
//   brandNameHistory[]（{name, validFrom, validTo}将来のブランド名称変更履歴用の器）,
//   registeredAt, lastUsedAt,
// }
function makePlace({ category, brand, place, status="active" }) {
  const now = Date.now();
  return {
    id: uid("pl"), category, brand, place: place || null, status,
    placeId: null, lat: null, lng: null, address: null, memo: "",
    roles: [], brandNameHistory: [{ name: brand, validFrom: nowISO(), validTo: null }],
    registeredAt: nowISO(), lastUsedAt: now,
  };
}
function placeLabel(placeId, places) {
  const p = places.find(x => x.id === placeId);
  if (!p) return "場所未設定";
  return p.place ? `${p.brand}・${p.place}` : p.brand;
}
function placeFullLabel(place) {
  if (!place) return "";
  return [place.category, place.brand, place.place].filter(Boolean).join(" / ");
}
function sortByRecentUse(list) {
  return list.slice().sort((a,b) => (b.lastUsedAt||0) - (a.lastUsedAt||0));
}

// ══════════════════════════════════════════════════════════════
// 写真設計：将来レシート写真／商品写真／生活写真／Googleタイムライン画像など
// 種類が増えることを見込み、「代表画像を選ぶルール」と「一覧を集めるルール」を
// ここに集約する。表示側（CalendarView・DayDetailOverlayなど）はこの関数だけを呼び、
// 優先順位や対象種別が変わってもここだけ直せばよい構造にしている。
// ══════════════════════════════════════════════════════════════
function pickRepresentativeImage(receipt, receiptItems) {
  // 優先順位：①レシート写真 ②商品に添付された写真（将来：生活写真・タイムライン画像もここに追加）
  if (receipt?.images?.length) return receipt.images[0];
  const withPhoto = (receiptItems||[]).find(it => (it.attachments||[]).length);
  if (withPhoto) return withPhoto.attachments[0];
  return null;
}
function collectDayPhotoRefs(dayItemsByReceipt, receipts) {
  // { id, kind } の配列を返す。kindは将来 "life" "timeline" 等を追加する際の目印。
  const refs = [];
  dayItemsByReceipt.forEach(([receiptId, list]) => {
    const receipt = receipts.find(r => r.id === receiptId);
    (receipt?.images||[]).forEach(id => refs.push({ id, kind:"receipt" }));
    list.forEach(it => (it.attachments||[]).forEach(id => refs.push({ id, kind:"item" })));
  });
  return refs;
}

// ══════════════════════════════════════════════════════════════
// 写真ビューア（生活写真・レシート写真で共通利用。全画面・左右スワイプ・タップで閉じる）
// ══════════════════════════════════════════════════════════════
function PhotoViewerOverlay({ imgIds, startIndex, onClose }) {
  const [index, setIndex] = useState(startIndex || 0);
  const [src, setSrc] = useState(null);
  const touchX = useRef(null);

  useEffect(() => {
    let alive = true;
    setSrc(null);
    idbGet(imgIds[index]).then(v => { if (alive) setSrc(v); }).catch(()=>{});
    return () => { alive = false; };
  }, [index, imgIds]);

  const go = (delta) => setIndex(i => Math.max(0, Math.min(imgIds.length-1, i+delta)));

  const onTouchStart = (e) => { touchX.current = e.touches[0].clientX; };
  const onTouchEnd = (e) => {
    if (touchX.current == null) return;
    const dx = e.changedTouches[0].clientX - touchX.current;
    if (Math.abs(dx) > 50) go(dx > 0 ? -1 : 1);
    touchX.current = null;
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(10,8,6,0.94)", zIndex:600, display:"flex", flexDirection:"column" }}
      onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"14px 16px" }}>
        <span style={{ color:"rgba(255,255,255,0.7)", fontSize:12.5, fontWeight:700 }}>{index+1} / {imgIds.length}</span>
        <button onClick={onClose} style={{ background:"rgba(255,255,255,0.14)", border:"none", color:"#fff", borderRadius:99, width:34, height:34, fontSize:18, cursor:"pointer" }}>×</button>
      </div>
      <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden" }}>
        {src ? <img src={src} style={{ maxWidth:"100%", maxHeight:"100%", objectFit:"contain" }} /> : <span style={{ color:"rgba(255,255,255,0.5)", fontSize:13 }}>読み込み中…</span>}
      </div>
      {imgIds.length > 1 && (
        <div style={{ display:"flex", justifyContent:"space-between", padding:"10px 22px 26px" }}>
          <button onClick={()=>go(-1)} disabled={index===0} style={{ background:"rgba(255,255,255,0.14)", border:"none", color:"#fff", borderRadius:99, padding:"9px 18px", fontSize:14, cursor:"pointer", opacity:index===0?0.35:1 }}>‹ 前</button>
          <button onClick={()=>go(1)} disabled={index===imgIds.length-1} style={{ background:"rgba(255,255,255,0.14)", border:"none", color:"#fff", borderRadius:99, padding:"9px 18px", fontSize:14, cursor:"pointer", opacity:index===imgIds.length-1?0.35:1 }}>次 ›</button>
        </div>
      )}
    </div>
  );
}

          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <img src={APP_ICON} alt="" style={{ width:22, height:22, borderRadius:6 }} />
            <span style={{ fontSize:14.5, fontWeight:800, color:C.textPrimary }}>メニュー</span>
          </div>
          <button onClick={onClose} style={{ background:"none", border:"none", fontSize:20, color:C.textFaint, cursor:"pointer", padding:6 }}>×</button>
        </div>
        {warnCount > 0 && (
          <div style={{ margin:"6px 0 14px", padding:"8px 12px", borderRadius:12, background:C.warnBg, color:C.warnText, fontSize:12, fontWeight:700 }}>🌱 要確認 {warnCount}件</div>
        )}

        {MENU_SECTIONS.map(section => (
          <div key={section.label} style={{ marginBottom:18 }}>
            <div style={{ fontSize:11, fontWeight:800, color:C.textFaint, letterSpacing:0.06, margin:"0 4px 6px" }}>【{section.label}】</div>
            {section.items.map(item => (
              <button key={item.key} disabled={item.future} onClick={() => onNavigate(item)} style={{
                width:"100%", display:"flex", alignItems:"center", gap:10, padding:"11px 12px", marginBottom:3,
                borderRadius:13, border:"none", background:"transparent", cursor: item.future ? "default" : "pointer",
                textAlign:"left", opacity: item.future ? 0.42 : 1,
              }}>
                <span style={{ fontSize:16 }}>{item.icon}</span>
                <span style={{ fontSize:13.5, fontWeight:600, color:C.textPrimary, flex:1 }}>{item.label}</span>
                {item.future ? <span style={{ fontSize:10, color:C.textFaint, fontWeight:700 }}>準備中</span> : <span style={{ fontSize:14, color:C.textFaint }}>›</span>}
              </button>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

function SubHeader({ title, onBack, right }) {
  return (
    <div style={{ position:"sticky", top:0, zIndex:60, background:C.card, borderBottom:`1px solid ${C.border}`, padding:"10px 12px", display:"flex", alignItems:"center", gap:10 }}>
      <button onClick={onBack} style={{ background:C.accentLight, color:C.accentDeep, border:"none", borderRadius:10, padding:"8px 12px", fontSize:13.5, fontWeight:700, cursor:"pointer", flexShrink:0 }}>‹ 戻る</button>
      <span style={{ fontSize:15, fontWeight:700, color:C.textPrimary, flex:1 }}>{title}</span>
      {right}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// カレンダー画面（商品レコードを購入日で集計）
// ══════════════════════════════════════════════════════════════
function CalendarView({ items, receipts, places, onSelectDate }) {
  const [year, setYear] = useState(() => Number(todayStr().slice(0,4)));
  const [month, setMonth] = useState(() => Number(todayStr().slice(5,7)));

  const dailyHas = useMemo(() => {
    const set = new Set();
    items.forEach((it) => { if (it.purchaseDate) set.add(it.purchaseDate); });
    return set;
  }, [items]);

  const monthTotal = useMemo(() => {
    const prefix = `${year}-${pad2(month)}`;
    return items.filter(it => (it.purchaseDate||"").startsWith(prefix)).reduce((a,it) => a+Number(it.amount||0), 0);
  }, [items, year, month]);

  const goPrev = () => { if (month === 1) { setMonth(12); setYear(y=>y-1); } else setMonth(m=>m-1); };
  const goNext = () => { if (month === 12) { setMonth(1); setYear(y=>y+1); } else setMonth(m=>m+1); };
  const goToday = () => { const t=todayStr(); setYear(Number(t.slice(0,4))); setMonth(Number(t.slice(5,7))); };

  const days = daysInMonth(year, month);
  const firstDow = firstDayOfWeek(year, month);
  const prevMonth = month === 1 ? 12 : month - 1;
  const prevYear  = month === 1 ? year - 1 : year;
  const prevDays  = daysInMonth(prevYear, prevMonth);
  const todayS = todayStr();
  const WEEKS = ["日","月","火","水","木","金","土"];

  const cells = [];
  for (let i=0;i<firstDow;i++) cells.push({ day: prevDays-firstDow+1+i, type:"prev" });
  for (let d=1;d<=days;d++) cells.push({ day:d, type:"cur" });
  const rem = cells.length % 7;
  if (rem !== 0) { const fill = 7-rem; for (let d=1; d<=fill; d++) cells.push({ day:d, type:"next" }); }

  // 最近のくらし：直近のレシート（来店）を新しい順に最大3件
  const itemsByReceipt = useMemo(() => {
    const map = {};
    items.forEach(it => { (map[it.receiptId] = map[it.receiptId] || []).push(it); });
    return map;
  }, [items]);
  const recentReceipts = useMemo(() => {
    return [...receipts]
      .filter(r => (itemsByReceipt[r.id]||[]).length > 0)
      .sort((a,b) => `${b.date||""}${b.time||""}`.localeCompare(`${a.date||""}${a.time||""}`))
      .slice(0, 3);
  }, [receipts, itemsByReceipt]);

  return (
    <div style={{ padding:"14px 16px 130px" }}>
      <div style={UI.cardFloat({ padding:"18px 16px 14px" })}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
          <button onClick={goPrev} style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:10, padding:"6px 13px", fontSize:13.5, color:C.textSecondary, fontWeight:500, cursor:"pointer" }}>‹ 前月</button>
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center" }}>
            <span style={{ fontSize:17, fontWeight:800, color:C.textPrimary }}>{year}年 {month}月</span>
            <span style={{ fontSize:11, fontWeight:600, color:C.textFaint, marginTop:2 }}>{fmtFull(monthTotal)}</span>
          </div>
          <button onClick={goToday} style={{ background:C.accentDeep, color:"#fff", border:"none", borderRadius:10, padding:"7px 14px", fontSize:12.5, fontWeight:700, cursor:"pointer", boxShadow:`0 3px 8px ${C.shadowDeep}` }}>今月</button>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", marginBottom:2 }}>
          {WEEKS.map((w,i) => (
            <div key={w} style={{ textAlign:"center", fontSize:11.5, fontWeight:700, padding:"3px 0", color: i===0 ? C.sun : i===6 ? C.accentMidText : C.textFaint }}>{w}</div>
          ))}
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,minmax(0,1fr))", gap:4 }}>
          {cells.map((c,i) => {
            if (c.type !== "cur") {
              return (
                <div key={c.type+i} onClick={c.type==="prev"?goPrev:goNext} style={{ height:46, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer" }}>
                  <span style={{ fontSize:13, color:C.textFaint, opacity:0.4 }}>{c.day}</span>
                </div>
              );
            }
            const dStr = `${year}-${pad2(month)}-${pad2(c.day)}`;
            const has = dailyHas.has(dStr);
            const isToday = dStr === todayS;
            const dow = (firstDow + c.day - 1) % 7;
            return (
              <div key={c.day} onClick={() => onSelectDate(dStr)} style={{
                height:46, borderRadius:12, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                gap:3, cursor:"pointer",
                background: isToday ? C.accentDeep : "transparent",
                boxShadow: isToday ? `0 4px 12px ${C.shadowDeep}` : "none",
              }}>
                <span style={{ fontSize:14.5, fontWeight: isToday?800:500, lineHeight:1, color: isToday?"#fff" : dow===0?C.sun : dow===6?C.accentMidText : C.textPrimary }}>{c.day}</span>
                <span style={{ width:5, height:5, borderRadius:99, background: isToday ? "rgba(255,255,255,0.85)" : has ? C.accentMid : "transparent" }} />
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ margin:"26px 4px 14px", display:"flex", alignItems:"center", gap:8 }}>
        <span style={{ fontSize:13, fontWeight:800, color:C.textSecondary }}>最近のくらし</span>
        <span style={{ flex:1, height:1, background:C.border }} />
      </div>

      {recentReceipts.length === 0 && (
        <div style={{ textAlign:"center", color:C.textFaint, fontSize:13, padding:"24px 0" }}>まだ記録がありません。＋から記録してみましょう</div>
      )}

      <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
        {recentReceipts.map((r, idx) => {
          const list = itemsByReceipt[r.id] || [];
          const names = list.map(it => it.name).filter(Boolean);
          const caption = names.length ? (names.slice(0,2).join("、") + (names.length>2 ? "など" : "")) : "記録があります";
          const placeText = r.placeId ? placeLabel(r.placeId, places) : "場所未設定";
          return (
            <div key={r.id} style={{ position:"relative" }}>
              {idx === 0 && (
                <svg style={{ position:"absolute", top:-13, left:20, width:26, height:40, zIndex:2, filter:"drop-shadow(0 3px 5px rgba(0,0,0,0.18))" }} viewBox="0 0 34 52" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M17 2C9.8 2 4 7.8 4 15v22a13 13 0 0026 0V17a1 1 0 00-2 0v20a11 11 0 01-22 0V15a11 11 0 0122 0v18a1 1 0 002 0V15C30 7.8 24.2 2 17 2z" fill={C.sakuraText}/>
                  <circle cx="17" cy="15" r="3.2" fill={C.accentDeep}/>
                </svg>
              )}
              <div onClick={() => onSelectDate(r.date)} style={UI.cardFloat({ overflow:"hidden", cursor:"pointer", display:"flex", height:92 })}>
                <div style={{ width:88, flexShrink:0, height:92 }}>
                  {pickRepresentativeImage(r, list)
                    ? <AsyncImage id={pickRepresentativeImage(r, list)} style={{ width:"100%", height:"100%" }} />
                    : <div style={{ width:"100%", height:"100%", background:`linear-gradient(135deg, ${C.accentLight}, ${C.sakuraBg})` }} />}
                </div>
                <div style={{ flex:1, minWidth:0, padding:"12px 14px", display:"flex", flexDirection:"column", justifyContent:"space-between" }}>
                  <div style={{ minWidth:0 }}>
                    <span style={{ fontSize:12, fontWeight:800, color:C.accentDeep }}>{fmtDateShort(r.date)}{r.time ? `　${r.time}` : ""}</span>
                    <div style={{ fontSize:13.5, fontWeight:700, color:C.textPrimary, marginTop:3, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{placeText}</div>
                    <div style={{ fontSize:12, color:C.textSecondary, marginTop:2, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{caption}</div>
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <span style={{ fontSize:11.5, fontWeight:700, color:C.accentDeep }}>詳しく見る ›</span>
                  </div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// 日付詳細オーバーレイ（レシートグループ単位で表示、タップで商品編集へ）
// ══════════════════════════════════════════════════════════════
function DayDetailOverlay({ date, items, receipts, places, dayNote, onSaveDayNote, onClose, onOpenItem, justEditedId, onQuickAdd, onChangeDate }) {
  const dayItems = useMemo(() => items.filter(it => it.purchaseDate === date), [items, date]);
  const total = dayItems.reduce((a,it) => a+Number(it.amount||0), 0);
  const byReceiptList = useMemo(() => {
    const map = {};
    dayItems.forEach(it => { (map[it.receiptId] = map[it.receiptId] || []).push(it); });
    Object.values(map).forEach(arr => arr.sort((a,b)=>(a.seq||0)-(b.seq||0)));
    return Object.entries(map).sort(([ra],[rb]) => {
      const ta = receipts.find(r=>r.id===ra)?.time || "99:99";
      const tb = receipts.find(r=>r.id===rb)?.time || "99:99";
      return ta.localeCompare(tb);
    });
  }, [dayItems, receipts]);
  const [y,m,d] = date.split("-");
  const dow = "日月火水木金土"[new Date(date+"T00:00:00").getDay()];

  // 日付レール：選択日を中心に前後3日
  const railDates = useMemo(() => {
    const base = new Date(date+"T00:00:00");
    const arr = [];
    for (let i=-3;i<=3;i++) { const dd=new Date(base); dd.setDate(dd.getDate()+i); arr.push(`${dd.getFullYear()}-${pad2(dd.getMonth()+1)}-${pad2(dd.getDate())}`); }
    return arr;
  }, [date]);

  // 写真：レシート写真＋商品添付写真をその日ぶんまとめる（将来の写真種別追加はcollectDayPhotoRefs側で対応）
  const dayPhotoRefs = useMemo(() => collectDayPhotoRefs(byReceiptList, receipts), [byReceiptList, receipts]);
  const dayPhotos = useMemo(() => dayPhotoRefs.map(r => r.id), [dayPhotoRefs]);
  const [viewerIndex, setViewerIndex] = useState(null);

  const [noteDraft, setNoteDraft] = useState(dayNote || "");
  useEffect(() => { setNoteDraft(dayNote || ""); }, [date]);
  const commitNote = () => { if (noteDraft !== (dayNote||"")) onSaveDayNote(date, noteDraft); };

  return (
    <div style={{ position:"fixed", inset:0, background:C.bg, zIndex:200, display:"flex", flexDirection:"column" }}>
      <SubHeader title={`${Number(y)}年${Number(m)}月${Number(d)}日（${dow}）`} onBack={() => { commitNote(); onClose(); }} />

      {/* 日付レール */}
      <div style={{ display:"flex", gap:8, padding:"10px 14px", overflowX:"auto", background:C.card, borderBottom:`1px solid ${C.border}` }}>
        {railDates.map(dStr => {
          const dd = Number(dStr.slice(8,10));
          const active = dStr === date;
          const hasRecord = items.some(it => it.purchaseDate === dStr);
          return (
            <div key={dStr} onClick={() => onChangeDate(dStr)} style={{
              flexShrink:0, width:44, height:54, borderRadius:14, display:"flex", flexDirection:"column",
              alignItems:"center", justifyContent:"center", gap:3, cursor:"pointer",
              background: active ? C.accentDeep : "transparent",
              border: active ? "none" : `1px solid ${C.border}`,
            }}>
              <span style={{ fontSize:14.5, fontWeight:800, color: active ? "#fff" : C.textPrimary }}>{dd}</span>
              <span style={{ width:4, height:4, borderRadius:99, background: active ? "rgba(255,255,255,0.85)" : hasRecord ? C.accentMid : "transparent" }} />
            </div>
          );
        })}
      </div>

      <div style={{ flex:1, overflowY:"auto", padding:"14px 14px 110px" }}>

        {/* 写真グリッド */}
        {dayPhotos.length > 0 && (
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:6, marginBottom:16 }}>
            {dayPhotos.map((imgId, i) => (
              <div key={imgId+i} onClick={() => setViewerIndex(i)} style={UI.thumbFrame({ aspectRatio:"1", cursor:"pointer" })}>
                <AsyncImage id={imgId} style={{ width:"100%", height:"100%" }} />
              </div>
            ))}
          </div>
        )}

        {/* 一口メモ */}
        <input value={noteDraft} onChange={e=>setNoteDraft(e.target.value)} onBlur={commitNote}
          placeholder="一口メモ（書きたい時だけ）"
          style={{ width:"100%", padding:"11px 14px", borderRadius:14, border:`1px solid ${C.border}`, background:C.card, fontSize:13.5, marginBottom:18, color:C.textPrimary }} />

        {dayItems.length === 0 && (
          <div style={{ textAlign:"center", color:C.textFaint, fontSize:13, padding:"30px 0" }}>この日の記録はまだありません</div>
        )}

        {byReceiptList.map(([receiptId, list]) => {
          const receipt = receipts.find(r => r.id === receiptId);
          const rTotal = list.reduce((a,it)=>a+Number(it.amount||0),0);
          return (
            <div key={receiptId} style={UI.receiptCard({ marginBottom:12 })}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"11px 14px 8px" }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, minWidth:0 }}>
                  {receipt?.images?.length > 0 && <AsyncImage id={receipt.images[0]} style={{ width:32, height:32, borderRadius:8, flexShrink:0 }} />}
                  <div style={{ minWidth:0 }}>
                    {receipt?.time && <div style={{ fontSize:15, fontWeight:800, color:C.accentDeep, lineHeight:1.2 }}>{receipt.time}</div>}
                    <span style={{ fontSize:13, fontWeight:700, color: receipt?.time ? C.textSecondary : C.textPrimary }}>{receipt?.placeId ? placeLabel(receipt.placeId, places) : "場所未設定"}</span>
                  </div>
                </div>
                <span style={{ fontSize:13, fontWeight:700, color:C.textSecondary, flexShrink:0, marginLeft:8 }}>{fmtFull(rTotal)}</span>
              </div>
              {list.map(it => (
                <div key={it.id} onClick={() => onOpenItem(it.id)} style={{
                  display:"flex", alignItems:"center", justifyContent:"space-between",
                  padding:"10px 14px", borderTop:`1px solid ${C.border}`, cursor:"pointer",
                  background: justEditedId===it.id ? C.accentLight : "transparent", transition:"background 0.9s ease",
                }}>
                  <div style={{ minWidth:0 }}>
                    <div style={{ fontSize:14, fontWeight:600, color:C.textPrimary, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{it.name || "（無題）"}</div>
                    <div style={{ display:"flex", gap:5, marginTop:3, flexWrap:"wrap" }}>
                      {it.tags?.includes("tag_needcheck") && <span style={{ fontSize:10.5, fontWeight:700, color:C.warnText, background:C.warnBg, borderRadius:99, padding:"1px 7px" }}>要確認</span>}
                    </div>
                  </div>
                  <span style={{ fontSize:14, fontWeight:700, color:C.textPrimary, flexShrink:0, marginLeft:10 }}>{fmtFull(it.amount)}</span>
                </div>
              ))}
            </div>
          );
        })}

        {dayItems.length > 0 && (
          <div style={{ textAlign:"right", marginTop:10, fontSize:12, color:C.textFaint }}>この日の合計　{fmtFull(total)}</div>
        )}
      </div>

      <button onClick={() => onQuickAdd(date)} style={UI.fab({
        position:"absolute", right:20, bottom:20,
        background:`linear-gradient(150deg, ${C.accentMid}, ${C.accentDeep})`, color:"#fff", fontSize:26,
      })}>＋</button>

      {viewerIndex !== null && (
        <PhotoViewerOverlay imgIds={dayPhotos} startIndex={viewerIndex} onClose={() => setViewerIndex(null)} />
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// 検索画面（単一検索窓 / ワード＋タグ内部統合 / 商品・レシート切替）
// ══════════════════════════════════════════════════════════════
function SearchView({ items, receipts, tags, places, query, setQuery, mode, setMode, onOpenItem, justEditedId }) {
  const scrollRef = useRef(null);
  const [summaryOpen, setSummaryOpen] = useState(true);

  const results = useMemo(() => {
    const q = query.trim();
    if (!q) return items.slice().sort((a,b) => (b.purchaseDate+String(b.purchaseTime||"")).localeCompare(a.purchaseDate+String(a.purchaseTime||""))).slice(0, 30);
    const ql = q.toLowerCase();
    const matchedTagIds = tags.filter(t => t.name.toLowerCase().includes(ql)).map(t => t.id);
    return items.filter((it) => {
      const placeText = it.placeId ? placeFullLabel(places.find(p=>p.id===it.placeId)) : "";
      const wordFields = [it.name, String(it.amount), placeText, it.purchaseDate, fmtDateShort(it.purchaseDate), it.memo];
      const wordHit = wordFields.some(f => f && String(f).toLowerCase().includes(ql));
      const tagHit = (it.tags||[]).some(tid => matchedTagIds.includes(tid));
      return wordHit || tagHit;
    }).sort((a,b) => (b.purchaseDate+String(b.purchaseTime||"")).localeCompare(a.purchaseDate+String(a.purchaseTime||"")));
  }, [items, tags, places, query]);

  const resultsTotal = useMemo(() => results.reduce((a,it)=>a+Number(it.amount||0),0), [results]);

  const groupedByReceipt = useMemo(() => {
    if (mode !== "receipt") return [];
    const map = {};
    results.forEach(it => { (map[it.receiptId] = map[it.receiptId] || []).push(it); });
    return Object.entries(map).map(([receiptId, list]) => {
      const receipt = receipts.find(r => r.id === receiptId);
      return { receiptId, receipt, list, total: list.reduce((a,it)=>a+Number(it.amount||0),0) };
    }).sort((a,b) => (b.receipt?.date||"").localeCompare(a.receipt?.date||""));
  }, [results, receipts, mode]);

  const tagName = (id) => tags.find(t => t.id === id)?.name;

  return (
    <div style={{ paddingBottom: 110 }}>
      <div style={{ padding:"10px 16px 0" }}>
        <input
          value={query} onChange={(e) => setQuery(e.target.value)}
          placeholder="商品名・金額・店名・タグなどで検索"
          style={{ width:"100%", padding:"12px 14px", borderRadius:12, border:`1px solid ${C.border}`, fontSize:15, background:C.card, outline:"none" }}
        />
        <div style={{ display:"flex", gap:8, marginTop:10 }}>
          {[["item","商品単位"],["receipt","レシート単位"]].map(([key,label]) => (
            <button key={key} onClick={() => setMode(key)} style={{
              padding:"7px 15px", borderRadius:99, fontSize:12.5, fontWeight:700, cursor:"pointer",
              border: mode===key ? "none" : `1px solid ${C.border}`,
              background: mode===key ? C.accentDeep : "#fff",
              color: mode===key ? "#fff" : C.textSecondary,
            }}>{label}</button>
          ))}
        </div>

        <div onClick={() => setSummaryOpen(o=>!o)} style={UI.cardFloat({ padding:"11px 14px", display:"flex", alignItems:"center", justifyContent:"space-between", cursor:"pointer", margin:"12px 0 6px" })}>
          <span style={{ fontSize:12.5, fontWeight:700, color:C.textSecondary }}>{summaryOpen ? "▼" : "▶"} 検索結果</span>
          <span style={{ fontSize:12.5, fontWeight:700, color:C.textSecondary }}>{results.length}件　｜　合計 {fmtFull(resultsTotal)}</span>
        </div>
      </div>

      {summaryOpen && (
      <div ref={scrollRef} style={{ padding:"6px 14px 4px" }}>
        {results.length === 0 && (
          <div style={{ textAlign:"center", color:C.textFaint, fontSize:13, padding:"40px 0" }}>
            {query ? "該当する記録がありません" : "キーワードやタグ名で検索できます"}
          </div>
        )}

        {mode === "item" && results.map((it) => (
          <div key={it.id} onClick={() => onOpenItem(it.id)} style={UI.cardFloat({
            padding:"12px 14px", marginBottom:8, cursor:"pointer", transition:"background 0.9s ease",
            background: justEditedId===it.id ? C.accentLight : C.card,
          })}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ fontSize:14.5, fontWeight:700, color:C.textPrimary }}>{highlightText(it.name || "（無題）", query)}</div>
              <div style={{ fontSize:14.5, fontWeight:700, color:C.textPrimary }}>{fmtFull(it.amount)}</div>
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:5 }}>
              <div style={{ fontSize:12, color:C.textSecondary }}>{fmtDateShort(it.purchaseDate)}{it.purchaseTime ? `　${it.purchaseTime}` : ""}　{highlightText(it.placeId ? placeLabel(it.placeId, places) : "", query)}</div>
              <div style={{ display:"flex", gap:4 }}>
                {(it.tags||[]).slice(0,3).map(tid => (
                  <span key={tid} style={{ fontSize:10.5, fontWeight:700, borderRadius:99, padding:"1px 8px",
                    background: query && tagName(tid)?.toLowerCase().includes(query.toLowerCase()) ? C.accentLight : "#F1F5F7",
                    color: query && tagName(tid)?.toLowerCase().includes(query.toLowerCase()) ? C.accentDeep : C.textSecondary }}>{tagName(tid)}</span>
                ))}
              </div>
            </div>
          </div>
        ))}

        {mode === "receipt" && groupedByReceipt.map(({ receiptId, receipt, list, total }) => (
          <div key={receiptId} style={UI.receiptCard({ padding:"12px 14px", marginBottom:8 })}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ fontSize:13.5, fontWeight:700, color:C.textPrimary }}>{fmtDateShort(receipt?.date)}{receipt?.time ? `　${receipt.time}` : ""}　{highlightText(receipt?.placeId ? placeLabel(receipt.placeId, places) : "", query)}</div>
              <div style={{ fontSize:13.5, fontWeight:700, color:C.textSecondary }}>{fmtFull(total)}</div>
            </div>
            {list.map(it => (
              <div key={it.id} onClick={() => onOpenItem(it.id)} style={{
                display:"flex", justifyContent:"space-between", padding:"7px 2px",
                background: justEditedId===it.id ? C.accentLight : "transparent", cursor:"pointer", transition:"background 0.9s ease", borderRadius:6,
              }}>
                <span style={{ fontSize:13, color:C.textPrimary }}>{highlightText(it.name||"（無題）", query)}</span>
                <span style={{ fontSize:13, color:C.textSecondary }}>{fmtFull(it.amount)}</span>
              </div>
            ))}
          </div>
        ))}
      </div>
      )}
    </div>
  );
}

  const [kind, setKind] = useState("tag");
  const nameRef = useRef();
  useEffect(() => { nameRef.current?.focus(); }, []);

  const save = () => { if (createTag(name, kind)) onClose(); };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(30,41,59,0.32)", zIndex:300, display:"flex", alignItems:"flex-end" }} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{ ...UI.sheetBottom({ width:"100%", maxWidth:430, margin:"0 auto", padding:"16px 18px 24px" }), animation:"tomotaSlideUpSheet 0.2s ease" }}>
        <div style={{ width:36, height:4, background:C.border, borderRadius:99, margin:"0 auto 14px" }} />
        <div style={{ fontSize:15, fontWeight:800, color:C.textPrimary, marginBottom:14 }}>タグを追加</div>
        <input ref={nameRef} value={name} onChange={e=>setName(e.target.value)} placeholder="タグ名"
          style={{ width:"100%", padding:"12px 14px", borderRadius:12, border:`1px solid ${C.border}`, fontSize:15, marginBottom:10, background:"#fff" }} />
        <div style={{ display:"flex", gap:8, marginBottom:16 }}>

            }}>{label}</button>
          ))}

          width:"100%", padding:"14px 0", borderRadius:12, border:"none", background:C.accentDeep,

}

function TagsView({ tags, setTags, items, setItems, showToast }) {
  const [newName, setNewName] = useState("");
  const [newKind, setNewKind] = useState("tag");
  const categories = tags.filter(t => t.kind === "category");
  const plainTags  = tags.filter(t => t.kind === "tag");

  const addTag = () => {
    const name = newName.trim();
    if (!name) return;
    if (tags.some(t => t.name === name)) { showToast("同名のタグが既にあります"); return; }
    setTags(prev => [...prev, { id: uid(newKind==="category"?"cat":"tag"), name, kind:newKind, isSystem:false }]);
    setNewName("");
    showToast("追加しました");
  };

  const removeTag = (tag) => {
    if (tag.isSystem) return;
    const usage = items.filter(it => (it.tags||[]).includes(tag.id)).length;
    if (usage > 0 && !window.confirm(`「${tag.name}」は${usage}件の記録で使用中です。削除すると各記録からも外れます。削除しますか？`)) return;
    setTags(prev => prev.filter(t => t.id !== tag.id));
    setItems(prev => prev.map(it => ({ ...it, tags:(it.tags||[]).filter(tid => tid!==tag.id) })));
    showToast("削除しました");
  };

  const renameTag = (tag) => {
    if (tag.isSystem) return;
    const name = window.prompt("新しいタグ名", tag.name);
    if (!name || !name.trim() || name.trim()===tag.name) return;
    if (tags.some(t => t.name===name.trim() && t.id!==tag.id)) { showToast("同名のタグが既にあります"); return; }
    setTags(prev => prev.map(t => t.id===tag.id ? { ...t, name:name.trim() } : t));
  };

  const Row = ({ tag }) => {
    const usage = items.filter(it => (it.tags||[]).includes(tag.id)).length;
    return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"11px 14px", background:C.card, borderRadius:10, marginBottom:6 }}>
        <div>
          <span style={{ fontSize:14, fontWeight:600, color:C.textPrimary }}>{tag.name}</span>
          {tag.isSystem && <span style={{ fontSize:10, color:C.textFaint, marginLeft:6 }}>システム</span>}
          <span style={{ fontSize:11, color:C.textFaint, marginLeft:8 }}>{usage}件で使用</span>
        </div>
        {!tag.isSystem && (
          <div style={{ display:"flex", gap:10 }}>
            <button onClick={() => renameTag(tag)} style={{ background:"none", border:"none", color:C.accentMidText, fontSize:12.5, fontWeight:700, cursor:"pointer" }}>名前変更</button>
            <button onClick={() => removeTag(tag)} style={{ background:"none", border:"none", color:C.danger, fontSize:12.5, fontWeight:700, cursor:"pointer" }}>削除</button>
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={{ padding:"14px 14px 100px" }}>
      <div style={{ fontSize:12, fontWeight:700, color:C.textSecondary, marginBottom:8 }}>新規追加</div>
      <div style={{ display:"flex", gap:8, marginBottom:16 }}>
        <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="タグ名"
          style={{ flex:1, padding:"10px 12px", borderRadius:10, border:`1px solid ${C.border}`, fontSize:14 }} />
        <select value={newKind} onChange={e=>setNewKind(e.target.value)} style={{ padding:"10px 10px", borderRadius:10, border:`1px solid ${C.border}`, fontSize:13 }}>
          <option value="tag">タグ</option>
          <option value="category">カテゴリ</option>
        </select>
        <button onClick={addTag} style={{ background:C.accentDeep, color:"#fff", border:"none", borderRadius:10, padding:"0 16px", fontSize:14, fontWeight:700, cursor:"pointer" }}>追加</button>
      </div>

      <div style={{ fontSize:12, fontWeight:700, color:C.textSecondary, margin:"10px 0 8px" }}>カテゴリ（{categories.length}）</div>
      {categories.map(t => <Row key={t.id} tag={t} />)}

      <div style={{ fontSize:12, fontWeight:700, color:C.textSecondary, margin:"18px 0 8px" }}>タグ（{plainTags.length}）</div>
      {plainTags.map(t => <Row key={t.id} tag={t} />)}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// 場所ピッカー（記録入力中に使う軽量な単一窓の場所選択）
// 「生活の流れを止めない入力」を優先し、全候補を最近使った順で表示。
// 見つからない場合はその場で簡易登録（＋場所追加）できる。
// ══════════════════════════════════════════════════════════════
function PlacePicker({ places, value, onChange, createPlace }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState("");
  const [creating, setCreating] = useState(false);
  const [newCategory, setNewCategory] = useState("");
  const [newBrand, setNewBrand] = useState("");
  const [newPlace, setNewPlace] = useState("");

  const activePlaces = useMemo(() => sortByRecentUse(places.filter(p => p.status === "active")), [places]);
  const filtered = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return activePlaces.slice(0, 8);
    return activePlaces.filter(p => kanaIncludes(placeFullLabel(p), q)).slice(0, 8);
  }, [activePlaces, query]);

  const categorySuggestions = useMemo(() => [...new Set(places.map(p => p.category))], [places]);

  const pick = (placeId) => { onChange(placeId); setOpen(false); setQuery(""); };

  const doCreate = () => {
    if (!newCategory.trim() || !newBrand.trim()) return;
    const p = createPlace({ category: newCategory.trim(), brand: newBrand.trim(), place: newPlace.trim() || null });
    setCreating(false); setNewCategory(""); setNewBrand(""); setNewPlace("");
    pick(p.id);
  };

  const currentLabel = value ? placeLabel(value, places) : "";

  return (
    <div style={{ position:"relative" }}>
      <div onClick={() => setOpen(o=>!o)} style={{
        padding:"11px 13px", borderRadius:10, border:`1px solid ${C.border}`, fontSize:14, background:"#fff", cursor:"pointer",
        color: currentLabel ? C.textPrimary : C.textFaint,
      }}>{currentLabel || "場所を選択"}</div>

      {open && (
        <div style={{ position:"absolute", top:"105%", left:0, right:0, background:"#fff", borderRadius:12, border:`1px solid ${C.border}`, boxShadow:"0 8px 24px rgba(0,0,0,0.12)", zIndex:20, padding:8, maxHeight:280, overflowY:"auto" }}>
          <input autoFocus value={query} onChange={e=>setQuery(e.target.value)} placeholder="場所を検索"
            style={{ width:"100%", padding:"9px 11px", borderRadius:8, border:`1px solid ${C.border}`, fontSize:13.5, marginBottom:6 }} />
          {filtered.map(p => (
            <div key={p.id} onClick={() => pick(p.id)} style={{ padding:"9px 10px", borderRadius:8, cursor:"pointer", fontSize:13.5, color:C.textPrimary }}>
              {placeLabel(p.id, places)}
              <span style={{ fontSize:11, color:C.textFaint, marginLeft:6 }}>{p.category}</span>
            </div>
          ))}
          {filtered.length === 0 && !creating && (
            <div style={{ padding:"8px 10px", fontSize:12.5, color:C.textFaint }}>見つかりませんでした</div>
          )}
          {!creating ? (
            <button onClick={() => { setCreating(true); setNewBrand(query); }} style={{ width:"100%", marginTop:6, padding:"9px 0", borderRadius:8, border:`1px dashed ${C.accentMid}`, background:"none", color:C.accentDeep, fontSize:13, fontWeight:700, cursor:"pointer" }}>＋ 場所を追加</button>
          ) : (
            <div style={{ marginTop:6, padding:8, background:C.accentLight, borderRadius:8 }}>
              <input value={newCategory} onChange={e=>setNewCategory(e.target.value)} placeholder="分類（例：コンビニ）" list="cat-suggest"
                style={{ width:"100%", padding:"8px 10px", borderRadius:7, border:`1px solid ${C.border}`, fontSize:13, marginBottom:6 }} />
              <datalist id="cat-suggest">{categorySuggestions.map(c => <option key={c} value={c} />)}</datalist>
              <input value={newBrand} onChange={e=>setNewBrand(e.target.value)} placeholder="ブランド（例：ローソン）"
                style={{ width:"100%", padding:"8px 10px", borderRadius:7, border:`1px solid ${C.border}`, fontSize:13, marginBottom:6 }} />
              <input value={newPlace} onChange={e=>setNewPlace(e.target.value)} placeholder="支店名（任意・例：上野支店）"
                style={{ width:"100%", padding:"8px 10px", borderRadius:7, border:`1px solid ${C.border}`, fontSize:13, marginBottom:6 }} />
              <div style={{ display:"flex", gap:6 }}>
                <button onClick={()=>setCreating(false)} style={{ flex:1, padding:"8px 0", borderRadius:7, border:`1px solid ${C.border}`, background:"#fff", fontSize:12.5, cursor:"pointer" }}>キャンセル</button>
                <button onClick={doCreate} disabled={!newCategory.trim()||!newBrand.trim()} style={{ flex:1, padding:"8px 0", borderRadius:7, border:"none", background:C.accentDeep, color:"#fff", fontSize:12.5, fontWeight:700, cursor:"pointer", opacity:(!newCategory.trim()||!newBrand.trim())?0.4:1 }}>登録</button>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// 場所図鑑（分類→ブランド→場所の階層。記憶へのしおり）
// ══════════════════════════════════════════════════════════════
function PlacesView({ places, items, onOpenPlace, onAddPlace }) {
  const [query, setQuery] = useState("");
  const [expandedCats, setExpandedCats] = useState(() => new Set());
  const [expandedBrands, setExpandedBrands] = useState(() => new Set());

  // 記録件数（分類・ブランド単位の集計に使用）
  const itemCountByPlaceId = useMemo(() => {
    const map = {};
    items.forEach(it => { if (it.placeId) map[it.placeId] = (map[it.placeId]||0) + 1; });
    return map;
  }, [items]);

  const filtered = useMemo(() => {
    const q = query.trim();
    if (!q) return places;
    return places.filter(p => kanaIncludes(p.category, q) || kanaIncludes(p.brand, q) || (p.place && kanaIncludes(p.place, q)));
  }, [places, query]);

  const tree = useMemo(() => {
    const byCat = {};
    filtered.forEach(p => {
      byCat[p.category] = byCat[p.category] || {};
      (byCat[p.category][p.brand] = byCat[p.category][p.brand] || []).push(p);
    });
    return Object.entries(byCat).sort((a,b) => a[0].localeCompare(b[0],"ja")).map(([category, brandsObj]) => {
      const brands = Object.entries(brandsObj).sort((a,b) => a[0].localeCompare(b[0],"ja")).map(([brand, list]) => {
        list.sort((a,b) => (a.place||"").localeCompare(b.place||"","ja"));
        const count = list.reduce((s,p) => s + (itemCountByPlaceId[p.id]||0), 0);
        return { brand, list, count };
      });
      const count = brands.reduce((s,b) => s+b.count, 0);
      return { category, brands, count };
    });
  }, [filtered, itemCountByPlaceId]);

  // 検索中は自動的に展開して結果を見やすくする
  useEffect(() => {
    if (!query.trim()) return;
    setExpandedCats(new Set(tree.map(t => t.category)));
    setExpandedBrands(new Set(tree.flatMap(t => t.brands.map(b => `${t.category}::${b.brand}`))));
  }, [query]);

  const toggleCat = (cat) => setExpandedCats(prev => { const n = new Set(prev); n.has(cat) ? n.delete(cat) : n.add(cat); return n; });
  const toggleBrand = (key) => setExpandedBrands(prev => { const n = new Set(prev); n.has(key) ? n.delete(key) : n.add(key); return n; });

  return (
    <div style={{ padding:"14px 16px 100px" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <div style={{ fontSize:12, fontWeight:700, color:C.textSecondary }}>場所図鑑（{places.length}）</div>
        <button onClick={onAddPlace} style={{ background:C.accentDeep, color:"#fff", border:"none", borderRadius:10, padding:"7px 14px", fontSize:12.5, fontWeight:700, cursor:"pointer" }}>＋ 場所追加</button>
      </div>

      <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="分類・ブランド・場所名で検索"
        style={{ width:"100%", padding:"11px 13px", borderRadius:12, border:`1px solid ${C.border}`, fontSize:14, marginBottom:14, background:"#fff" }} />

      {tree.length === 0 && (
        <div style={{ textAlign:"center", color:C.textFaint, fontSize:13, padding:"40px 0" }}>
          {query ? "見つかりませんでした" : "まだ場所が登録されていません"}
        </div>
      )}

      {tree.map(({ category, brands, count }) => {
        const catOpen = expandedCats.has(category);
        return (
          <div key={category} style={{ marginBottom:8 }}>
            <div onClick={() => toggleCat(category)} style={{
              display:"flex", alignItems:"center", gap:7, padding:"11px 13px", background:C.card, borderRadius:11,
              cursor:"pointer", boxShadow:`0 1px 4px ${C.shadowCard}`,
            }}>
              <span style={{ fontSize:11, color:C.accentMidText, width:12, flexShrink:0 }}>{catOpen ? "▼" : "▶"}</span>
              <span style={{ fontSize:13.5, fontWeight:700, color:C.textPrimary, flex:1 }}>{category}</span>
              <span style={{ fontSize:11.5, fontWeight:700, color:C.textFaint }}>{count}</span>
            </div>

            {catOpen && brands.map(({ brand, list, count: bCount }) => {
              const key = `${category}::${brand}`;
              const single = list.length === 1 && !list[0].place;
              const brandOpen = expandedBrands.has(key);
              return (
                <div key={key} style={{ marginTop:5, marginLeft:18 }}>
                  <div onClick={() => single ? onOpenPlace(list[0].id) : toggleBrand(key)} style={{
                    display:"flex", alignItems:"center", gap:7, padding:"10px 12px", background:"#fff", borderRadius:10,
                    cursor:"pointer", border:`1px solid ${C.border}`,
                    opacity: single && list[0].status === "inactive" ? 0.55 : 1,
                  }}>
                    <span style={{ fontSize:10, color:C.textFaint, width:12, flexShrink:0 }}>{single ? "" : (brandOpen ? "▼" : "▶")}</span>
                    <span style={{ fontSize:13, fontWeight:600, color:C.textPrimary, flex:1 }}>{brand}</span>
                    {single && list[0].status === "inactive" && (
                      <span style={{ fontSize:9.5, fontWeight:700, color:C.danger, background:C.dangerBg, borderRadius:99, padding:"1px 6px" }}>無効</span>
                    )}
                    <span style={{ fontSize:11, color:C.textFaint }}>{bCount}</span>
                    {single && <span style={{ fontSize:14, color:C.textFaint }}>›</span>}
                  </div>

                  {!single && brandOpen && list.map(p => (
                    <div key={p.id} onClick={() => onOpenPlace(p.id)} style={{
                      marginLeft:19, marginTop:4, padding:"9px 12px", borderRadius:9, fontSize:12.5, color:C.textPrimary,
                      cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center", gap:6,
                      background:C.accentLight, opacity: p.status === "inactive" ? 0.55 : 1,
                    }}>
                      <span style={{ flex:1 }}>{p.place || "（支店名なし）"}</span>
                      {p.status === "inactive" && (
                        <span style={{ fontSize:9.5, fontWeight:700, color:C.danger, background:"#fff", borderRadius:99, padding:"1px 6px" }}>無効</span>
                      )}
                      <span style={{ fontSize:14, color:C.textFaint }}>›</span>
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// 場所詳細（最近の訪問→生活ログへリンク／詳細情報は折りたたみ）
// ══════════════════════════════════════════════════════════════
function PlaceDetailOverlay({ placeId, places, items, onClose, updatePlace, onOpenDate }) {
  const place = places.find(p => p.id === placeId);
  const [draft, setDraft] = useState(() => place ? { ...place } : null);
  const [showDetail, setShowDetail] = useState(false);
  const [visitLimit, setVisitLimit] = useState(5);

  useEffect(() => { setDraft(place ? { ...place } : null); }, [placeId]);

  if (!place || !draft) return null;

  const visitDates = useMemo(() => {
    const dates = [...new Set(items.filter(it => it.placeId === placeId).map(it => it.purchaseDate))];
    return dates.sort((a,b) => b.localeCompare(a));
  }, [items, placeId]);

  const canSave = (draft.category||"").trim() && (draft.brand||"").trim();
  const commitAndClose = () => {
    if (canSave) {
      updatePlace(place.id, {
        category: draft.category.trim(), brand: draft.brand.trim(),
        place: (draft.place||"").trim() || null, memo: draft.memo,
      });
    } else {
      updatePlace(place.id, { memo: draft.memo });
    }
    onClose();
  };
  const toggleStatus = () => {
    const next = draft.status === "active" ? "inactive" : "active";
    setDraft(d => ({ ...d, status: next }));
    updatePlace(place.id, { status: next });
  };

  return (
    <div style={{ position:"fixed", inset:0, background:C.bg, zIndex:220, display:"flex", flexDirection:"column" }}>
      <SubHeader title="場所の詳細" onBack={commitAndClose} />
      <div style={{ flex:1, overflowY:"auto", padding:"16px 16px 100px" }}>
        <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>分類</label>
        <input value={draft.category} onChange={e=>setDraft({...draft,category:e.target.value})}
          style={{ width:"100%", padding:"10px 12px", borderRadius:10, border:`1px solid ${C.border}`, fontSize:14, margin:"5px 0 12px", background:"#fff" }} />

        <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>ブランド</label>
        <input value={draft.brand} onChange={e=>setDraft({...draft,brand:e.target.value})}
          style={{ width:"100%", padding:"10px 12px", borderRadius:10, border:`1px solid ${C.border}`, fontSize:15, fontWeight:700, margin:"5px 0 12px", background:"#fff" }} />

        <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>場所名（任意・支店名など）</label>
        <input value={draft.place||""} onChange={e=>setDraft({...draft,place:e.target.value})} placeholder="複数店舗がある場合のみ"
          style={{ width:"100%", padding:"10px 12px", borderRadius:10, border:`1px solid ${C.border}`, fontSize:14, margin:"5px 0 4px", background:"#fff" }} />

        <button onClick={toggleStatus} style={{
          marginTop:12, padding:"7px 14px", borderRadius:99, fontSize:12.5, fontWeight:700, cursor:"pointer",
          border:"none", background: draft.status==="active" ? C.accentLight : C.dangerBg,
          color: draft.status==="active" ? C.accentDeep : C.danger,
        }}>{draft.status === "active" ? "有効（タップで無効化）" : "無効（タップで有効化）"}</button>

        {visitDates.length > 0 && (
          <div style={UI.cardFloat({ display:"flex", padding:"12px 4px", margin:"16px 0 4px" })}>
            <div style={{ flex:1, textAlign:"center", borderRight:`1px solid ${C.border}` }}>
              <div style={{ fontSize:16, fontWeight:800, color:C.accentDeep }}>{visitDates.length}</div>
              <div style={{ fontSize:10.5, color:C.textFaint, marginTop:2 }}>訪問日数</div>
            </div>
            <div style={{ flex:1, textAlign:"center", borderRight:`1px solid ${C.border}` }}>
              <div style={{ fontSize:13, fontWeight:800, color:C.textPrimary }}>{fmtDateShort(visitDates[0])}</div>
              <div style={{ fontSize:10.5, color:C.textFaint, marginTop:2 }}>最近訪問</div>
            </div>
            <div style={{ flex:1, textAlign:"center" }}>
              <div style={{ fontSize:13, fontWeight:800, color:C.textPrimary }}>{fmtDateShort(visitDates[visitDates.length-1])}</div>
              <div style={{ fontSize:10.5, color:C.textFaint, marginTop:2 }}>初回訪問</div>
            </div>
          </div>
        )}

        <div style={{ fontSize:12, fontWeight:700, color:C.textSecondary, margin:"24px 0 10px" }}>最近の訪問</div>
        {visitDates.length === 0 && <div style={{ fontSize:12.5, color:C.textFaint }}>まだ記録がありません</div>}
        {visitDates.slice(0, visitLimit).map(d => (
          <div key={d} onClick={() => onOpenDate(d)} style={{
            display:"flex", justifyContent:"space-between", alignItems:"center",
            padding:"11px 14px", background:C.card, borderRadius:10, marginBottom:6, cursor:"pointer", boxShadow:`0 1px 3px ${C.shadowCard}`,
          }}>
            <span style={{ fontSize:13.5, color:C.textPrimary }}>{fmtDateShort(d)}</span>
            <span style={{ fontSize:14, color:C.textFaint }}>›</span>
          </div>
        ))}
        {visitDates.length > visitLimit && (
          <button onClick={() => setVisitLimit(l => l === 5 ? 15 : visitDates.length)}
            style={{ background:"none", border:"none", color:C.accentMidText, fontSize:12.5, fontWeight:700, cursor:"pointer", padding:"6px 2px" }}>
            {visitLimit === 5 ? "もっと見る" : "全部見る"}
          </button>
        )}

        <div style={{ fontSize:12, fontWeight:700, color:C.textSecondary, margin:"24px 0 6px" }}>メモ</div>
        <textarea value={draft.memo||""} onChange={e=>setDraft({...draft,memo:e.target.value})} rows={2}
          style={{ width:"100%", padding:"10px 12px", borderRadius:10, border:`1px solid ${C.border}`, fontSize:13.5, background:"#fff", resize:"vertical" }} />

        <button onClick={() => setShowDetail(v=>!v)} style={{ marginTop:22, background:"none", border:"none", color:C.textSecondary, fontSize:12, fontWeight:700, cursor:"pointer", padding:0 }}>
          {showDetail ? "▲ 詳細情報を閉じる" : "▼ 詳細情報（PlaceID・座標など）"}
        </button>
        {showDetail && (
          <div style={{ marginTop:10, padding:"12px 14px", background:C.card, borderRadius:10, fontSize:12.5, color:C.textSecondary, lineHeight:2 }}>
            <div>PlaceID：{place.placeId || "未設定"}</div>
            <div>緯度経度：{place.lat && place.lng ? `${place.lat}, ${place.lng}` : "未設定"}</div>
            <div>住所：{place.address || "未設定"}</div>
            <div>登録日：{new Date(place.registeredAt).toLocaleDateString("ja-JP")}</div>
          </div>
        )}

        <button onClick={commitAndClose} style={{ width:"100%", padding:"14px 0", borderRadius:12, border:"none", background:C.accentDeep, color:"#fff", fontSize:15, fontWeight:700, cursor:"pointer", marginTop:26 }}>保存して戻る</button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// 場所追加（図鑑の＋ボタン・入力補助「最近使った／候補」つき）
// ══════════════════════════════════════════════════════════════
function PlaceAddOverlay({ places, onClose, createPlace }) {
  const [category, setCategory] = useState("");
  const [brand, setBrand] = useState("");
  const [place, setPlace] = useState("");
  const [brandFocus, setBrandFocus] = useState(false);
  const [placeFocus, setPlaceFocus] = useState(false);

  const categorySuggestions = useMemo(() => [...new Set(places.map(p => p.category))], [places]);
  const brandsInCategory = useMemo(() => sortByRecentUse(places.filter(p => p.category === category)), [places, category]);
  const brandCandidates = useMemo(() => {
    const q = brand.trim();
    const names = [...new Set(brandsInCategory.map(p => p.brand))];
    return q ? names.filter(n => kanaIncludes(n, q)) : names;
  }, [brandsInCategory, brand]);

  const placesUnderBrand = useMemo(() => sortByRecentUse(places.filter(p => p.brand === brand && p.place)), [places, brand]);
  const recentPlaceNames = placesUnderBrand.slice(0,3).map(p => p.place);
  const placeCandidates = useMemo(() => {
    const q = place.trim();
    const names = [...new Set(placesUnderBrand.map(p => p.place))];
    return (q ? names.filter(n => kanaIncludes(n, q)) : names).filter(n => !recentPlaceNames.includes(n));
  }, [placesUnderBrand, place]);

  const canSave = category.trim() && brand.trim();
  const save = () => {
    if (!canSave) return;
    createPlace({ category: category.trim(), brand: brand.trim(), place: place.trim() || null });
    onClose();
  };

  return (
    <div style={{ position:"fixed", inset:0, background:C.bg, zIndex:220, display:"flex", flexDirection:"column" }}>
      <SubHeader title="場所を追加" onBack={onClose} />
      <div style={{ flex:1, overflowY:"auto", padding:"16px 16px 100px" }}>
        <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>分類</label>
        <input value={category} onChange={e=>setCategory(e.target.value)} placeholder="例：コンビニ、ホテル、公園" list="cat-suggest-add"
          style={{ width:"100%", padding:"11px 13px", borderRadius:10, border:`1px solid ${C.border}`, fontSize:15, margin:"6px 0 16px", background:"#fff" }} />
        <datalist id="cat-suggest-add">{categorySuggestions.map(c => <option key={c} value={c} />)}</datalist>

        <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>ブランド</label>
        <input value={brand} onChange={e=>setBrand(e.target.value)} onFocus={()=>setBrandFocus(true)} onBlur={()=>setTimeout(()=>setBrandFocus(false),150)}
          placeholder="例：ローソン" style={{ width:"100%", padding:"11px 13px", borderRadius:10, border:`1px solid ${C.border}`, fontSize:15, margin:"6px 0 6px", background:"#fff" }} />
        {brandFocus && category && brandCandidates.length > 0 && (
          <div style={{ background:"#fff", border:`1px solid ${C.border}`, borderRadius:10, marginBottom:16, overflow:"hidden" }}>
            {brandCandidates.map(n => (
              <div key={n} onMouseDown={()=>setBrand(n)} style={{ padding:"9px 13px", fontSize:13.5, color:C.textPrimary, cursor:"pointer", borderBottom:`1px solid ${C.border}` }}>{n}</div>
            ))}
          </div>
        )}
        {(!brandFocus || brandCandidates.length===0) && <div style={{ marginBottom:16 }} />}

        <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>場所（任意・支店名など）</label>
        <input value={place} onChange={e=>setPlace(e.target.value)} onFocus={()=>setPlaceFocus(true)} onBlur={()=>setTimeout(()=>setPlaceFocus(false),150)}
          placeholder="複数店舗がある場合のみ" style={{ width:"100%", padding:"11px 13px", borderRadius:10, border:`1px solid ${C.border}`, fontSize:15, margin:"6px 0 6px", background:"#fff" }} />
        {placeFocus && brand && (recentPlaceNames.length>0 || placeCandidates.length>0) && (
          <div style={{ background:"#fff", border:`1px solid ${C.border}`, borderRadius:10, marginBottom:16, overflow:"hidden" }}>
            {recentPlaceNames.length > 0 && (
              <>
                <div style={{ padding:"6px 13px", fontSize:10.5, fontWeight:700, color:C.textFaint }}>最近使った</div>
                {recentPlaceNames.map(n => <div key={n} onMouseDown={()=>setPlace(n)} style={{ padding:"9px 13px", fontSize:13.5, color:C.textPrimary, cursor:"pointer" }}>{n}</div>)}
                <div style={{ borderTop:`1px solid ${C.border}` }} />
              </>
            )}
            {placeCandidates.length > 0 && (
              <>
                <div style={{ padding:"6px 13px", fontSize:10.5, fontWeight:700, color:C.textFaint }}>候補</div>
                {placeCandidates.map(n => <div key={n} onMouseDown={()=>setPlace(n)} style={{ padding:"9px 13px", fontSize:13.5, color:C.textPrimary, cursor:"pointer" }}>{n}</div>)}
              </>
            )}
          </div>
        )}
        {(!placeFocus || (recentPlaceNames.length===0 && placeCandidates.length===0)) && <div style={{ marginBottom:16 }} />}

        <button onClick={save} disabled={!canSave} style={{ width:"100%", padding:"14px 0", borderRadius:12, border:"none", background:C.accentDeep, color:"#fff", fontSize:15, fontWeight:700, cursor:"pointer", marginTop:8, opacity:canSave?1:0.4 }}>登録する</button>
      </div>
    </div>
  );
}

// STEP1: 仮保存（高速入力） ── クイック追加オーバーレイ
// ══════════════════════════════════════════════════════════════
function QuickAddOverlay({ onClose, places, settings, addItemToReceipt, createPlace, presetDate }) {
  const [name, setName] = useState("");
  const [amount, setAmount] = useState("");
  const [placeId, setPlaceId] = useState(null);
  const [date, setDate] = useState(presetDate || todayStr());
  const [time, setTime] = useState(() => nowTimeStr());
  const [photoFile, setPhotoFile] = useState(null);
  const [photoPreview, setPhotoPreview] = useState(null);
  const [receiptId, setReceiptId] = useState(null); // 同一レシートへの連続追加用
  const [savedCount, setSavedCount] = useState(0);
  const nameRef = useRef();

  useEffect(() => { nameRef.current?.focus(); }, []);

  const onPickPhoto = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setPhotoFile(file);
    setPhotoPreview(await fileToDataURL(file));
    // 将来：ここで写真からOCRを実行し、商品名・金額・場所の候補を自動入力する予定（今回は未実装）
  };

  const doSave = async (closeAfter) => {
    if (!name.trim() || !amount) return;
    const rid = await addItemToReceipt({
      receiptId, name: name.trim(), amount: Number(amount), placeId, date, time, photoFile,
    });
    setReceiptId(rid);
    setSavedCount(c => c+1);
    setName(""); setAmount("");
    setPhotoFile(null); // レシート写真は1枚登録すれば十分（グループに紐づく）
    if (closeAfter) { onClose(); } else { nameRef.current?.focus(); }
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(30,41,59,0.32)", zIndex:300, display:"flex", alignItems:"flex-end" }} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{ ...UI.sheetBottom({ width:"100%", maxWidth:430, margin:"0 auto", padding:"16px 18px 24px", maxHeight:"86vh", overflowY:"auto" }), animation:"tomotaSlideUpSheet 0.2s ease" }}>
        <div style={{ width:36, height:4, background:C.border, borderRadius:99, margin:"0 auto 14px" }} />
        <div style={{ fontSize:15, fontWeight:800, color:C.textPrimary, marginBottom:2 }}>かんたん記録（仮保存）</div>
        <div style={{ fontSize:11.5, color:C.textFaint, marginBottom:14 }}>最低限だけ入力。あとで「精査編集」でゆっくり整えられます。{savedCount>0 && ` （このレシートに${savedCount}件保存済み）`}</div>

        {/* 写真を先頭に配置：将来のOCR（写真→候補生成）を見据えた導線 */}
        <label style={{ display:"flex", alignItems:"center", gap:12, padding:"14px", borderRadius:14, border:`1.5px dashed ${C.accentMid}`, marginBottom:14, cursor:"pointer", background:C.accentLight }}>
          <input type="file" accept="image/*" capture="environment" onChange={onPickPhoto} style={{ display:"none" }} />
          {photoPreview
            ? <img src={photoPreview} style={{ width:44, height:44, borderRadius:10, objectFit:"cover", flexShrink:0 }} />
            : <span style={{ fontSize:24, flexShrink:0 }}>📷</span>}
          <div style={{ minWidth:0 }}>
            <div style={{ fontSize:13, fontWeight:700, color:C.accentDeep }}>{photoPreview ? "レシート写真を変更" : "レシート写真を追加（任意）"}</div>
            <div style={{ fontSize:10.5, color:C.textSecondary, marginTop:1 }}>今は手入力のみ。将来は写真からの読み取りに対応予定</div>
          </div>
        </label>

        <input ref={nameRef} value={name} onChange={e=>setName(e.target.value)} placeholder="商品名"
          style={{ width:"100%", padding:"12px 14px", borderRadius:12, border:`1px solid ${C.border}`, fontSize:15, marginBottom:10, background:"#fff" }} />
        <input value={amount} onChange={e=>setAmount(e.target.value.replace(/[^0-9]/g,""))} placeholder="金額" inputMode="numeric"
          style={{ width:"100%", padding:"12px 14px", borderRadius:12, border:`1px solid ${C.border}`, fontSize:15, marginBottom:10, background:"#fff" }} />

        <div style={{ marginBottom:10 }}><PlacePicker places={places} value={placeId} onChange={setPlaceId} createPlace={createPlace} /></div>

        <div style={{ display:"flex", gap:8, marginBottom:16 }}>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{ flex:1, padding:"12px 10px", borderRadius:12, border:`1px solid ${C.border}`, fontSize:14, background:"#fff" }} />
          <input type="time" value={time} onChange={e=>setTime(e.target.value)} style={{ flex:1, padding:"12px 10px", borderRadius:12, border:`1px solid ${C.border}`, fontSize:14, background:"#fff" }} />
        </div>

        <div style={{ display:"flex", gap:10 }}>
          <button onClick={() => doSave(false)} disabled={!name.trim()||!amount} style={{
            flex:1, padding:"13px 0", borderRadius:12, border:`1px solid ${C.accentDeep}`, background:"#fff",
            color:C.accentDeep, fontSize:14, fontWeight:700, cursor:"pointer", opacity:(!name.trim()||!amount)?0.4:1,
          }}>保存してもう1品</button>
          <button onClick={() => doSave(true)} disabled={!name.trim()||!amount} style={{
            flex:1, padding:"13px 0", borderRadius:12, border:"none", background:C.accentDeep,
            color:"#fff", fontSize:14, fontWeight:700, cursor:"pointer", opacity:(!name.trim()||!amount)?0.4:1,
          }}>保存して閉じる</button>
        </div>
      </div>
    </div>
  );
}

// STEP2: 精査編集 ── 編集オーバーレイ
// ══════════════════════════════════════════════════════════════
function EditOverlay({ itemId, items, receipts, tags, places, settings, onClose, updateItem, updateReceipt, deleteItem, duplicateItem, addReceiptImage, removeReceiptImage, addItemAttachment, removeItemAttachment, createPlace, showToast }) {
  const item = items.find(i => i.id === itemId);
  const receipt = receipts.find(r => r.id === item?.receiptId);
  const [draft, setDraft] = useState(() => item ? { ...item } : null);
  const [receiptTime, setReceiptTime] = useState(() => receipt?.time || "");

  useEffect(() => { setDraft(item ? { ...item } : null); setReceiptTime(receipt?.time || ""); }, [itemId]);

  if (!item || !draft) return null;

  const categories = tags.filter(t => t.kind === "category");
  const plainTags  = tags.filter(t => t.kind === "tag");

  const toggleTag = (tagId, isCategory) => {
    setDraft(d => {
      let next = d.tags || [];
      if (isCategory) {
        // カテゴリは単一選択：他のカテゴリタグを外して付け替える
        next = next.filter(id => !categories.some(c => c.id === id));
        next = [...next, tagId];
      } else {
        next = next.includes(tagId) ? next.filter(id => id !== tagId) : [...next, tagId];
      }
      return { ...d, tags: next };
    });
  };

  const commitAndClose = () => {
    updateItem(item.id, {
      name: draft.name, amount: Number(draft.amount)||0, placeId: draft.placeId, payMethod: draft.payMethod,
      purchaseDate: draft.purchaseDate, tags: draft.tags, memo: draft.memo,
    });
    if (receipt && receiptTime !== (receipt.time||"")) {
      updateReceipt(receipt.id, { time: receiptTime || null });
    }
    onClose();
  };

  const onDelete = () => {
    if (!window.confirm("この記録を削除しますか？元に戻せません。")) return;
    deleteItem(item.id);
    onClose();
  };

  const onDuplicate = () => { duplicateItem(item.id); };

  const onAddItemPhoto = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const dataUrl = await fileToDataURL(file);
    const id = uid("img");
    await idbSet(id, dataUrl);
    setDraft(d => ({ ...d, attachments: [...(d.attachments||[]), id] }));
    addItemAttachment(item.id, id);
  };
  const onRemoveItemPhoto = (imgId) => {
    setDraft(d => ({ ...d, attachments: (d.attachments||[]).filter(x=>x!==imgId) }));
    removeItemAttachment(item.id, imgId);
    idbDelete(imgId);
  };
  const [confirmDeletePhoto, setConfirmDeletePhoto] = useState(null); // { kind:'item'|'receipt', imgId }
  const executeDeletePhoto = () => {
    if (!confirmDeletePhoto) return;
    if (confirmDeletePhoto.kind === "item") onRemoveItemPhoto(confirmDeletePhoto.imgId);
    else removeReceiptImage(receipt.id, confirmDeletePhoto.imgId);
    setConfirmDeletePhoto(null);
  };

  const onAddReceiptPhoto = async (e) => {
    const file = e.target.files?.[0];
    if (!file || !receipt) return;
    const dataUrl = await fileToDataURL(file);
    const id = uid("img");
    await idbSet(id, dataUrl);
    addReceiptImage(receipt.id, id);
  };

  return (
    <div style={{ position:"fixed", inset:0, background:C.bg, zIndex:250, display:"flex", flexDirection:"column" }}>
      <SubHeader title="精査編集" onBack={commitAndClose} right={
        <div style={{ display:"flex", gap:14 }}>
          <button onClick={onDuplicate} style={{ background:"none", border:"none", color:C.accentMidText, fontSize:13, fontWeight:700, cursor:"pointer" }}>複写</button>
          <button onClick={onDelete} style={{ background:"none", border:"none", color:C.danger, fontSize:13, fontWeight:700, cursor:"pointer" }}>削除</button>
        </div>
      } />
      <div style={{ flex:1, overflowY:"auto", padding:"16px 16px 100px" }}>
        <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>商品名</label>
        <input value={draft.name} onChange={e=>setDraft({...draft,name:e.target.value})}
          style={{ width:"100%", padding:"11px 13px", borderRadius:10, border:`1px solid ${C.border}`, fontSize:15, margin:"6px 0 14px", background:"#fff" }} />

        <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>金額</label>
        <input value={draft.amount} onChange={e=>setDraft({...draft,amount:e.target.value.replace(/[^0-9]/g,"")})} inputMode="numeric"
          style={{ width:"100%", padding:"11px 13px", borderRadius:10, border:`1px solid ${C.border}`, fontSize:15, margin:"6px 0 14px", background:"#fff" }} />

        <div style={{ display:"flex", gap:10, marginBottom:14 }}>
          <div style={{ flex:1 }}>
            <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>場所</label>
            <div style={{ marginTop:6 }}>
              <PlacePicker places={places} value={draft.placeId} onChange={(pid)=>setDraft({...draft,placeId:pid})} createPlace={createPlace} />
            </div>
          </div>
          <div style={{ flex:1 }}>
            <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>支払方法</label>
            <select value={draft.payMethod||""} onChange={e=>setDraft({...draft,payMethod:e.target.value})}
              style={{ width:"100%", padding:"11px 10px", borderRadius:10, border:`1px solid ${C.border}`, fontSize:14, marginTop:6, background:"#fff" }}>
              <option value="">未設定</option>
              {settings.payMethods.map(p => <option key={p} value={p}>{p}</option>)}
            </select>
          </div>
        </div>

        <div style={{ display:"flex", gap:10, margin:"6px 0 16px" }}>
          <div style={{ flex:1 }}>
            <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>購入日</label>
            <input type="date" value={draft.purchaseDate} onChange={e=>setDraft({...draft,purchaseDate:e.target.value})}
              style={{ width:"100%", padding:"11px 13px", borderRadius:10, border:`1px solid ${C.border}`, fontSize:14, marginTop:6, background:"#fff" }} />
          </div>
          {receipt && (
            <div style={{ flex:1 }}>
              <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>時刻（このレシートの来店時刻）</label>
              <input type="time" value={receiptTime} onChange={e=>setReceiptTime(e.target.value)}
                style={{ width:"100%", padding:"11px 13px", borderRadius:10, border:`1px solid ${C.border}`, fontSize:14, marginTop:6, background:"#fff" }} />
            </div>
          )}
        </div>

        <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>カテゴリ</label>
        <div style={{ display:"flex", gap:6, flexWrap:"wrap", margin:"7px 0 16px" }}>
          {categories.map(c => <TagChip key={c.id} tag={c} small selected={(draft.tags||[]).includes(c.id)} onClick={()=>toggleTag(c.id,true)} />)}
        </div>

        <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>タグ</label>
        <div style={{ display:"flex", gap:6, flexWrap:"wrap", margin:"7px 0 16px" }}>
          {plainTags.map(t => <TagChip key={t.id} tag={t} small selected={(draft.tags||[]).includes(t.id)} onClick={()=>toggleTag(t.id,false)} />)}
        </div>

        <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>メモ</label>
        <textarea value={draft.memo||""} onChange={e=>setDraft({...draft,memo:e.target.value})} rows={3}
          style={{ width:"100%", padding:"11px 13px", borderRadius:10, border:`1px solid ${C.border}`, fontSize:14, margin:"6px 0 16px", background:"#fff", resize:"vertical" }} />

        <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>商品写真（この商品だけの記録用・任意）</label>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap", margin:"7px 0 16px" }}>
          {(draft.attachments||[]).map(imgId => (
            <div key={imgId} style={{ position:"relative" }}>
              <AsyncImage id={imgId} style={{ width:56, height:56, borderRadius:10 }} />
              <button onClick={()=>setConfirmDeletePhoto({ kind:"item", imgId })} style={{ position:"absolute", top:-6, right:-6, width:20, height:20, borderRadius:"50%", background:C.danger, color:"#fff", border:"none", fontSize:12, cursor:"pointer" }}>×</button>
            </div>
          ))}
          <label style={{ width:56, height:56, borderRadius:10, border:`1px dashed ${C.border}`, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", fontSize:20, color:C.textFaint }}>
            <input type="file" accept="image/*" onChange={onAddItemPhoto} style={{ display:"none" }} />＋
          </label>
        </div>

        {receipt && (
          <>
            <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>レシート写真（同じ来店の商品どうしで共有）</label>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap", margin:"7px 0 16px" }}>
              {(receipt.images||[]).map(imgId => (
                <div key={imgId} style={{ position:"relative" }}>
                  <AsyncImage id={imgId} style={{ width:56, height:56, borderRadius:10 }} />
                  <button onClick={()=>setConfirmDeletePhoto({ kind:"receipt", imgId })} style={{ position:"absolute", top:-6, right:-6, width:20, height:20, borderRadius:"50%", background:C.danger, color:"#fff", border:"none", fontSize:12, cursor:"pointer" }}>×</button>
                </div>
              ))}
              <label style={{ width:56, height:56, borderRadius:10, border:`1px dashed ${C.border}`, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", fontSize:20, color:C.textFaint }}>

        <button onClick={commitAndClose} style={{ width:"100%", padding:"14px 0", borderRadius:12, border:"none", background:C.accentDeep, color:"#fff", fontSize:15, fontWeight:700, cursor:"pointer", marginTop:6, boxShadow:`0 4px 14px ${C.shadowDeep}` }}>保存して戻る</button>
      </div>

      {confirmDeletePhoto && (
        <ConfirmDialog
          title="この写真を削除しますか？"

            ? "このレシート内の全商品で共有されています。削除すると、このレシートに含まれる他の商品からも見えなくなります。元に戻せません。"
            : "この商品にだけ付けた写真です。削除すると元に戻せません。"}
          onCancel={() => setConfirmDeletePhoto(null)}
          onConfirm={executeDeletePhoto}
        />
      )}
    </div>
  );
