// STEP1: 仮保存（高速入力） ── クイック追加オーバーレイ
// ══════════════════════════════════════════════════════════════
function QuickAddOverlay({ onClose, places, settings, tags, addItemToReceipt, createPlace, createTag, presetDate, initialReceipt }) {
  const [mode, setMode] = useState(initialReceipt ? "full" : "simple"); // 精査編集からの追加は既定「しっかり」。切替は自由
  const [name, setName] = useState("");
  const [amount, setAmount] = useState("");
  const [placeId, setPlaceId] = useState(initialReceipt?.placeId ?? null);
  const [date, setDate] = useState(initialReceipt?.date || presetDate || todayStr());
  const [time, setTime] = useState(() => nowTimeStr());
  const [photoFile, setPhotoFile] = useState(null);
  const [photoPreview, setPhotoPreview] = useState(null);
  const [itemPhotoFile, setItemPhotoFile] = useState(null);
  const [itemPhotoPreview, setItemPhotoPreview] = useState(null);
  const [receiptId, setReceiptId] = useState(initialReceipt?.id ?? null); // 同一レシートへの連続追加用
  const [savedCount, setSavedCount] = useState(initialReceipt?.count ?? 0);
  const [payMethodId, setPayMethodId] = useState(initialReceipt?.payMethodId ?? null);
  const [selectedTags, setSelectedTags] = useState([]); // カテゴリ・タグの両方を含む（EditOverlayのdraft.tagsと同じ考え方）
  const [memo, setMemo] = useState("");
  const [tagPickerOpen, setTagPickerOpen] = useState(false);
  const nameRef = useRef();

  useEffect(() => { nameRef.current?.focus(); }, []);

  const categories = tags.filter(t => t.kind === "category");
  const plainTags  = tags.filter(t => t.kind === "tag");
  const currentTagIds = selectedTags.filter(id => plainTags.some(t => t.id === id));
  const currentCategoryIds = selectedTags.filter(id => categories.some(c => c.id === id));

  const toggleCategory = (tagId) => {
    setSelectedTags(prev => [...prev.filter(id => !categories.some(c => c.id === id)), tagId]);
  };
  const applyTagSelection = (ids) => { setSelectedTags([...currentCategoryIds, ...ids]); setTagPickerOpen(false); };

  const onPickPhoto = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setPhotoFile(file);
    setPhotoPreview(await fileToDataURL(file));
    // 将来：ここで写真からOCRを実行し、商品名・金額・場所の候補を自動入力する予定（今回は未実装）
  };

  const onPickItemPhoto = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setItemPhotoFile(file);
    setItemPhotoPreview(await fileToDataURL(file));
  };

  // 場所・購入日・購入時刻・支払方法・レシート写真はレシート共通情報なので「もう1品」でも保持する。
  // 商品名・金額・カテゴリ・タグ・メモ・商品写真は商品固有の情報なのでリセットする。
  const resetItemFields = () => {
    setName(""); setAmount("");
    setSelectedTags([]); setMemo("");
    setItemPhotoFile(null); setItemPhotoPreview(null);
  };

  const doSave = async (closeAfter) => {
    if (!name.trim() || !amount) return;
    const rid = await addItemToReceipt({
      receiptId, name: name.trim(), amount: Number(amount), placeId, date, time, photoFile, itemPhotoFile,
      payMethodId, tags: selectedTags, memo, needCheck: mode === "simple",
    });
    setReceiptId(rid);
    setSavedCount(c => c+1);
    setPhotoFile(null); // レシート写真は1枚登録すれば十分（receipt.imagesに保存済みなので消えない。ここではファイル選択欄をクリアするだけ）
    resetItemFields(); // 商品固有の項目（商品名・金額・カテゴリ・タグ・メモ・商品写真）は商品ごとにリセット。モードと支払方法は維持
    if (closeAfter) { onClose(); } else { nameRef.current?.focus(); }
  };

  const btnVerb = mode === "simple" ? "仮保存" : "登録";

  return (
    <div style={{ position:"fixed", inset:0, background:C.bg, zIndex:230, display:"flex", flexDirection:"column" }}>
      <SubHeader title="新規登録" onBack={onClose} />
      <div style={{ flex:1, overflowY:"auto", padding:"16px 16px 100px" }}>
        {initialReceipt && (
          <div style={{ fontSize:11.5, color:C.accentDeep, background:C.accentLight, borderRadius:10, padding:"8px 12px", marginBottom:12, fontWeight:700 }}>
            このレシートに追加：{initialReceipt.placeId ? placeLabel(initialReceipt.placeId, places) : "（場所未設定）"}（{fmtDateShort(initialReceipt.date)}・既に{savedCount}件）
          </div>
        )}

        {/* モード切替：画面最上部・スクロールしても最初に目に入る位置。入力内容は保持したまま表示項目だけ切り替える */}
        <div style={{ display:"flex", background:C.accentLight, borderRadius:12, padding:3, marginBottom:10 }}>
          {[["simple","かんたん記録"], ["full","しっかり登録"]].map(([key,label]) => (
            <button key={key} onClick={()=>setMode(key)} style={{
              flex:1, padding:"10px 0", borderRadius:9, border:"none", cursor:"pointer",
              background: mode===key ? C.accentDeep : "transparent",
              color: mode===key ? "#fff" : C.accentMidText,
              fontSize:13.5, fontWeight:700,
            }}>{label}</button>
          ))}
        </div>

        <div style={{ fontSize:11.5, color:C.textFaint, marginBottom:16 }}>
          {mode === "simple"
            ? "最低限だけ入力。あとで「精査編集」でゆっくり整えられます。保存時に「要確認」タグが自動で付きます。"
            : "その場で本登録まで完了します。「要確認」タグは付与されません。"}
          {savedCount>0 && ` （このレシートに${savedCount}件保存済み）`}
        </div>

        {/* 写真を先頭に配置：将来のOCR（写真→候補生成）を見据えた導線 */}
        <label style={{ display:"flex", alignItems:"center", gap:12, padding:"14px", borderRadius:14, border:`1.5px dashed ${C.accentMid}`, marginBottom:16, cursor:"pointer", background:C.accentLight }}>
          <input type="file" accept="image/*" onChange={onPickPhoto} style={{ display:"none" }} />
          {photoPreview
            ? <img src={photoPreview} style={{ width:44, height:44, borderRadius:10, objectFit:"cover", flexShrink:0 }} />
            : <span style={{ fontSize:24, flexShrink:0 }}>📷</span>}
          <div style={{ minWidth:0 }}>
            <div style={{ fontSize:13, fontWeight:700, color:C.accentDeep }}>{photoPreview ? "レシート写真を変更" : "レシート写真を追加（任意）"}</div>
            <div style={{ fontSize:10.5, color:C.textSecondary, marginTop:1 }}>今は手入力のみ。将来は写真からの読み取りに対応予定</div>
          </div>
        </label>

        <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>商品名</label>
        <input ref={nameRef} value={name} onChange={e=>setName(e.target.value)} placeholder="商品名"
          style={{ width:"100%", padding:"12px 14px", borderRadius:12, border:`1px solid ${C.border}`, fontSize:15, margin:"6px 0 14px", background:"#fff" }} />

        <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>金額</label>
        <input value={amount} onChange={e=>setAmount(e.target.value.replace(/[^0-9]/g,""))} placeholder="金額" inputMode="numeric"
          style={{ width:"100%", padding:"12px 14px", borderRadius:12, border:`1px solid ${C.border}`, fontSize:15, margin:"6px 0 14px", background:"#fff" }} />

        <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>場所</label>
        {receiptId && <div style={{ fontSize:11, fontWeight:700, color:C.accentDeep, background:C.accentLight, borderRadius:7, padding:"5px 9px", margin:"4px 0 6px", display:"inline-block" }}>※ このレシート全体（他の商品も含む）へ反映されます</div>}
        <div style={{ margin:"6px 0 14px" }}><PlacePicker places={places} value={placeId} onChange={setPlaceId} createPlace={createPlace} /></div>

        <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>購入日・時刻</label>
        {receiptId && <div style={{ fontSize:11, fontWeight:700, color:C.accentDeep, background:C.accentLight, borderRadius:7, padding:"5px 9px", margin:"4px 0 6px", display:"inline-block" }}>※ このレシート全体（他の商品も含む）へ反映されます</div>}
        <div style={{ display:"flex", gap:8, margin:"6px 0 20px" }}>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{ flex:1, padding:"12px 10px", borderRadius:12, border:`1px solid ${C.border}`, fontSize:14, background:"#fff" }} />
          <input type="time" value={time} onChange={e=>setTime(e.target.value)} style={{ flex:1, padding:"12px 10px", borderRadius:12, border:`1px solid ${C.border}`, fontSize:14, background:"#fff" }} />
        </div>

        {mode === "full" && (
          <div style={{ animation:"tomotaFadeIn .15s" }}>
            <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>支払方法</label>
            {receiptId && <div style={{ fontSize:11, fontWeight:700, color:C.accentDeep, background:C.accentLight, borderRadius:7, padding:"5px 9px", margin:"4px 0 6px", display:"inline-block" }}>※ このレシート全体（他の商品も含む）へ反映されます</div>}
            <select value={payMethodId||""} onChange={e=>setPayMethodId(e.target.value||null)}
              style={{ width:"100%", padding:"11px 10px", borderRadius:10, border:`1px solid ${C.border}`, fontSize:14, margin:"6px 0 16px", background:"#fff" }}>
              <option value="">未設定</option>
              {settings.payMethods.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
            </select>

            <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>カテゴリ</label>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", margin:"7px 0 16px" }}>
              {categories.map(c => <TagChip key={c.id} tag={c} small selected={currentCategoryIds.includes(c.id)} onClick={()=>toggleCategory(c.id)} />)}
            </div>

            <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>タグ</label>
            <div onClick={() => setTagPickerOpen(true)} style={{
              minHeight:46, padding:"9px 12px", borderRadius:10, border:`1px solid ${C.border}`, background:"#fff",
              cursor:"pointer", display:"flex", flexWrap:"wrap", gap:6, alignItems:"center", margin:"7px 0 16px",
            }}>
              {currentTagIds.length === 0 && <span style={{ color:C.textFaint, fontSize:13.5, padding:"3px 2px" }}>タグを追加</span>}
              {currentTagIds.map(id => { const t = plainTags.find(x => x.id === id); return t ? <TagPill key={id} tag={t} small /> : null; })}
              <span style={{ marginLeft:"auto", color:C.textFaint, fontSize:15 }}>›</span>
            </div>
            {tagPickerOpen && (
              <TagPicker tags={tags} selectedIds={currentTagIds} onConfirm={applyTagSelection} onClose={() => setTagPickerOpen(false)} createTag={createTag} />
            )}

            <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>メモ</label>
            <textarea value={memo} onChange={e=>setMemo(e.target.value)} rows={3}
              style={{ width:"100%", padding:"11px 13px", borderRadius:10, border:`1px solid ${C.border}`, fontSize:14, margin:"6px 0 16px", background:"#fff", resize:"vertical" }} />

            <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>商品写真（この商品だけの記録用・任意）</label>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap", margin:"7px 0 20px" }}>
              {itemPhotoPreview
                ? (
                  <div style={{ position:"relative" }}>
                    <img src={itemPhotoPreview} style={{ width:56, height:56, borderRadius:10, objectFit:"cover" }} />
                    <button onClick={()=>{ setItemPhotoFile(null); setItemPhotoPreview(null); }} style={{ position:"absolute", top:-6, right:-6, width:20, height:20, borderRadius:"50%", background:C.danger, color:"#fff", border:"none", fontSize:12, cursor:"pointer" }}>×</button>
                  </div>
                )
                : (
                  <label style={{ width:56, height:56, borderRadius:10, border:`1px dashed ${C.border}`, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", fontSize:20, color:C.textFaint }}>
                    <input type="file" accept="image/*" onChange={onPickItemPhoto} style={{ display:"none" }} />＋
                  </label>
                )}
            </div>
          </div>
        )}

        <div style={{ display:"flex", gap:10 }}>
          <button onClick={() => doSave(false)} disabled={!name.trim()||!amount} style={{
            flex:1, padding:"13px 0", borderRadius:12, border:`1px solid ${C.accentDeep}`, background:"#fff",
            color:C.accentDeep, fontSize:14, fontWeight:700, cursor:"pointer", opacity:(!name.trim()||!amount)?0.4:1,
          }}>{btnVerb}してもう1品</button>
          <button onClick={() => doSave(true)} disabled={!name.trim()||!amount} style={{
            flex:1, padding:"13px 0", borderRadius:12, border:"none", background:C.accentDeep,
            color:"#fff", fontSize:14, fontWeight:700, cursor:"pointer", opacity:(!name.trim()||!amount)?0.4:1,
          }}>{btnVerb}して閉じる</button>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// STEP2: 精査編集 ── 編集オーバーレイ
// ══════════════════════════════════════════════════════════════
function EditOverlay({ itemId, items, receipts, tags, places, settings, onClose, onAddToReceipt, updateItem, updateReceipt, applyReceiptCommonFields, deleteItem, duplicateItem, duplicateItemWithinReceipt, addReceiptImage, removeReceiptImage, addItemAttachment, removeItemAttachment, createPlace, createTag, showToast }) {
  const item = items.find(i => i.id === itemId);
  const receipt = receipts.find(r => r.id === item?.receiptId);
  const [draft, setDraft] = useState(() => item ? { ...item } : null);
  const [receiptTime, setReceiptTime] = useState(() => receipt?.time || "");
  const [payMethodId, setPayMethodId] = useState(() => receipt?.payMethodId ?? null);

  useEffect(() => { setDraft(item ? { ...item } : null); setReceiptTime(receipt?.time || ""); }, [itemId]);

  if (!item || !draft) return null;

  const categories = tags.filter(t => t.kind === "category");
  const plainTags  = tags.filter(t => t.kind === "tag");

  const toggleTag = (tagId, isCategory) => {
    setDraft(d => {
      let next = d.tags || [];
      if (isCategory) {
        // カテゴリは単一選択：他のカテゴリタグを外して付け替える
        next = next.filter(id => !categories.some(c => c.id === id));
        next = [...next, tagId];
      } else {
        next = next.includes(tagId) ? next.filter(id => id !== tagId) : [...next, tagId];
      }
      return { ...d, tags: next };
    });
  };

  const [tagPickerOpen, setTagPickerOpen] = useState(false);
  const currentTagIds = (draft.tags||[]).filter(id => plainTags.some(t => t.id === id));
  const currentCategoryIds = (draft.tags||[]).filter(id => categories.some(c => c.id === id));
  const applyTagSelection = (selectedIds) => {
    setDraft(d => ({ ...d, tags: [...currentCategoryIds, ...selectedIds] }));
    setTagPickerOpen(false);
  };

  const commit = () => {
    updateItem(item.id, {
      name: draft.name, amount: Number(draft.amount)||0,
      tags: draft.tags, memo: draft.memo,
    });
    if (receipt) {
      applyReceiptCommonFields(receipt.id, { placeId: draft.placeId, date: draft.purchaseDate, time: receiptTime || null, payMethodId });
    } else {
      // 通常はitemに必ずreceiptが紐づくが、念のためのフォールバック
      updateItem(item.id, { placeId: draft.placeId, purchaseDate: draft.purchaseDate });
    }
  };

  const commitAndClose = () => { commit(); onClose(); };

  const commitAndAddToReceipt = () => { commit(); onAddToReceipt(item.receiptId); };

  const onDuplicateWithinReceipt = () => { commit(); duplicateItemWithinReceipt(item.id); };

  const onDelete = () => {
    if (!window.confirm("この記録を削除しますか？元に戻せません。")) return;
    deleteItem(item.id);
    onClose();
  };

  const onDuplicate = () => { duplicateItem(item.id); };

  const onAddItemPhoto = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const dataUrl = await fileToDataURL(file);
    const id = uid("img");
    await idbSet(id, dataUrl);
    setDraft(d => ({ ...d, attachments: [...(d.attachments||[]), id] }));
    addItemAttachment(item.id, id);
  };
  const onRemoveItemPhoto = (imgId) => {
    setDraft(d => ({ ...d, attachments: (d.attachments||[]).filter(x=>x!==imgId) }));
    removeItemAttachment(item.id, imgId);
    idbDelete(imgId);
  };
  const [confirmDeletePhoto, setConfirmDeletePhoto] = useState(null); // { kind:'item'|'receipt', imgId }
  const executeDeletePhoto = () => {
    if (!confirmDeletePhoto) return;
    if (confirmDeletePhoto.kind === "item") onRemoveItemPhoto(confirmDeletePhoto.imgId);
    else removeReceiptImage(receipt.id, confirmDeletePhoto.imgId);
    setConfirmDeletePhoto(null);
  };

  const onAddReceiptPhoto = async (e) => {
    const file = e.target.files?.[0];
    if (!file || !receipt) return;
    const dataUrl = await fileToDataURL(file);
    const id = uid("img");
    await idbSet(id, dataUrl);
    addReceiptImage(receipt.id, id);
  };

  return (
    <div style={{ position:"fixed", inset:0, background:C.bg, zIndex:250, display:"flex", flexDirection:"column" }}>
      <SubHeader title="精査編集" onBack={commitAndClose} right={
        <div style={{ display:"flex", gap:14 }}>
          <button onClick={onDuplicate} style={{ background:"none", border:"none", color:C.accentMidText, fontSize:13, fontWeight:700, cursor:"pointer" }}>新しい記録として複写</button>
          <button onClick={onDelete} style={{ background:"none", border:"none", color:C.danger, fontSize:13, fontWeight:700, cursor:"pointer" }}>削除</button>
        </div>
      } />
      <div style={{ flex:1, overflowY:"auto", padding:"16px 16px 100px" }}>
        <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>商品名</label>
        <input value={draft.name} onChange={e=>setDraft({...draft,name:e.target.value})}
          style={{ width:"100%", padding:"11px 13px", borderRadius:10, border:`1px solid ${C.border}`, fontSize:15, margin:"6px 0 14px", background:"#fff" }} />

        <label style={{ fontSize:11.5, fontWeight:700, color:C.textSecondary }}>金額</label>
        <input value={draft.amount} onChange={e=>setDraft({...draft,amount:e.target.value.replace(/[^0-9]/g,"")})} inputMode="numeric"

const RESTORE_TRIGGERS = ["復元", "ふくげん", "フクゲン"];
function isValidRestoreTrigger(text) {
  const t = (text || "").trim();
  return RESTORE_TRIGGERS.includes(t) || t.toLowerCase() === "fukugen";
}

async function collectAllImageIds(items, receipts) {
  const ids = new Set();
  receipts.forEach(r => (r.images || []).forEach(id => ids.add(id)));
  items.forEach(it => (it.attachments || []).forEach(id => ids.add(id)));
  return [...ids];
}

async function buildBackupPayload(items, receipts, tags, places, settings, dayNotes) {
  const imageIds = await collectAllImageIds(items, receipts);
  const images = [];
  for (const id of imageIds) {
    const dataUrl = await idbGet(id).catch(() => null);
    if (dataUrl) images.push({ id, dataUrl });
  }
  return { version: DATA_VERSION, exportedAt: nowISO(), items, receipts, tags, places, settings, dayNotes: dayNotes||{}, images };
}

async function writeBackupFile(payload) {
  const dateStr = todayStr().replace(/-/g, "");
  const base = `${dateStr}_ともたろぐ_最新`;
  let JSZipLib = null;
  try { JSZipLib = await loadJSZip(); } catch {}
  if (JSZipLib) {
    const zip = new JSZipLib();
    zip.file("tomotalog_backup.json", JSON.stringify(payload));
    const blob = await zip.generateAsync({ type: "blob" });
    downloadBlob(blob, base + ".zip");
  } else {
    const blob = new Blob([JSON.stringify(payload)], { type: "application/json" });
    downloadBlob(blob, base + ".json");
  }
}

async function rotateInternalSnapshot(payload) {
  const prevLatest = await idbGet("backup:latest").catch(() => null);
  if (prevLatest) await idbSet("backup:prev", prevLatest);
  await idbSet("backup:latest", payload);
}

async function parseBackupFile(file) {
  let payload;
  if (file.name.toLowerCase().endsWith(".zip")) {
    const JSZipLib = await loadJSZip();
    const zip = await JSZipLib.loadAsync(file);
    const jsonFile = zip.file("tomotalog_backup.json") || zip.file(Object.keys(zip.files).find(n => n.endsWith(".json")));
    if (!jsonFile) throw new Error("バックアップ形式が不正です（jsonが見つかりません）");
    payload = JSON.parse(await jsonFile.async("string"));
  } else {
    const text = await file.text();
    payload = JSON.parse(text);
  }
  if (!payload || !Array.isArray(payload.items) || !Array.isArray(payload.receipts)) {
    throw new Error("バックアップの内容を読み取れませんでした");
  }
  return payload;
}

        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:6, padding:"8px 16px", fontSize:10.5, color:C.textFaint, borderBottom:`1px solid ${C.border}` }}>
          <span>
            {current ? `最終取込 ${new Date(current.importedAt).toLocaleString("ja-JP")}${current.fileName?`・${current.fileName}`:""}` : "取込データなし"}
          </span>
          <div style={{ display:"flex", gap:12 }}>
            {(history.length>0 || meta?.completedAt) && (

                    )}
                    <div style={{ fontSize:14, fontWeight:800, color: place?C.textPrimary:C.warn }}>
                      {place ? `${place.category?`${place.category}・`:""}${place.brand}${place.branch?`（${place.branch}）`:""}` : "📍 未登録の場所"}
                    </div>
                    {place && place.googleCategory && (
                      <div style={{ fontSize:10.5, color:C.accentDeep, marginTop:1 }}>{place.googleCategory}</div>
                    )}
                    <div style={{ fontSize:11, color:C.textFaint, marginTop:3 }}>
                      {timeLabel}　・　滞在 {durationLabel(r.startTime, r.endTime)}
                      {r.continuesToNextDay && <span style={{ color:C.accentMidText, fontWeight:700 }}>　・　翌日へ続く</span>}
                    </div>
                  </div>
                  {!place && <span style={{ fontSize:11, fontWeight:700, color:C.warn, whiteSpace:"nowrap" }}>登録 ›</span>}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Googleタイムライン研究室（入口） ──
function TimelineLabScreen({ onClose, showToast }) {
  const [places, setPlaces] = useState([]);
  const [dayStore, setDayStore] = useState({});
  const [importSummary, setImportSummary] = useState(null);
  const [loading, setLoading] = useState(true);
  const [dayView, setDayView] = useState(null); // 選択中の日付
  const [registerTarget, setRegisterTarget] = useState(null);
  const [confirmReset, setConfirmReset] = useState(false);
  const [confirmDeleteJson, setConfirmDeleteJson] = useState(false);
  const [importing, setImporting] = useState(false);
  const [reimporting, setReimporting] = useState(false);
  const [reimportTargetDay, setReimportTargetDay] = useState(null);
  const [importRange, setImportRange] = useState(() => loadLS(TIMELINE_LS_KEYS.settings, {}) && {
    startDate: loadLS(TIMELINE_LS_KEYS.settings, {}).importRangeStart ?? TIMELINE_DEFAULT_IMPORT_RANGE_START,
    endDate: loadLS(TIMELINE_LS_KEYS.settings, {}).importRangeEnd ?? null,
  });
  const [sortId, setSortId] = useState("default");
  const [onlyUnregistered, setOnlyUnregistered] = useState(false);
  const [expandedYears, setExpandedYears] = useState(() => new Set());
  const [expandedMonths, setExpandedMonths] = useState(() => new Set());
  const jsonInputRef = useRef();

  useEffect(() => {
    (async () => {
      const [rawPlaces, store] = await Promise.all([
        idbGet(TIMELINE_IDB_KEYS.places).catch(()=>null),
        migrateTimelineDayStoreOnLoad(),
      ]);
      const migratedPlaces = migrateTimelinePlaces(rawPlaces || []);
      if (JSON.stringify(migratedPlaces) !== JSON.stringify(rawPlaces || [])) await idbSet(TIMELINE_IDB_KEYS.places, migratedPlaces);
      setPlaces(migratedPlaces);
      const now = Date.now();
      const recomputedStore = recomputeAllDayMeta(store, migratedPlaces, now);
      setDayStore(recomputedStore);
      if (JSON.stringify(recomputedStore) !== JSON.stringify(store)) await idbSet(TIMELINE_IDB_KEYS.dayStore, recomputedStore);
      const summary = await idbGet(TIMELINE_IDB_KEYS.importSummary).catch(()=>null);
      setImportSummary(summary || null);
      setLoading(false);
    })();
  }, []);

  const updateImportRange = (patch) => {
    setImportRange(prev => {
      const next = { ...prev, ...patch };
      saveLS(TIMELINE_LS_KEYS.settings, { importRangeStart: next.startDate || null, importRangeEnd: next.endDate || null });
      return next;
    });
  };

  const sampleDayStoreRaw = useMemo(() => {
    const grouped = {};
    SAMPLE_TIMELINE_RAW.forEach(rec => { const d = dateOnly(rec.startTime); (grouped[d]=grouped[d]||[]).push(rec); });
    const now = Date.now();
    const store = {};
    Object.entries(grouped).forEach(([day, recs]) => { store[day] = { entries:[{ id:"sample", status:"current", importedAt: now, fileName:null, records: recs }], meta: emptyDayMeta(now) }; });
    return store;
  }, []);
  const isSample = Object.keys(dayStore).length === 0;
  const effectiveDayStore = useMemo(() => isSample ? recomputeAllDayMeta(sampleDayStoreRaw, places, Date.now()) : dayStore, [isSample, sampleDayStoreRaw, dayStore, places]);

  const dayKeys = useMemo(() => Object.keys(effectiveDayStore).sort(), [effectiveDayStore]);
  const dayInfo = useMemo(() => {
    const info = {};
    dayKeys.forEach(d => { const b = effectiveDayStore[d]; info[d] = { unregisteredCount: b._unregisteredCount ?? 0, totalVisits: b._totalVisits ?? 0, meta: b.meta }; });
    return info;
  }, [dayKeys, effectiveDayStore]);
  const tree = useMemo(() => buildTimelineTree(dayKeys, dayInfo, sortId, onlyUnregistered), [dayKeys, dayInfo, sortId, onlyUnregistered]);
  const allCurrentRawRecords = useMemo(() => dayKeys.flatMap(d => currentEntryOf(effectiveDayStore[d])?.records || []), [dayKeys, effectiveDayStore]);
  const allParsedRecords = useMemo(() => parseTimelineJSON(allCurrentRawRecords), [allCurrentRawRecords]);
  const byDay = useMemo(() => groupTimelineByDay(allParsedRecords), [allParsedRecords]);
  const allVisits = useMemo(() => allParsedRecords.filter(r => r.kind === "visit"), [allParsedRecords]);

  const toggleYear = (y) => setExpandedYears(prev => { const n = new Set(prev); n.has(y) ? n.delete(y) : n.add(y); return n; });
  const toggleMonth = (m) => setExpandedMonths(prev => { const n = new Set(prev); n.has(m) ? n.delete(m) : n.add(m); return n; });

  const handleRegister = async (form) => {
    const visit = registerTarget;
    const now = Date.now();
    const already = places.find(p => (p.placeIds||[]).includes(visit.googlePlaceId));
    const nextPlaces = already
      ? places.map(p => p.id === already.id ? { ...p, ...form, updatedAt: now } : p)
      : [...places, { id: uid("tlp"), placeIds:[visit.googlePlaceId], lat: visit.lat, lng: visit.lng, ...form, registeredAt: now, updatedAt: now }];
    setPlaces(nextPlaces);
    await idbSet(TIMELINE_IDB_KEYS.places, nextPlaces);

    let newlyCompletedCount = 0;
    if (!isSample) {
      const nextStore = recomputeAllDayMeta(dayStore, nextPlaces, now);
      Object.entries(nextStore).forEach(([d, b]) => {
        if (b.meta.currentlyComplete && !(dayStore[d]?.meta?.currentlyComplete)) newlyCompletedCount++;
      });
      setDayStore(nextStore);
      await idbSet(TIMELINE_IDB_KEYS.dayStore, nextStore);
    }
    setRegisterTarget(null);
    showToast(newlyCompletedCount > 1
      ? `研究用場所図鑑に登録しました。同じPlace IDの記録が一気に反映され、${newlyCompletedCount}日分が完了になりました`
      : "研究用場所図鑑に登録しました。同じPlace IDの記録すべてに反映されます");
  };

  const executeReset = async () => {
    await idbDelete(TIMELINE_IDB_KEYS.places);
    await idbDelete(TIMELINE_IDB_KEYS.dayStore);
    await idbDelete(TIMELINE_IDB_KEYS.importSummary);
    await idbDelete(TIMELINE_IDB_KEYS.rawRecordsLegacy);
    setPlaces([]);
    setDayStore({});
    setImportSummary(null);
    setDayView(null);
    setConfirmReset(false);
    showToast("研究データを初期化しました");
  };

  const executeDeleteJson = async () => {
    await idbDelete(TIMELINE_IDB_KEYS.dayStore);
    await idbDelete(TIMELINE_IDB_KEYS.importSummary);
    setDayStore({});
    setImportSummary(null);
    setDayView(null);
    setConfirmDeleteJson(false);
    if (jsonInputRef.current) jsonInputRef.current.value = "";
    showToast("取込済みのタイムラインデータをすべて削除しました。固定サンプルの表示に戻ります");
  };

  // ④ 全体JSON取込：指定期間内のみを対象とし、既存日（すでにcurrentエントリがある日）は
  // 上書きしない（意図的な上書きは⑤の「この日だけ再取込」を使う）。
  const onPickJsonFile = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setImporting(true);
    try {
      const text = await readFileAsText(file);
      const parsed = JSON.parse(text);
      const rawArray = extractTimelineRawRecords(parsed);
      if (!rawArray) throw new Error("unsupported-shape");
      const totalInSource = rawArray.length;
      const rangeStart = importRange.startDate || null;
      const rangeEnd = importRange.endDate || null;
      const included = rawArray.filter(rec => isWithinImportRange(dateOnly(rec.startTime), rangeStart, rangeEnd));
      if (included.length === 0) throw new Error("no-records-in-range");

      const byDayRaw = {};
      included.forEach(rec => { const d = dateOnly(rec.startTime); (byDayRaw[d] = byDayRaw[d] || []).push(rec); });
      const now = Date.now();
      let newDaysCount = 0, skippedDaysCount = 0;
      const nextStore = { ...dayStore };
      Object.entries(byDayRaw).forEach(([day, recs]) => {
        if (nextStore[day] && currentEntryOf(nextStore[day])) { skippedDaysCount++; return; }
        nextStore[day] = {
          entries: [ ...(nextStore[day]?.entries || []), { id: uid("tle"), status:"current", importedAt: now, fileName: file.name, records: recs } ],
          meta: nextStore[day]?.meta || emptyDayMeta(now),
        };
        newDaysCount++;
      });
      const recomputedStore = recomputeAllDayMeta(nextStore, places, now);
      setDayStore(recomputedStore);
      await idbSet(TIMELINE_IDB_KEYS.dayStore, recomputedStore);

      const summary = {
        totalInSource, includedCount: included.length, excludedCount: totalInSource - included.length,
        rangeStart, rangeEnd, importedAt: now, fileName: file.name, newDaysCount, skippedDaysCount,
      };
      setImportSummary(summary);
      await idbSet(TIMELINE_IDB_KEYS.importSummary, summary);
      setDayView(null);
      showToast(newDaysCount > 0
        ? `Googleタイムラインを取り込みました（新規${newDaysCount}日・対象外${totalInSource - included.length}件）`
        : `新規に追加できる日はありませんでした（${skippedDaysCount}日は取込済みのためスキップ）`);
    } catch (err) {
      showToast(err && err.message === "unsupported-shape"
        ? "対応していないJSON形式です（semanticSegments形式のファイルをお試しください）"
        : err && err.message === "no-records-in-range"
          ? "指定した期間内に取込可能な記録がありませんでした"
          : "JSONの読み込みに失敗しました");
    } finally {
      setImporting(false);
      if (jsonInputRef.current) jsonInputRef.current.value = "";
    }
  };

  // ⑤⑥ 日付単位インポート：指定日のみを対象に、旧データをstatus="old"として残し新データを追加する
  const onReimportDay = async (targetDay, file) => {
    setReimportTargetDay(targetDay);
    setReimporting(true);
    try {
      const text = await readFileAsText(file);
      const parsed = JSON.parse(text);
      const rawArray = extractTimelineRawRecords(parsed);
      if (!rawArray) throw new Error("unsupported-shape");
      const dayRecords = rawArray.filter(rec => dateOnly(rec.startTime) === targetDay);
      if (dayRecords.length === 0) throw new Error("day-not-found");
      const now = Date.now();
      const bucket = dayStore[targetDay] || { entries: [], meta: emptyDayMeta(now) };
      const archivedEntries = bucket.entries.map(en => en.status === "current" ? { ...en, status:"old" } : en);
      const newEntries = [ ...archivedEntries, { id: uid("tle"), status:"current", importedAt: now, fileName: file.name, records: dayRecords } ];
      const nextBucketRaw = { entries: newEntries, meta: { ...bucket.meta, lastEditedAt: now } };
      const nextBucket = recomputeDayMeta(nextBucketRaw, places, now);
      const nextStore = { ...dayStore, [targetDay]: nextBucket };
      setDayStore(nextStore);
      await idbSet(TIMELINE_IDB_KEYS.dayStore, nextStore);
      showToast(`${targetDay}のデータを再取込しました（${dayRecords.length}件・旧データは履歴として保持されます）`);
    } catch (err) {
      showToast(err && err.message === "unsupported-shape" ? "対応していないJSON形式です"
        : err && err.message === "day-not-found" ? `選択したJSONに${targetDay}のデータが見つかりませんでした`
        : "JSONの読み込みに失敗しました");
    } finally {
      setReimporting(false);
      setReimportTargetDay(null);
    }
  };

  if (dayView) {
    return (
      <>
        <TimelineDayView day={dayView} dayBucket={effectiveDayStore[dayView]} records={byDay[dayView]||[]} places={places} dayKeys={dayKeys}
          onChangeDay={setDayView} onClose={()=>setDayView(null)} onRegister={setRegisterTarget}
          onReimportDay={onReimportDay} isSample={isSample} reimporting={reimporting && reimportTargetDay===dayView} />
        {registerTarget && (
          <TimelineRegisterOverlay visit={registerTarget} allVisits={allVisits}
            onClose={()=>setRegisterTarget(null)} onSave={handleRegister} />
        )}
      </>
    );
  }

  return (
    <div style={{ padding:"16px 16px 100px" }}>
      <SubHeader title="🛰 Googleタイムライン研究室" onBack={onClose} />
      <div style={{ padding:"16px 0" }}>
        <div style={{ fontSize:11.5, color:C.textFaint, background:C.card, border:`1px dashed ${C.border}`, borderRadius:10, padding:"10px 12px", marginBottom:12 }}>
          正式な生活ログ・場所図鑑とは完全に分離した検証用データです。目的は「場所図鑑を育てる」体験を検証することです。
        </div>

        {isSample && (
          <div style={{ fontSize:11.5, color:C.textFaint, background:C.bg, border:`1px solid ${C.border}`, borderRadius:10, padding:"9px 12px", marginBottom:14 }}>
            サンプルデータを表示中です（JSON未取込）
          </div>
        )}
        {importSummary && (
          <div style={{ fontSize:11, color:C.textSecondary, background:C.card, border:`1px solid ${C.border}`, borderRadius:10, padding:"10px 12px", marginBottom:14 }}>
            <div style={{ fontWeight:700, color:C.accentDeep, marginBottom:4 }}>直近の全体取込結果　{new Date(importSummary.importedAt).toLocaleString("ja-JP")}</div>
            <div style={{ display:"flex", justifyContent:"space-between" }}><span>元JSON</span><span>{importSummary.totalInSource.toLocaleString()}件</span></div>
            <div style={{ display:"flex", justifyContent:"space-between" }}><span>取込対象</span><span>{importSummary.includedCount.toLocaleString()}件</span></div>
            <div style={{ display:"flex", justifyContent:"space-between" }}><span>対象外</span><span>{importSummary.excludedCount.toLocaleString()}件</span></div>
            <div style={{ display:"flex", justifyContent:"space-between" }}><span>対象期間</span><span>{importSummary.rangeStart||"指定なし"}〜{importSummary.rangeEnd||""}</span></div>
            <div style={{ color:C.textFaint, marginTop:4 }}>新規追加：{importSummary.newDaysCount}日　・　既存のためスキップ：{importSummary.skippedDaysCount}日　・　{importSummary.fileName}</div>
          </div>
        )}

        <div style={{ display:"flex", gap:8, marginBottom:8 }}>
          <div style={{ flex:1 }}>
            <label style={{ fontSize:10.5, color:C.textSecondary, fontWeight:700, display:"block", marginBottom:3 }}>取込開始日</label>
            <input type="date" value={importRange.startDate||""} onChange={e=>updateImportRange({ startDate: e.target.value || null })}
              style={{ width:"100%", padding:"7px 8px", borderRadius:8, border:`1px solid ${C.border}`, fontSize:12.5, background:"#fff" }} />
          </div>
          <div style={{ flex:1 }}>
            <label style={{ fontSize:10.5, color:C.textSecondary, fontWeight:700, display:"block", marginBottom:3 }}>終了日（任意）</label>
            <input type="date" value={importRange.endDate||""} onChange={e=>updateImportRange({ endDate: e.target.value || null })}
              style={{ width:"100%", padding:"7px 8px", borderRadius:8, border:`1px solid ${C.border}`, fontSize:12.5, background:"#fff" }} />
          </div>
        </div>
        <div style={{ fontSize:10, color:C.textFaint, marginBottom:10 }}>次にJSONを選択したときの取込範囲です。開始日より前のデータは保存されません（削除ではなく対象外）</div>

        <div style={{ display:"flex", gap:8, marginBottom:10 }}>
          <label style={{
            flex:1, textAlign:"center", padding:"11px 0", borderRadius:12, border:`1px solid ${C.accentDeep}`, background: importing?C.accentLight:"#fff",
            color:C.accentDeep, fontSize:12.5, fontWeight:700, cursor: importing?"default":"pointer", display:"block",
          }}>
            {importing ? "読込中…" : "JSON選択"}
            <input ref={jsonInputRef} type="file" accept=".json,application/json" onChange={onPickJsonFile} disabled={importing} style={{ display:"none" }} />
          </label>
        </div>
        {!isSample && (
          <button onClick={()=>setConfirmDeleteJson(true)} style={{ background:"none", border:"none", color:C.danger, fontSize:12, fontWeight:700, cursor:"pointer", padding:0, marginBottom:14 }}>
            取込済みのタイムラインデータをすべて削除する
          </button>
        )}

        <div style={{ fontSize:12, fontWeight:700, color:C.textSecondary, margin:"10px 0 8px" }}>
          {isSample ? `固定サンプルで画面を確認（${dayKeys.length}日分）` : `取り込んだデータ（${dayKeys.length}日分）`}
        </div>

        <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap", marginBottom:10 }}>
          <select value={sortId} onChange={e=>setSortId(e.target.value)} style={{ fontSize:12, padding:"7px 8px", borderRadius:8, border:`1px solid ${C.border}`, background:"#fff" }}>
            {TIMELINE_DAY_SORTS.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
          </select>
          <label style={{ display:"flex", alignItems:"center", gap:5, fontSize:12, color:C.textSecondary }}>
            <input type="checkbox" checked={onlyUnregistered} onChange={e=>setOnlyUnregistered(e.target.checked)} />
            未登録がある日だけ
          </label>
        </div>

        {tree.length === 0 && <div style={{ fontSize:12.5, color:C.textFaint, padding:"10px 0" }}>該当する日がありません</div>}

        {tree.map(yearNode => {
          const yOpen = onlyUnregistered || expandedYears.has(yearNode.year);
          return (
            <div key={yearNode.year} style={{ marginBottom:6 }}>
              <button onClick={()=>toggleYear(yearNode.year)} style={{ width:"100%", textAlign:"left", padding:"10px 12px", borderRadius:10, border:`1px solid ${C.border}`, background:C.card, cursor:"pointer" }}>
                <span style={{ fontSize:13.5, fontWeight:800, color:C.textPrimary }}>{yOpen?"▼":"▶"} {yearNode.year}年{yearNode.complete && " ✅"}</span>
              </button>
              {yOpen && yearNode.months.map(monthNode => {
                const mKey = `${yearNode.year}-${monthNode.month}`;
                const mOpen = onlyUnregistered || expandedMonths.has(mKey);
                return (
                  <div key={mKey} style={{ marginLeft:14, marginTop:4 }}>
                    <button onClick={()=>toggleMonth(mKey)} style={{ width:"100%", textAlign:"left", padding:"8px 12px", borderRadius:10, border:`1px solid ${C.border}`, background:"#fff", cursor:"pointer" }}>
                      <span style={{ fontSize:12.5, fontWeight:700, color:C.textSecondary }}>{mOpen?"▼":"▶"} {Number(monthNode.month)}月{monthNode.complete && " ✅"}</span>
                    </button>
                    {mOpen && (
                      <div style={{ marginLeft:14, marginTop:4 }}>
                        {monthNode.days.map(d => {
                          const info = dayInfo[d];
                          return (
                            <button key={d} onClick={()=>setDayView(d)} style={{
                              width:"100%", textAlign:"left", display:"flex", justifyContent:"space-between", alignItems:"center",
                              padding:"10px 12px", borderRadius:10, border:`1px solid ${C.border}`, background:C.card, marginBottom:6, cursor:"pointer",
                            }}>
                              <span style={{ fontSize:13, fontWeight:700, color:C.textPrimary }}>{d}{info?.meta?.currentlyComplete ? " ✅" : ""}</span>
                              <span style={{ fontSize:11, color: info?.unregisteredCount>0 ? C.warn : C.textFaint }}>
                                {info?.unregisteredCount>0 ? `未登録${info.unregisteredCount}件` : "登録済み"}　・　{info?.totalVisits}件 ›
                              </span>
                            </button>
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}

        <div style={{ borderTop:`1px solid ${C.border}`, marginTop:20, paddingTop:16 }}>
          <div style={{ fontSize:12, fontWeight:700, color:C.textSecondary, marginBottom:8 }}>研究用場所図鑑（{loading?"…":places.length}件）</div>
          {!loading && places.map(p => (
            <div key={p.id} style={{ padding:"9px 12px", background:C.card, borderRadius:10, marginBottom:6, fontSize:12.5 }}>
              {p.category?`${p.category}・`:""}{p.brand}{p.branch?`（${p.branch}）`:""}
              {p.googleCategory && <span style={{ marginLeft:6, fontSize:10.5, color:C.accentDeep }}>[{p.googleCategory}]</span>}
              <div style={{ color:C.textFaint, fontSize:10.5, marginTop:2 }}>{(p.placeIds||[]).join("、 ")}</div>
            </div>
          ))}
          {!loading && places.length === 0 && <div style={{ fontSize:12, color:C.textFaint }}>まだ登録がありません</div>}

          <button onClick={()=>setConfirmReset(true)} style={{ marginTop:14, background:"none", border:"none", color:C.danger, fontSize:12.5, fontWeight:700, cursor:"pointer" }}>研究データを初期化する（取込データ・場所図鑑をすべて削除）</button>
        </div>
      </div>

      {confirmReset && (
        <ConfirmDialog title="研究データを初期化しますか？"
          message="研究用場所図鑑・取込済みのタイムラインデータ（履歴を含む）がすべて削除されます。正式な生活ログ・場所図鑑には影響しません。元に戻せません。"
          onCancel={()=>setConfirmReset(false)} onConfirm={executeReset} />
      )}
      {confirmDeleteJson && (
        <ConfirmDialog title="取込済みのタイムラインデータを削除しますか？"
          message="取り込んだGoogleタイムラインデータ（履歴を含む）が削除され、固定サンプルの表示に戻ります。研究用場所図鑑は削除されません。元に戻せません。"
          onCancel={()=>setConfirmDeleteJson(false)} onConfirm={executeDeleteJson} />
      )}
    </div>
  );
}


function SettingsView({ items, receipts, tags, places, settings, setSettings, dayNotes, applyRestoredData, showToast }) {
  const [newPayName, setNewPayName] = useState("");
  const [newPayDateRule, setNewPayDateRule] = useState("sameAsPurchase");
  const [newPayRequiresReconciliation, setNewPayRequiresReconciliation] = useState(false);
  const [editingPayId, setEditingPayId] = useState(null);
  const [editPayName, setEditPayName] = useState("");
  const [editPayDateRule, setEditPayDateRule] = useState("sameAsPurchase");
  const [editPayRequiresReconciliation, setEditPayRequiresReconciliation] = useState(false);
  const [confirmDeletePay, setConfirmDeletePay] = useState(null);
  const [lastBackupAt, setLastBackupAt] = useState(null);
  const [restoreStep, setRestoreStep] = useState(0); // 0=none 1=file選択済み確認 2=確認文字列入力
  const [restoreFile, setRestoreFile] = useState(null);
  const [restoreText, setRestoreText] = useState("");
  const [busy, setBusy] = useState(false);
  const fileInputRef = useRef();

  useEffect(() => {
    idbGet("backup:latest").then(v => { if (v?.exportedAt) setLastBackupAt(v.exportedAt); }).catch(()=>{});
  }, []);

  const addPay = () => {
    const name = newPayName.trim();
    if (!name) return;
    if (settings.payMethods.some(p => p.name === name)) { showToast("同名の支払方法が既にあります"); return; }
    setSettings(prev => ({ ...prev, payMethods: [...prev.payMethods, {
      id: uid("pm"), name, dateRule: newPayDateRule, requiresReconciliation: newPayRequiresReconciliation,
    }] }));
    setNewPayName(""); setNewPayDateRule("sameAsPurchase"); setNewPayRequiresReconciliation(false);
    showToast("追加しました");
  };
  const startEditPay = (p) => { setEditingPayId(p.id); setEditPayName(p.name); setEditPayDateRule(p.dateRule); setEditPayRequiresReconciliation(!!p.requiresReconciliation); };
  const saveEditPay = () => {
    const name = editPayName.trim();
    if (!name) return;
    if (settings.payMethods.some(p => p.name===name && p.id!==editingPayId)) { showToast("同名の支払方法が既にあります"); return; }
    setSettings(prev => ({ ...prev, payMethods: prev.payMethods.map(p => p.id===editingPayId
      ? { ...p, name, dateRule: editPayDateRule, requiresReconciliation: editPayRequiresReconciliation } : p) }));
    setEditingPayId(null);
  };
  const requestRemovePay = (p) => setConfirmDeletePay(p);
  const executeRemovePay = () => {
    const p = confirmDeletePay;
    if (!p) return;
    setSettings(prev => ({ ...prev, payMethods: prev.payMethods.filter(x => x.id !== p.id) }));
    setConfirmDeletePay(null);
    showToast("削除しました");
    // 使用中だったレシートのpayMethodIdは参照切れとなり、表示上は「未設定」扱いになる（データそのものは残る）
  };

  const doBackup = async () => {
    setBusy(true);
    try {
      const payload = await buildBackupPayload(items, receipts, tags, places, settings, dayNotes);
      await rotateInternalSnapshot(payload);
      await writeBackupFile(payload);
      setLastBackupAt(payload.exportedAt);
      showToast("バックアップを作成しました");
    } catch (e) {
      showToast("バックアップに失敗しました");
    } finally { setBusy(false); }
  };

  const onPickRestoreFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setRestoreFile(file);
    setRestoreStep(1);
  };

  const confirmRestoreStep1 = () => { setRestoreStep(2); };
  const cancelRestore = () => { setRestoreStep(0); setRestoreFile(null); setRestoreText(""); if (fileInputRef.current) fileInputRef.current.value=""; };

  const doRestore = async () => {
    if (!isValidRestoreTrigger(restoreText)) { showToast("確認文字列が一致しません"); return; }
    setBusy(true);
    try {
      const payload = await parseBackupFile(restoreFile); // 検証まで完了するまで何も書き換えない
      const currentSnapshot = await buildBackupPayload(items, receipts, tags, places, settings, dayNotes);
      await rotateInternalSnapshot(currentSnapshot); // 復元前の自動バックアップ
      for (const img of (payload.images || [])) { await idbSet(img.id, img.dataUrl); }
      applyRestoredData(payload); // ここで初めてlocalStorage状態を書き換える
      showToast("復元しました");
      cancelRestore();
    } catch (e) {
      showToast("復元に失敗しました（データは変更されていません）");
    } finally { setBusy(false); }
  };

  return (
    <div style={{ padding:"14px 16px 110px" }}>
      <div style={{ fontSize:12, fontWeight:700, color:C.textSecondary, marginBottom:8 }}>場所マスター</div>
      <div style={UI.cardFloat({ padding:"12px 14px", marginBottom:22, fontSize:12.5, color:C.textSecondary })}>
        店名・場所の登録や編集は、メニューの「場所図鑑」から行えます。現在 {places.length} 件登録されています。
      </div>

      <div style={{ fontSize:12, fontWeight:700, color:C.textSecondary, marginBottom:8 }}>支払方法</div>
      <div style={{ marginBottom:10 }}>
        {settings.payMethods.map(p => {
          const usage = receipts.filter(r => r.payMethodId === p.id).length;
          const editing = editingPayId === p.id;
          if (editing) {
            return (
              <div key={p.id} style={UI.cardFloat({ padding:12, marginBottom:6 })}>
                <input value={editPayName} onChange={e=>setEditPayName(e.target.value)} placeholder="支払方法名"
                  style={{ width:"100%", padding:"8px 10px", borderRadius:8, border:`1px solid ${C.border}`, fontSize:13.5, marginBottom:6, background:"#fff" }} />
                <select value={editPayDateRule} onChange={e=>setEditPayDateRule(e.target.value)}
                  style={{ width:"100%", padding:"8px 10px", borderRadius:8, border:`1px solid ${C.border}`, fontSize:13, marginBottom:6, background:"#fff" }}>
                  <option value="sameAsPurchase">支払日：購入日と同じ</option>
                  <option value="manual">支払日：自分で入力</option>
                </select>
                <label style={{ display:"flex", alignItems:"center", gap:6, fontSize:12.5, color:C.textSecondary, marginBottom:8 }}>
                  <input type="checkbox" checked={editPayRequiresReconciliation} onChange={e=>setEditPayRequiresReconciliation(e.target.checked)} />
                  カード管理画面の対象にする（請求明細との照合が必要な支払方法）
                </label>
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={()=>setEditingPayId(null)} style={{ flex:1, padding:"8px 0", borderRadius:8, border:`1px solid ${C.border}`, background:"#fff", fontSize:12.5, cursor:"pointer" }}>キャンセル</button>
                  <button onClick={saveEditPay} style={{ flex:1, padding:"8px 0", borderRadius:8, border:"none", background:C.accentDeep, color:"#fff", fontSize:12.5, fontWeight:700, cursor:"pointer" }}>保存</button>
                </div>
              </div>
            );
          }
          return (
            <div key={p.id} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"11px 14px", background:C.card, borderRadius:10, marginBottom:6 }}>
              <div style={{ minWidth:0 }}>
                <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
                  <span style={{ fontSize:14, fontWeight:600, color:C.textPrimary }}>{p.name}</span>
                  {p.requiresReconciliation && <span style={{ fontSize:9.5, fontWeight:700, color:C.accentDeep, background:C.accentLight, borderRadius:99, padding:"1px 6px" }}>カード管理対象</span>}
                </div>
                <div style={{ fontSize:11, color:C.textFaint, marginTop:2 }}>
                  {p.dateRule === "manual" ? "支払日：自分で入力" : "支払日：購入日と同じ"}　・　{usage}件で使用
                </div>
              </div>
              <div style={{ display:"flex", gap:10, flexShrink:0 }}>
                <button onClick={() => startEditPay(p)} style={{ background:"none", border:"none", color:C.accentMidText, fontSize:12, fontWeight:700, cursor:"pointer" }}>編集</button>
                <button onClick={() => requestRemovePay(p)} style={{ background:"none", border:"none", color:C.danger, fontSize:12, fontWeight:700, cursor:"pointer" }}>削除</button>
              </div>
            </div>
          );
        })}
        {settings.payMethods.length === 0 && <span style={{ fontSize:12.5, color:C.textFaint }}>まだ登録がありません</span>}
      </div>
      <div style={UI.cardFloat({ padding:12, marginBottom:26 })}>
        <input value={newPayName} onChange={e=>setNewPayName(e.target.value)} placeholder="例：クレジットカード"
          style={{ width:"100%", padding:"9px 11px", borderRadius:9, border:`1px solid ${C.border}`, fontSize:13.5, marginBottom:7, background:"#fff" }} />
        <select value={newPayDateRule} onChange={e=>setNewPayDateRule(e.target.value)}
          style={{ width:"100%", padding:"9px 8px", borderRadius:9, border:`1px solid ${C.border}`, fontSize:13, marginBottom:7, background:"#fff" }}>
          <option value="sameAsPurchase">支払日：購入日と同じ</option>
          <option value="manual">支払日：自分で入力</option>
        </select>
        <label style={{ display:"flex", alignItems:"center", gap:6, fontSize:12.5, color:C.textSecondary, marginBottom:8 }}>
          <input type="checkbox" checked={newPayRequiresReconciliation} onChange={e=>setNewPayRequiresReconciliation(e.target.checked)} />
          カード管理画面の対象にする（請求明細との照合が必要な支払方法）
        </label>
        <button onClick={addPay} style={{ width:"100%", background:C.accentDeep, color:"#fff", border:"none", borderRadius:10, padding:"10px 0", fontSize:13.5, fontWeight:700, cursor:"pointer" }}>追加</button>
      </div>

      {confirmDeletePay && (
        <ConfirmDialog
          title="この支払方法を削除しますか？"
          message={(() => {
            const usage = receipts.filter(r => r.payMethodId === confirmDeletePay.id).length;
            return usage > 0
              ? `${usage}件のレシートで使用中です。削除すると、それらのレシートは「未設定」表示になります（記録自体は残ります）。元に戻せません。`
              : "元に戻せません。";
          })()}
          onCancel={() => setConfirmDeletePay(null)}
          onConfirm={executeRemovePay}
        />
      )}

      <div style={{ fontSize:12, fontWeight:700, color:C.textSecondary, marginBottom:8 }}>バックアップ・復元</div>
      <div style={UI.cardFloat({ padding:"14px 16px", marginBottom:26 })}>
        <div style={{ fontSize:12.5, color:C.textSecondary, marginBottom:10 }}>
          {lastBackupAt ? `最終バックアップ：${new Date(lastBackupAt).toLocaleString("ja-JP")}` : "まだバックアップがありません"}
        </div>
        <button onClick={doBackup} disabled={busy} style={{ width:"100%", padding:"12px 0", borderRadius:10, border:"none", background:C.accentDeep, color:"#fff", fontSize:14, fontWeight:700, cursor:"pointer", marginBottom:10, opacity:busy?0.6:1 }}>バックアップを作成（ZIP/JSON）</button>

        {restoreStep === 0 && (
          <label style={{ display:"block", width:"100%", padding:"12px 0", borderRadius:10, border:`1px solid ${C.border}`, color:C.textSecondary, fontSize:14, fontWeight:700, textAlign:"center", cursor:"pointer" }}>
            バックアップから復元
            <input ref={fileInputRef} type="file" accept=".zip,.json" onChange={onPickRestoreFile} style={{ display:"none" }} />
          </label>
        )}
        {restoreStep === 1 && (
          <div style={{ padding:"12px", borderRadius:10, background:C.dangerBg }}>
            <div style={{ fontSize:13, color:C.danger, fontWeight:700, marginBottom:10 }}>本当に復元しますか？現在のデータは上書きされます（復元前に自動でバックアップを作成します）</div>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={cancelRestore} style={{ flex:1, padding:"10px 0", borderRadius:9, border:`1px solid ${C.border}`, background:"#fff", fontSize:13, cursor:"pointer" }}>キャンセル</button>
              <button onClick={confirmRestoreStep1} style={{ flex:1, padding:"10px 0", borderRadius:9, border:"none", background:C.danger, color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer" }}>次へ</button>
            </div>
          </div>
        )}
        {restoreStep === 2 && (
          <div style={{ padding:"12px", borderRadius:10, background:C.dangerBg }}>
            <div style={{ fontSize:13, color:C.danger, fontWeight:700, marginBottom:8 }}>確認のため「復元」と入力してください</div>
            <input value={restoreText} onChange={e=>setRestoreText(e.target.value)} placeholder="復元 / ふくげん / フクゲン / fukugen"
              style={{ width:"100%", padding:"10px 12px", borderRadius:9, border:`1px solid ${C.border}`, fontSize:14, marginBottom:10, background:"#fff" }} />
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={cancelRestore} style={{ flex:1, padding:"10px 0", borderRadius:9, border:`1px solid ${C.border}`, background:"#fff", fontSize:13, cursor:"pointer" }}>キャンセル</button>
              <button onClick={doRestore} disabled={!isValidRestoreTrigger(restoreText)||busy} style={{ flex:1, padding:"10px 0", borderRadius:9, border:"none", background:C.danger, color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer", opacity:(!isValidRestoreTrigger(restoreText)||busy)?0.4:1 }}>復元を実行</button>
            </div>
          </div>
        )}
      </div>

      <div style={{ fontSize:12, fontWeight:700, color:C.textSecondary, marginBottom:8 }}>このアプリについて</div>
      <div style={UI.cardFloat({ padding:"4px 14px", marginBottom:8 })}>
        <div style={{ display:"flex", justifyContent:"space-between", padding:"12px 0" }}>
          <span style={{ fontSize:14, color:C.textPrimary, fontWeight:600 }}>{APP_NAME}</span>
          <span style={{ fontSize:13, color:C.textSecondary }}>Ver {DATA_VERSION}</span>
        </div>
      </div>
      <div style={{ padding:"12px 16px 20px", fontSize:12, color:C.textFaint, lineHeight:1.8, textAlign:"center" }}>
        生活を振り返るための、カレンダー型の生活ログ<br/>関数よりPivotが好きだった。
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// App ルート
// ══════════════════════════════════════════════════════════════
function App() {
  const migratedRef = useRef(null);
  if (!migratedRef.current) migratedRef.current = migrateAllOnLoad();
  const migrated = migratedRef.current;

  const [items, setItems] = useState(() => migrated.items);
  const [receipts, setReceipts] = useState(() => migrated.receipts);
  const [tags, setTags] = useState(() => {
    const saved = loadLS(LS_KEYS.tags, null);
    if (saved && saved.length) return saved;
    const init = DEFAULT_TAGS();
    saveLS(LS_KEYS.tags, init);
    return init;
  });
  const [places, setPlaces] = useState(() => loadLS(LS_KEYS.places, DEFAULT_PLACES));
  const [settings, setSettings] = useState(() => migrated.settings);
  const [dayNotes, setDayNotes] = useState(() => loadLS(LS_KEYS.dayNotes, {}));

  useEffect(() => saveLS(LS_KEYS.items, items), [items]);
  useEffect(() => saveLS(LS_KEYS.receipts, receipts), [receipts]);
  useEffect(() => saveLS(LS_KEYS.tags, tags), [tags]);
  useEffect(() => saveLS(LS_KEYS.places, places), [places]);
  useEffect(() => saveLS(LS_KEYS.settings, settings), [settings]);
  useEffect(() => saveLS(LS_KEYS.dayNotes, dayNotes), [dayNotes]);
  const saveDayNote = (date, text) => setDayNotes(prev => ({ ...prev, [date]: text }));

  const [tab, setTab] = useState("calendar");
  const [menuOpen, setMenuOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); };

  const [selectedDate, setSelectedDate] = useState(null);
  const [quickAddOpen, setQuickAddOpen] = useState(false);
  const [timelineLabOpen, setTimelineLabOpen] = useState(false);
  const [quickAddDate, setQuickAddDate] = useState(null);
  const [quickAddReceiptInfo, setQuickAddReceiptInfo] = useState(null); // 既存レシートへの追加用
  const [editingId, setEditingId] = useState(null);
  const [justEditedId, setJustEditedId] = useState(null);
  const [placeDetailId, setPlaceDetailId] = useState(null);
  const [placeAddOpen, setPlaceAddOpen] = useState(false);
  const [tagAddOpen, setTagAddOpen] = useState(false);

  const [searchQuery, setSearchQuery] = useState("");
  const [searchMode, setSearchMode] = useState("item");

  const warnCount = items.filter(it => (it.tags||[]).includes("tag_needcheck")).length;

  const openEdit = (itemId) => setEditingId(itemId);
  const closeEdit = () => { setJustEditedId(editingId); setEditingId(null); setTimeout(() => setJustEditedId(null), 1400); };

  const openQuickAdd = (date) => { setQuickAddDate(date || null); setQuickAddReceiptInfo(null); setQuickAddOpen(true); };
  const closeQuickAdd = () => { setQuickAddOpen(false); setQuickAddDate(null); setQuickAddReceiptInfo(null); };

  const openAddToReceipt = (receiptId) => {
    const receipt = receipts.find(r => r.id === receiptId);
    if (!receipt) return;
    const count = items.filter(it => it.receiptId === receiptId).length;
    setEditingId(null);
    setQuickAddDate(null);
    setQuickAddReceiptInfo({ id: receiptId, placeId: receipt.placeId, date: receipt.date, payMethodId: receipt.payMethodId ?? null, count });
    setQuickAddOpen(true);
  };

  // ── 場所マスター ──────────────────────────
  const createPlace = ({ category, brand, place }) => {
    const p = makePlace({ category, brand, place });
    setPlaces(prev => [...prev, p]);
    return p;
  };
  const updatePlace = (id, patch) => setPlaces(prev => prev.map(p => p.id === id ? { ...p, ...patch } : p));
  const touchPlaceUsage = (placeId) => { if (placeId) setPlaces(prev => prev.map(p => p.id === placeId ? { ...p, lastUsedAt: Date.now() } : p)); };

  // ── タグマスター（＋ボタンからの主役追加用、タグピッカーからのその場登録にも使用） ──
  const createTag = (name, kind, extra = {}) => {
    const trimmed = (name||"").trim();
    if (!trimmed) return false;
    if (tags.some(t => t.name === trimmed)) { showToast("同名のタグが既にあります"); return false; }
    const newTag = { id: uid(kind==="category"?"cat":"tag"), name:trimmed, kind, isSystem:false, ...extra };
    setTags(prev => [...prev, newTag]);
    showToast("追加しました");
    return newTag;
  };

  // 場所・購入日・購入時刻はレシート共通情報。receipt本体と、同じreceiptIdを持つ
  // 全item（既存分も含む）の両方を揃えて更新する（Step1時点ではitem側にも同フィールドが
  // 残っているため、食い違いが起きないよう一括で同期する）
  const applyReceiptCommonFields = (receiptId, { placeId, date, time, payMethodId }) => {
    setReceipts(prev => prev.map(r => r.id === receiptId ? { ...r, placeId, date, time: time ?? null, payMethodId: payMethodId ?? r.payMethodId } : r));
    setItems(prev => prev.map(it => it.receiptId === receiptId ? { ...it, placeId, purchaseDate: date, purchaseTime: time ?? null, updatedAt: Date.now() } : it));
    if (placeId) touchPlaceUsage(placeId);
  };

  const addItemToReceipt = async ({ receiptId, name, amount, placeId, date, time, photoFile, itemPhotoFile, payMethodId, tags: itemTags, memo, needCheck = true }) => {
    let rid = receiptId;
    if (!rid) {
      rid = uid("rc");
      setReceipts(prev => [...prev, { id: rid, date, time: time||null, placeId, payMethodId: payMethodId||null, images: [], createdAt: Date.now() }]);
    } else {
      applyReceiptCommonFields(rid, { placeId, date, time, payMethodId });
    }
    if (photoFile) {
      const dataUrl = await fileToDataURL(photoFile);
      const imgId = uid("img");
      await idbSet(imgId, dataUrl);
      setReceipts(prev => prev.map(r => r.id === rid ? { ...r, images: [...(r.images||[]), imgId] } : r));
    }
    let attachments = [];
    if (itemPhotoFile) {
      const itemDataUrl = await fileToDataURL(itemPhotoFile);
      const itemImgId = uid("img");
      await idbSet(itemImgId, itemDataUrl);
      attachments = [itemImgId];
    }
    const seq = items.filter(it => it.receiptId === rid).length + 1;
    const finalTags = needCheck ? [...new Set([...(itemTags||[]), "tag_needcheck"])] : (itemTags||[]);
    const newItem = {
      id: uid("it"), receiptId: rid, seq, name, amount, placeId,
      tags: finalTags, memo: memo||"", attachments,
      purchaseDate: date, purchaseTime: time||null, createdAt: Date.now(), updatedAt: Date.now(),
    };
    setItems(prev => [...prev, newItem]);
    touchPlaceUsage(placeId);
    showToast(needCheck ? "仮保存しました（要確認）" : "登録しました");
    return rid;
  };

  const updateItem = (id, patch) => {
    setItems(prev => prev.map(it => it.id === id ? { ...it, ...patch, updatedAt: Date.now() } : it));
    if (patch.placeId) touchPlaceUsage(patch.placeId);
  };

  const deleteItem = (id) => {
    const it = items.find(i => i.id === id);
    if (it) (it.attachments||[]).forEach(imgId => idbDelete(imgId));
    const stillUsed = items.some(i => i.id !== id && i.receiptId === it?.receiptId);
    if (it && !stillUsed) {
      const r = receipts.find(r => r.id === it.receiptId);
      (r?.images||[]).forEach(imgId => idbDelete(imgId));
      setReceipts(prev => prev.filter(r => r.id !== it.receiptId));
    }
    setItems(prev => prev.filter(i => i.id !== id));
    showToast("削除しました");
  };

  const duplicateItem = (id) => {
    const src = items.find(i => i.id === id);
    if (!src) return;
    const srcReceipt = receipts.find(r => r.id === src.receiptId);
    const newReceiptId = uid("rc");
    setReceipts(prev => [...prev, { id: newReceiptId, date: todayStr(), placeId: src.placeId, payMethodId: srcReceipt?.payMethodId ?? null, images: [], createdAt: Date.now() }]);
    const newItem = { ...src, id: uid("it"), receiptId: newReceiptId, seq: 1, purchaseDate: todayStr(),
      tags: [...new Set([...(src.tags||[]), "tag_copyunchecked"])], attachments: [], createdAt: Date.now(), updatedAt: Date.now() };
    setItems(prev => [...prev, newItem]);
    touchPlaceUsage(src.placeId);
    showToast("複写しました。内容を確認してください");
    setEditingId(newItem.id);
  };

  // 同一レシート内への複写：receiptIdは変更せず、同じレシートの末尾に新しい商品として追加する。
  // 商品写真（attachments）は複写しない。attachmentsは「その商品固有の1点もの」の記録として
  // idbへ直接ひもづき、削除時（deleteItem）もitem単位でidbDeleteされる設計のため、
  // idだけ複写すると片方を削除したときにもう片方の画像も消えてしまう（参照が共有される）。
  // 事故を避けるため、写真は複写せず空欄にして、必要なら複写後にあらためて添付してもらう方針とする。
  const duplicateItemWithinReceipt = (id) => {
    const src = items.find(i => i.id === id);
    if (!src) return;
    const seq = items.filter(it => it.receiptId === src.receiptId).length + 1;
    const newItem = { ...src, id: uid("it"), receiptId: src.receiptId, seq,
      tags: [...new Set([...(src.tags||[]), "tag_copyunchecked"])], attachments: [], createdAt: Date.now(), updatedAt: Date.now() };
    setItems(prev => [...prev, newItem]);
    touchPlaceUsage(src.placeId);
    showToast("このレシート内に複写しました。内容を確認してください");
    setEditingId(newItem.id);
  };

  const updateReceipt = (receiptId, patch) => setReceipts(prev => prev.map(r => r.id === receiptId ? { ...r, ...patch } : r));
  const addReceiptImage = (receiptId, imgId) => setReceipts(prev => prev.map(r => r.id === receiptId ? { ...r, images: [...(r.images||[]), imgId] } : r));
  const removeReceiptImage = (receiptId, imgId) => { setReceipts(prev => prev.map(r => r.id === receiptId ? { ...r, images:(r.images||[]).filter(x=>x!==imgId) } : r)); idbDelete(imgId); };
  const addItemAttachment = (itemId, imgId) => setItems(prev => prev.map(it => it.id === itemId ? { ...it, attachments:[...(it.attachments||[]), imgId] } : it));
  const removeItemAttachment = (itemId, imgId) => setItems(prev => prev.map(it => it.id === itemId ? { ...it, attachments:(it.attachments||[]).filter(x=>x!==imgId) } : it));

  const applyRestoredData = (payload) => {
    setItems(payload.items || []);
    setReceipts(payload.receipts || []);
    setTags(payload.tags?.length ? payload.tags : DEFAULT_TAGS());
    setPlaces(payload.places?.length ? payload.places : DEFAULT_PLACES);
    setSettings(payload.settings || DEFAULT_SETTINGS);
    setDayNotes(payload.dayNotes || {});
  };

  const openDateFromPlace = (date) => { setPlaceDetailId(null); setSelectedDate(date); };

  // ハンバーガーメニューからの遷移
  const handleMenuNavigate = (item) => {
    if (item.future) return;
    setMenuOpen(false);
    if (item.key === "living") { setSelectedDate(todayStr()); return; }
    if (item.key === "genkan") { setTab("calendar"); return; }
    if (item.key === "search") { setTab("search"); return; }
    if (item.key === "places") { setTab("places"); return; }
    if (item.key === "tags") { setTab("tags"); return; }
    if (item.key === "devMode") { setTab("devMode"); return; }
    if (item.tab) { setTab(item.tab); return; }
  };

  return (
    <div style={{ maxWidth:430, margin:"0 auto", minHeight:"100vh", background:C.bg, position:"relative", color:C.textPrimary }}>
      <TopHeader warnCount={warnCount} />

      {tab === "calendar" && <CalendarView items={items} receipts={receipts} places={places} onSelectDate={setSelectedDate} />}
      {tab === "search" && (
        <SearchView items={items} receipts={receipts} tags={tags} places={places}
          query={searchQuery} setQuery={setSearchQuery} mode={searchMode} setMode={setSearchMode}
          onOpenItem={openEdit} justEditedId={justEditedId} />
      )}
      {tab === "tags" && <TagsView tags={tags} setTags={setTags} items={items} setItems={setItems} showToast={showToast} />}
      {tab === "devMode" && <DevModeView onOpenTimelineLab={()=>setTimelineLabOpen(true)} />}
      {tab === "places" && (
        <PlacesView places={places} items={items} onOpenPlace={setPlaceDetailId} onAddPlace={() => setPlaceAddOpen(true)} />
      )}
      {tab === "settings" && (
        <SettingsView items={items} receipts={receipts} tags={tags} places={places} dayNotes={dayNotes}
          settings={settings} setSettings={setSettings} applyRestoredData={applyRestoredData} showToast={showToast} />
      )}

      {tab !== "settings" && (
        <FAB onClick={() => {
          if (tab === "places") setPlaceAddOpen(true);
          else if (tab === "tags") setTagAddOpen(true);
          else openQuickAdd(null); // カレンダー・検索：記録追加が主役
        }} />
      )}
      <HamburgerButton active={menuOpen} onClick={() => setMenuOpen(o=>!o)} />
      <SideMenu open={menuOpen} onClose={() => setMenuOpen(false)} onNavigate={handleMenuNavigate} warnCount={warnCount} />

      {selectedDate && (
        <DayDetailOverlay date={selectedDate} items={items} receipts={receipts} places={places}
          dayNote={dayNotes[selectedDate]} onSaveDayNote={saveDayNote}
          onClose={() => setSelectedDate(null)} onOpenItem={openEdit} justEditedId={justEditedId}
          onQuickAdd={(date) => openQuickAdd(date)} onChangeDate={setSelectedDate} />
      )}

      {quickAddOpen && (
        <QuickAddOverlay onClose={closeQuickAdd} places={places} settings={settings} tags={tags}
          addItemToReceipt={addItemToReceipt} createPlace={createPlace} createTag={createTag} presetDate={quickAddDate}
          initialReceipt={quickAddReceiptInfo} />
      )}

      {timelineLabOpen && (
        <div style={{ position:"fixed", inset:0, background:C.bg, zIndex:230, overflowY:"auto" }}>
          <TimelineLabScreen onClose={()=>setTimelineLabOpen(false)} showToast={showToast} />
        </div>
      )}

      {editingId && (
        <EditOverlay itemId={editingId} items={items} receipts={receipts} tags={tags} places={places} settings={settings}
          onClose={closeEdit} onAddToReceipt={openAddToReceipt} updateItem={updateItem} updateReceipt={updateReceipt}
          applyReceiptCommonFields={applyReceiptCommonFields} deleteItem={deleteItem} duplicateItem={duplicateItem}
          duplicateItemWithinReceipt={duplicateItemWithinReceipt}
          addReceiptImage={addReceiptImage} removeReceiptImage={removeReceiptImage}
          addItemAttachment={addItemAttachment} removeItemAttachment={removeItemAttachment}
          createPlace={createPlace} createTag={createTag} showToast={showToast} />
      )}

      {placeDetailId && (
        <PlaceDetailOverlay placeId={placeDetailId} places={places} items={items}
          onClose={() => setPlaceDetailId(null)} updatePlace={updatePlace} onOpenDate={openDateFromPlace} />
      )}

      {placeAddOpen && (
        <PlaceAddOverlay places={places} onClose={() => setPlaceAddOpen(false)} createPlace={createPlace} />
      )}

      {tagAddOpen && (
        <TagAddOverlay onClose={() => setTagAddOpen(false)} createTag={createTag} />
      )}

      <Toast message={toast} />
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
