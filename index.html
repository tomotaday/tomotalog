const fmtAmt  = (n) => n === 0 ? "" : n.toLocaleString("ja-JP");

// ── 金額の「縮小して全体を表示」相当の実装 ──────────────────
// セル幅に収まらない場合のみ、実際の描画幅をcanvasで計測してフォントサイズを段階的に縮小する。
// 省略記号は使わず、必ず全文字を表示する。
const CELL_AMT_FONT_FAMILY = "'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,'Noto Sans JP',sans-serif";
const CELL_AMT_MAX_SIZE = 11, CELL_AMT_MIN_SIZE = 6.5;
const _measureCtx = (typeof document !== "undefined") ? document.createElement("canvas").getContext("2d") : null;
const _shrinkCache = {};
const cellAmtFontSize = (text, maxWidth) => {
  if (!text || !_measureCtx) return CELL_AMT_MAX_SIZE;
  const key = text + "|" + Math.round(maxWidth);
  if (_shrinkCache[key] !== undefined) return _shrinkCache[key];
  let size = CELL_AMT_MAX_SIZE;
  for (; size > CELL_AMT_MIN_SIZE; size -= 0.5) {
    _measureCtx.font = `800 ${size}px ${CELL_AMT_FONT_FAMILY}`;
    if (_measureCtx.measureText(text).width <= maxWidth) break;
  }
  _shrinkCache[key] = size;
  return size;
};
// カレンダーグリッドのCSS（calGrid padding 6px・gap 2px×6／calCell padding 4px左右）から
// 実際にセル内で数字に使える横幅をビューポート幅から逆算する。
const getCellAmtMaxWidth = (viewportWidth) => {
  const w = Math.min(viewportWidth || 390, 430);
  const gridWidth = w - 12 /* calGrid左右padding 6px*2 */ - 12 /* 6箇所のgap 2px*6 */;
  const cellWidth = gridWidth / 7;
  return Math.max(20, cellWidth - 8 /* calCell左右padding 4px*2 */ - 2 /* 安全マージン */);
};
const fmtFull = (n) => "¥" + n.toLocaleString("ja-JP");

const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};
const nowISO        = () => new Date().toISOString();
const monthKey      = (y,m) => `${y}-${String(m).padStart(2,"0")}`;
const daysInMonth   = (y,m) => new Date(y,m,0).getDate();
const firstDayOfWeek= (y,m) => new Date(y,m-1,1).getDay();
const parseDate     = (s)   => { const [y,m,d]=s.split("-").map(Number); return {y,m,d}; };

const buildExport = (d) => ({ version:DATA_VERSION, exportedAt:nowISO(), appName:APP_NAME, ...d });
function exportJSON(data) {
  const blob = new Blob([JSON.stringify(buildExport(data),null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `tomota_backup_${new Date().toISOString().slice(0,10).replace(/-/g,"")}.json`;
  a.click();
}
function importJSON(file, onOk, onErr) {
  const r = new FileReader();
  r.onload = (e) => {
    try {
      const d = JSON.parse(e.target.result);
      if (!d.version) throw new Error("versionフィールドがありません");
      if (!d.records||!d.stores) throw new Error("必須データが見つかりません");
      onOk(d);
    } catch(err) { onErr(err.message); }
  };
  r.readAsText(file);
}

  actionBtn:(c)=>({ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"13px 16px", borderBottom:"1px solid #F0EBE0", background:"#fff", cursor:"pointer", border:"none", width:"100%", fontSize:14, color:c||"#2C2C2C", fontFamily:"'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif" }),
  toast:{ position:"fixed", bottom:100, left:"50%", transform:"translateX(-50%)", background:"#2C2C2C", color:"#fff", padding:"10px 20px", borderRadius:99, fontSize:13, zIndex:999, whiteSpace:"nowrap" },
};

// ══════════════════════════════════════════════════════════════
// メインアプリ
// ══════════════════════════════════════════════════════════════
function TomotaKakeibo() {
  const [records,       setRecords]       = useState(()=>lsGet(LS.records,        DEFAULT_RECORDS));
  const [stores,        setStores]        = useState(()=>lsGet(LS.stores,         DEFAULT_STORES));
  const [logs,          setLogs]          = useState(()=>lsGet(LS.logs,           DEFAULT_LOGS));
  const [tagMaster,     setTagMaster]     = useState(()=>lsGet(LS.tagMaster,      DEFAULT_TAG_MASTER));
  const [payMethods,    setPayMethods]    = useState(()=>lsGet(LS.payMethods,     DEFAULT_PAY_METHODS));
  const [settings,      setSettings]      = useState(()=>lsGet(LS.settings,       DEFAULT_SETTINGS));
  const [holidays,      setHolidays]      = useState(()=>lsGet(LS.holidays,       DEFAULT_HOLIDAYS));
  const [productMaster, setProductMaster] = useState(()=>lsGet(LS.productMaster,  DEFAULT_PRODUCT_MASTER));
  const [tab,          setTab]          = useState("calendar");
  const [calTab,       setCalTab]       = useState("purchase");
  const [zukanTab,     setZukanTab]     = useState("store");  // 図鑑サブタブ
  const [viewYear,     setViewYear]     = useState(()=>new Date().getFullYear());
  const [viewMonth,    setViewMonth]    = useState(()=>new Date().getMonth()+1);
  const [selectedDate, setSelectedDate] = useState(null);
  const [showForm,     setShowForm]     = useState(false);
  const [editRecord,   setEditRecord]   = useState(null);
  const [searchQ,      setSearchQ]      = useState("");
  const [toast,        setToast]        = useState(null);

  useEffect(()=>{ lsSet(LS.records,       records);        },[records]);
  useEffect(()=>{ lsSet(LS.stores,        stores);         },[stores]);
  useEffect(()=>{ lsSet(LS.logs,          logs);           },[logs]);
  useEffect(()=>{ lsSet(LS.tagMaster,     tagMaster);      },[tagMaster]);
  useEffect(()=>{ lsSet(LS.payMethods,    payMethods);     },[payMethods]);
  useEffect(()=>{ lsSet(LS.settings,      settings);       },[settings]);
  useEffect(()=>{ lsSet(LS.holidays,      holidays);       },[holidays]);
  useEffect(()=>{ lsSet(LS.productMaster, productMaster);  },[productMaster]);

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(null),2200); };
  const holidayMap = buildHolidayMap(holidays);
  const excludeTags = tagMaster.filter(t=>t.excludeFromTotal).map(t=>t.name);

  const dailyTotal = useCallback((year,month) => {
    const map={}, mStr=monthKey(year,month);
    records.forEach(r=>{
      if (r.tags.some(t=>excludeTags.includes(t))) return;
      const ds = calTab==="purchase"?r.purchaseDate:r.payDate;
      if (ds.startsWith(mStr)) map[ds]=(map[ds]||0)+recordTotal(r);
    });
    return map;
  },[records,calTab,excludeTags.join(",")]);

  const dotTagMaster = tagMaster.filter(t=>t.calendarDot);
  const dotDays = useCallback((year,month) => {
    const map={}, mStr=monthKey(year,month);
    records.forEach(r=>{
      dotTagMaster.forEach(dt=>{
        if (r.tags.includes(dt.name)) {
          const ds=calTab==="purchase"?r.purchaseDate:r.payDate;
          if (ds.startsWith(mStr)) map[ds]=dt.calendarDotColor||"#E74C3C";
        }
      });
    });
    return map;
  },[records,calTab,dotTagMaster]);

  const warnTag   = settings.calendarWatchTag||"#要確認";
  const warnCount = records.filter(r=>r.tags.includes(warnTag)).length;
  const goToday   = () => { const n=new Date(); setViewYear(n.getFullYear()); setViewMonth(n.getMonth()+1); };

  const saveRecord = (rec) => {
    if (rec.id) setRecords(prev=>prev.map(r=>r.id===rec.id?rec:r));
    else setRecords(prev=>[...prev,{...rec,id:"r"+Date.now()}]);
    setShowForm(false); setEditRecord(null); showToast("保存しました");
  };
  const deleteRecord = (id) => {
    setRecords(prev=>prev.filter(r=>r.id!==id));
    setShowForm(false); setEditRecord(null); showToast("削除しました");
  };

  const dateRecords   = selectedDate ? records.filter(r=>(calTab==="purchase"?r.purchaseDate:r.payDate)===selectedDate) : [];
  const searchResults = searchQ.trim() ? records.filter(r=>{
    const q=searchQ.toLowerCase();
    return storeName(r.storeId,stores).toLowerCase().includes(q)
      || r.items.map(i=>i.name.toLowerCase()).join(" ").includes(q)
      || r.tags.join(" ").toLowerCase().includes(q);
  }) : [];
  const tagStats = {};
  records.forEach(r=>r.tags.forEach(t=>{tagStats[t]=(tagStats[t]||0)+1;}));

  const handleExport = () => { exportJSON({records,stores,logs,tagMaster,payMethods,settings,holidays,productMaster}); showToast("エクスポートしました"); };
  const handleImport = (data) => {
    if (data.records)        setRecords(data.records);
    if (data.stores)         setStores(data.stores);
    if (data.logs)           setLogs(data.logs);
    if (data.tagMaster)      setTagMaster(data.tagMaster);
    if (data.payMethods)     setPayMethods(data.payMethods);
    if (data.settings)       setSettings(data.settings);
    if (data.holidays)       setHolidays(data.holidays);
    if (data.productMaster)  setProductMaster(data.productMaster);
    showToast(`復元完了 (ver ${data.version}) — ${data.records?.length||0}件`);
  };

  return (
    <div style={S.app}>
      {tab==="calendar"&&!selectedDate&&(
        <>
          <div style={S.appHeader}>
            <div style={S.appHeaderRow}>
              <div style={S.appTitleGroup}>
                <img src={APP_ICON} alt="" style={S.appIcon}/>
                <span style={S.appTitle}>{APP_NAME}</span>
              </div>
              <span style={S.appHeaderRight}>
                <span style={S.statusBadge(warnCount>0)}>🌱 {warnTag} {warnCount}件</span>
              </span>
            </div>
          </div>
          <div style={S.tabs}>
            <button style={S.tab(calTab==="purchase")} onClick={()=>setCalTab("purchase")}>購入日</button>
            <button style={S.tab(calTab==="pay")}      onClick={()=>setCalTab("pay")}>支払日</button>
            <button style={S.tab(calTab==="zukan")}    onClick={()=>setCalTab("zukan")}>図鑑</button>
          </div>
        </>
      )}
      {tab==="calendar"&&!selectedDate&&calTab!=="zukan"&&(
        <CalendarView year={viewYear} month={viewMonth} calTab={calTab} setCalTab={setCalTab}
          dailyTotal={dailyTotal(viewYear,viewMonth)} dotDays={dotDays(viewYear,viewMonth)}
          warnCount={warnCount} warnTag={warnTag} holidayMap={holidayMap}
          onPrev={()=>{if(viewMonth===1){setViewYear(y=>y-1);setViewMonth(12);}else setViewMonth(m=>m-1);}}
          onNext={()=>{if(viewMonth===12){setViewYear(y=>y+1);setViewMonth(1);}else setViewMonth(m=>m+1);}}
          onGoToday={goToday} onSelectDate={d=>setSelectedDate(d)}/>
      )}
      {tab==="calendar"&&calTab==="zukan"&&(
        <ZukanView stores={stores} records={records} productMaster={productMaster}
          zukanTab={zukanTab} setZukanTab={setZukanTab}/>
      )}
      {tab==="calendar"&&selectedDate&&calTab!=="zukan"&&(
        <DateView date={selectedDate} records={dateRecords} log={logs[selectedDate]||""}
          stores={stores} tagMaster={tagMaster} holidayMap={holidayMap}
          onBack={()=>setSelectedDate(null)}
          onEditRecord={r=>{setEditRecord(r);setShowForm(true);}}
          onNewRecord={()=>{setEditRecord({purchaseDate:selectedDate,payDate:selectedDate});setShowForm(true);}}
          onSaveLog={text=>setLogs(prev=>({...prev,[selectedDate]:text}))}/>
      )}
      {tab==="search"&&<SearchView q={searchQ} setQ={setSearchQ} results={searchResults} stores={stores} tagMaster={tagMaster} onEdit={r=>{setEditRecord(r);setShowForm(true);}}/>}
      {tab==="tags"&&<TagsView tagStats={tagStats} tagMaster={tagMaster} setTagMaster={setTagMaster} records={records} stores={stores} onEdit={r=>{setEditRecord(r);setShowForm(true);}}/>}
      {tab==="settings"&&<SettingsView stores={stores} setStores={setStores} records={records} productMaster={productMaster} setProductMaster={setProductMaster} payMethods={payMethods} setPayMethods={setPayMethods} settings={settings} setSettings={setSettings} holidays={holidays} setHolidays={setHolidays} onExport={handleExport} onImport={handleImport} showToast={showToast}/>}
      {tab==="calendar"&&calTab!=="zukan"&&<button style={S.fab} onClick={()=>{setEditRecord(null);setShowForm(true);}}>＋</button>}
      {showForm&&<RecordForm initial={editRecord} stores={stores} tagMaster={tagMaster} payMethods={payMethods} today={TODAY} onSave={saveRecord} onDelete={deleteRecord} onClose={()=>{setShowForm(false);setEditRecord(null);}}/>}
      <nav style={S.nav}>
        {[
          {id:"calendar",icon:"📅",label:"カレンダー"},
          {id:"search",  icon:"🔍",label:"検索"},
          {id:"tags",    icon:"🏷️",label:"タグ"},
          {id:"settings",icon:"⚙️",label:"設定"},
        ].map(item=>(
          <button key={item.id} style={S.navItem(tab===item.id)} onClick={()=>{setTab(item.id);setSelectedDate(null);}}>
            <span style={{ fontSize:22, lineHeight:1, background:tab===item.id?"#F1F5F9":"transparent", borderRadius:12, padding:"2px 10px", display:"block" }}>{item.icon}</span>
            {item.label}
          </button>
        ))}
      </nav>
      {toast&&<div style={S.toast}>{toast}</div>}
    </div>
  );
}

// 図鑑ビュー（眺めて楽しむ画面）
// ══════════════════════════════════════════════════════════════
function ZukanView({stores, records, productMaster, zukanTab, setZukanTab}) {
  // お店ごとの利用回数・合計金額を集計
  const storeStats = {};
  records.forEach(r => {
    if (!storeStats[r.storeId]) storeStats[r.storeId] = { count:0, total:0, lastDate:"" };
    storeStats[r.storeId].count++;
    storeStats[r.storeId].total += recordTotal(r);
    if (r.purchaseDate > storeStats[r.storeId].lastDate) storeStats[r.storeId].lastDate = r.purchaseDate;
  });
  const storeList = stores
    .filter(s => !s.closed && storeStats[s.id])
    .sort((a,b) => (storeStats[b.id]?.count||0) - (storeStats[a.id]?.count||0));
  const closedList = stores.filter(s => s.closed && storeStats[s.id]);

  // 商品マスターをアイウエオ順
  const productList = [...productMaster].sort((a,b) => a.name.localeCompare(b.name,"ja"));

  const ZUKAN_SECTIONS = [
    { id:"store",   label:"🏪 お店図鑑" },
    { id:"product", label:"📦 商品図鑑" },
  ];

  return (
    <>
      <div style={{padding:"10px 18px 0",fontSize:12,color:"#94A3B8",fontWeight:600}}>📖 眺めて楽しむ図鑑</div>
      {/* 図鑑サブタブ */}
      <div style={{display:"flex",background:"#F7F8FA",padding:"8px 16px 10px",gap:10}}>
        {ZUKAN_SECTIONS.map(sec=>(
          <button key={sec.id} onClick={()=>setZukanTab(sec.id)}
            style={{flex:1,padding:"10px 8px",borderRadius:14,border:"none",cursor:"pointer",fontSize:13,fontWeight:zukanTab===sec.id?700:500,background:zukanTab===sec.id?"#fff":"transparent",color:zukanTab===sec.id?"#0369A1":"#94A3B8",boxShadow:zukanTab===sec.id?"0 3px 10px rgba(3,105,161,0.13), 0 1px 2px rgba(0,0,0,0.04)":"none",transform:zukanTab===sec.id?"translateY(-1px) scale(1.03)":"none",transition:"all 0.18s cubic-bezier(0.34,1.56,0.64,1)"}}>
            {sec.label}
          </button>
        ))}
      </div>

      {/* お店図鑑 */}
      {zukanTab==="store"&&(
        <div style={{padding:"8px 0 90px"}}>
          {storeList.length===0&&(
            <div style={{textAlign:"center",padding:"60px 20px",color:"#C0C8D2"}}>
              <div style={{fontSize:40,marginBottom:12}}>🏪</div>
              <div style={{fontSize:14}}>まだお店が登録されていません</div>
              <div style={{fontSize:12,marginTop:6}}>購入記録を追加するとお店が育ちます</div>
            </div>
          )}
          {storeList.map(s=>{
            const st = storeStats[s.id]||{};
            const name = s.branch ? `${s.group} ${s.branch}` : s.group;
            return (
              <div key={s.id} style={{background:"#fff",margin:"0 0 1px",padding:"14px 16px",display:"flex",alignItems:"center",gap:12,borderBottom:"1px solid #F3F4F6"}}>
                <div style={{width:44,height:44,borderRadius:12,background:"#EFF9FF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>🏪</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700,color:"#1E293B",marginBottom:2}}>{name}</div>
                  <div style={{fontSize:12,color:"#94A3B8"}}>最終: {st.lastDate||"—"}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#0369A1"}}>{fmtFull(st.total||0)}</div>
                  <div style={{fontSize:11,color:"#94A3B8"}}>{st.count||0}回</div>
                </div>
              </div>
            );
          })}
          {closedList.length>0&&(
            <div style={{padding:"8px 16px 4px",fontSize:11,color:"#94A3B8",letterSpacing:1}}>閉店・非表示</div>
          )}
          {closedList.map(s=>{
            const st = storeStats[s.id]||{};
            const name = s.branch ? `${s.group} ${s.branch}` : s.group;
            return (
              <div key={s.id} style={{background:"#FAFAFA",margin:"0 0 1px",padding:"12px 16px",display:"flex",alignItems:"center",gap:12,opacity:0.5}}>
                <div style={{width:40,height:40,borderRadius:10,background:"#F1F5F9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🏪</div>
                <div style={{flex:1}}><div style={{fontSize:13,color:"#94A3B8"}}>{name}</div></div>
                <div style={{fontSize:11,color:"#C0C8D2"}}>{st.count||0}回</div>
              </div>
            );
          })}
        </div>
      )}

      {/* 商品図鑑 */}
      {zukanTab==="product"&&(
        <div style={{padding:"8px 0 90px"}}>
          {productList.length===0&&(
            <div style={{textAlign:"center",padding:"60px 20px",color:"#C0C8D2"}}>
              <div style={{fontSize:40,marginBottom:12}}>📦</div>
              <div style={{fontSize:14}}>まだ商品が登録されていません</div>
              <div style={{fontSize:12,marginTop:6,lineHeight:1.7}}>設定 › 商品管理から追加できます<br/>購入記録とひもづいて図鑑が育ちます</div>
            </div>
          )}
          {productList.map(p=>(
            <div key={p.id} style={{background:"#fff",margin:"0 0 1px",padding:"14px 16px",display:"flex",alignItems:"center",gap:12,borderBottom:"1px solid #F3F4F6"}}>
              <div style={{width:44,height:44,borderRadius:12,background:"#F0FFF4",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>📦</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:700,color:"#1E293B",marginBottom:2}}>{p.name}</div>
                {p.maker&&<div style={{fontSize:12,color:"#64748B"}}>{p.maker}</div>}
                {p.volume&&<div style={{fontSize:12,color:"#94A3B8"}}>{p.volume}{p.unit||""}</div>}
              </div>
              {p.janCode&&<div style={{fontSize:10,color:"#C0C8D2"}}>{p.janCode}</div>}
            </div>
          ))}
        </div>
      )}
    </>
  );
}

// ══════════════════════════════════════════════════════════════
// カレンダービュー
// ══════════════════════════════════════════════════════════════
function CalendarView({year,month,calTab,setCalTab,dailyTotal,dotDays,warnCount,warnTag,holidayMap,onPrev,onNext,onGoToday,onSelectDate}) {
  const days=daysInMonth(year,month), firstDow=firstDayOfWeek(year,month), todayS=todayStr();
  const monthTotal=Object.values(dailyTotal).reduce((a,b)=>a+b,0);
  const WEEKS=["日","月","火","水","木","金","土"];
  const prevMonth=month===1?12:month-1, prevYear=month===1?year-1:year;
  const prevDays=daysInMonth(prevYear,prevMonth);
  const [vw,setVw]=useState(typeof window!=="undefined"?window.innerWidth:390);
  useEffect(()=>{
    const onResize=()=>setVw(window.innerWidth);
    window.addEventListener("resize",onResize);
    window.addEventListener("orientationchange",onResize);
    return ()=>{ window.removeEventListener("resize",onResize); window.removeEventListener("orientationchange",onResize); };
  },[]);
  const cellAmtMaxWidth=getCellAmtMaxWidth(vw);
  const cells=[];
  for(let i=0;i<firstDow;i++) cells.push({day:prevDays-firstDow+1+i, type:"prev"});
  for(let d=1;d<=days;d++) cells.push({day:d, type:"cur"});
  const rem=cells.length%7;
  if(rem!==0){ const fill=7-rem; for(let d=1;d<=fill;d++) cells.push({day:d, type:"next"}); }
  return (
    <>
      <div style={S.calHeader}>
        <button style={S.calNavBtn} onClick={onPrev}>‹ 前月</button>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
          <span style={S.calMonth}>{year}年 {month}月</span>
          <span style={{fontSize:11,color:"#0369A1",fontWeight:700,marginTop:1}}>{fmtFull(monthTotal)}</span>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button style={S.todayBtn} onClick={onGoToday}>今月</button>
          <button style={S.calNavBtn} onClick={onNext}>翌月 ›</button>
        </div>
      </div>
      <div style={S.weekRow}>{WEEKS.map((w,i)=><div key={w} style={S.weekDay(i)}>{w}</div>)}</div>
      <div style={{background:"#E0E3E8", paddingBottom:2}}>
      <div style={S.calGrid}>
        {cells.map((c,i)=>{
          if (c.type!=="cur") {
            return (
              <div key={c.type+i} style={S.calCellOther} onClick={c.type==="prev"?onPrev:onNext}>
                <span style={S.cellDateOther}>{c.day}</span>
              </div>
            );
          }
          const d=c.day;
          const dStr=`${year}-${String(month).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
          const amt=dailyTotal[dStr]||0, dot=dotDays[dStr];
          const isToday=dStr===todayS, dow=(firstDow+d-1)%7, holi=holidayMap[dStr];
          return (
            <div key={d} style={S.calCell(isToday)} onClick={()=>onSelectDate(dStr)}>
              <span style={S.cellDate(isToday,dow,!!holi)}>{d}</span>
              {amt>0&&<span style={{...S.cellAmt, fontSize:cellAmtFontSize(fmtAmt(amt),cellAmtMaxWidth)}}>{fmtAmt(amt)}</span>}
              {dot&&<span style={S.cellDot(dot)}/>}
            </div>
          );
        })}
      </div>
      </div>
      <div style={{background:"#E0E3E8", minHeight:60}}/>
    </>
  );
}

// ══════════════════════════════════════════════════════════════
// 日付詳細ビュー
// ══════════════════════════════════════════════════════════════
function DateView({date,records,log,stores,tagMaster,holidayMap,onBack,onEditRecord,onNewRecord,onSaveLog}) {
  const [editLog,setEditLog]=useState(false);
  const [draft,setDraft]=useState(log);
  const {y,m,d}=parseDate(date);
  const dow=["日","月","火","水","木","金","土"][new Date(y,m-1,d).getDay()];
  const total=records.reduce((a,r)=>a+recordTotal(r),0);
  const tagRole=name=>(tagMaster.find(t=>t.name===name)||{}).role||"category";
  const holi=holidayMap[date];
  return (
    <>
      <div style={S.dateHeader}>
        <button style={S.backBtn} onClick={onBack}>←</button>
        <div>
          <div style={S.dateTitle}>{m}月{d}日（{dow}）{holi&&<span style={{fontSize:12,color:"#C0392B",marginLeft:6}}>{holi}</span>}</div>
          {total>0&&<div style={{fontSize:12,color:"#0369A1"}}>合計 {fmtFull(total)}</div>}
        </div>
        <div style={{flex:1}}/>
        <button style={{...S.calNavBtn,fontSize:12}} onClick={onNewRecord}>＋追加</button>
      </div>
      <div style={S.section}>
        <div style={S.sectionTitle}><span>📔</span> 生活ログ</div>
        {editLog?(
          <>
            <textarea style={S.logInput} value={draft} onChange={e=>setDraft(e.target.value)} placeholder="この日のメモや思い出を..." autoFocus/>
            <div style={{display:"flex",gap:8,marginTop:6}}>
              <button style={{...S.saveBtn,marginTop:0,flex:1}} onClick={()=>{onSaveLog(draft);setEditLog(false);}}>保存</button>
              <button style={{...S.deleteBtn,marginTop:0,flex:1,borderRadius:10}} onClick={()=>{setDraft(log);setEditLog(false);}}>キャンセル</button>
            </div>
          </>
        ):(
          <div style={S.logBox} onClick={()=>{setDraft(log);setEditLog(true);}}>
            {log||<span style={{color:"#BBB"}}>タップして記録…</span>}
          </div>
        )}
      </div>
      <div style={{...S.section,marginTop:16}}>
        <div style={S.sectionTitle}><span>🧾</span> 支出一覧</div>
        {records.length===0
          ?<div style={{color:"#BBB",fontSize:14,textAlign:"center",padding:"20px 0"}}>記録なし</div>
          :records.map(r=>(
            <div key={r.id} style={S.receiptCard} onClick={()=>onEditRecord(r)}>
              <div style={S.receiptStore}>{storeName(r.storeId,stores)}</div>
              {r.items.map((item,i)=>(
                <div key={i} style={S.receiptItem}><span>{item.name}</span><span style={S.receiptPrice}>{fmtFull(item.price)}</span></div>
              ))}
              {r.items.length>1&&(
                <div style={{...S.receiptItem,borderTop:"1px dashed #EEE",marginTop:4,paddingTop:4}}>
                  <span style={{color:"#999",fontSize:12}}>小計</span>
                  <span style={{...S.receiptPrice,color:"#0369A1"}}>{fmtFull(recordTotal(r))}</span>
                </div>
              )}
              {r.tags.length>0&&<div style={S.receiptTags}>{r.tags.map(t=><span key={t} style={S.tag(tagRole(t))}>{t}</span>)}</div>}
              {r.memo&&<div style={{fontSize:12,color:"#999",marginTop:6}}>📝 {r.memo}</div>}
            </div>
          ))
        }
      </div>
      <div style={{height:16}}/>
    </>
  );
}

// ══════════════════════════════════════════════════════════════
// 入力フォーム
// ══════════════════════════════════════════════════════════════
function RecordForm({initial,stores,tagMaster,payMethods,today,onSave,onDelete,onClose}) {
  const isNew=!initial?.id;
  const [purchaseDate,setPurchaseDate]=useState(initial?.purchaseDate||today);
  const [purchaseTime,setPurchaseTime]=useState(initial?.purchaseTime||"00:00");
  const [payDate,setPayDate]=useState(initial?.payDate||today);
  const [payTime,setPayTime]=useState(initial?.payTime||"00:00");
  const [storeId,setStoreId]=useState(initial?.storeId||"");
  const [payMethodId,setPayMethodId]=useState(initial?.payMethodId||"pm1");
  const [items,setItems]=useState(initial?.items||[{name:"",price:""}]);
  const [tags,setTags]=useState(initial?.tags||[]);
  const [memo,setMemo]=useState(initial?.memo||"");
  const activeStores=stores.filter(s=>!s.closed);
  const activePay=payMethods.filter(p=>p.active);
  const toggleTag=t=>setTags(prev=>prev.includes(t)?prev.filter(x=>x!==t):[...prev,t]);
  const setItemField=(i,f,v)=>setItems(prev=>prev.map((item,idx)=>idx===i?{...item,[f]:v}:item));
  const handleSave=()=>{
    const ci=items.filter(i=>i.name.trim()||i.price).map(i=>({name:i.name.trim(),price:Number(i.price)||0}));
    if (!ci.length||!storeId) return;
    onSave({id:initial?.id||null,purchaseDate,purchaseTime,payDate,payTime,storeId,payMethodId,items:ci,tags,memo,source:initial?.source||"manual",receiptImageIds:initial?.receiptImageIds||[]});
  };
  return (
    <div style={S.overlay} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={S.sheet}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={S.sheetTitle}>{isNew?"新規記録":"編集"}</div>
          <button style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#999"}} onClick={onClose}>✕</button>
        </div>
        <div style={S.label}>購入日</div>
        <div style={{display:"flex",gap:6}}>
          <input style={{...S.input,flex:2}} type="date" value={purchaseDate} onChange={e=>setPurchaseDate(e.target.value)}/>
          <input style={{...S.input,flex:1}} type="time" value={purchaseTime} onChange={e=>setPurchaseTime(e.target.value)}/>
        </div>
        <div style={S.label}>支払日</div>
        <div style={{display:"flex",gap:6}}>
          <input style={{...S.input,flex:2}} type="date" value={payDate} onChange={e=>setPayDate(e.target.value)}/>
          <input style={{...S.input,flex:1}} type="time" value={payTime} onChange={e=>setPayTime(e.target.value)}/>
        </div>
        <div style={S.label}>店舗</div>
        <select style={S.select} value={storeId} onChange={e=>setStoreId(e.target.value)}>
          <option value="">選択してください</option>
          {activeStores.map(s=><option key={s.id} value={s.id}>{s.group}{s.branch?` ${s.branch}`:""}</option>)}
        </select>
        <div style={S.label}>支払方法</div>
        <select style={S.select} value={payMethodId} onChange={e=>setPayMethodId(e.target.value)}>
          {activePay.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
        <div style={S.label}>商品・明細</div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <div style={{flex:1}}/>
          <button style={{background:"none",border:"1px solid #B8DEDD",borderRadius:8,padding:"4px 10px",fontSize:12,color:"#0369A1",cursor:"pointer"}}
            onClick={()=>alert("OCR機能は将来実装予定です")}>📷 レシート読取</button>
        </div>
        {items.map((item,i)=>(
          <div key={i} style={{display:"flex",gap:6,marginBottom:6}}>
            <input style={{...S.input,flex:2}} placeholder="商品名" value={item.name} onChange={e=>setItemField(i,"name",e.target.value)}/>
            <input style={{...S.input,flex:1}} placeholder="金額" type="number" value={item.price} onChange={e=>setItemField(i,"price",e.target.value)}/>
            {items.length>1&&<button style={{background:"none",border:"none",cursor:"pointer",color:"#999",fontSize:18}} onClick={()=>setItems(p=>p.filter((_,idx)=>idx!==i))}>×</button>}
          </div>
        ))}
        <button style={{background:"none",border:"1px dashed #CCC",borderRadius:8,padding:"6px 12px",fontSize:13,cursor:"pointer",color:"#888",width:"100%"}} onClick={()=>setItems(p=>[...p,{name:"",price:""}])}>＋ 明細を追加</button>
        <div style={S.label}>タグ</div>
        <div style={S.tagGrid}>{tagMaster.map(t=><button key={t.name} style={S.tagChip(tags.includes(t.name),t.role)} onClick={()=>toggleTag(t.name)}>{t.name}</button>)}</div>
        <div style={S.label}>メモ</div>
        <input style={S.input} placeholder="備考など" value={memo} onChange={e=>setMemo(e.target.value)}/>
        <button style={S.saveBtn} onClick={handleSave}>保存</button>
        {!isNew&&<button style={S.deleteBtn} onClick={()=>onDelete(initial.id)}>削除</button>}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// タグビュー
// ══════════════════════════════════════════════════════════════
function TagsView({tagStats,tagMaster,setTagMaster,records,stores,onEdit}) {
  const [activeTag,setActiveTag]=useState(null);
  const [editMode,setEditMode]=useState(false);
  const [newTagName,setNewTagName]=useState("");
  const tagRole=name=>(tagMaster.find(t=>t.name===name)||{}).role||"category";
  const tagRecords=activeTag?records.filter(r=>r.tags.includes(activeTag)):[];
  const tagTotal=tagRecords.reduce((a,r)=>a+recordTotal(r),0);
  const addTag=()=>{ const n=(newTagName.trim().startsWith("#")?newTagName.trim():"#"+newTagName.trim()); if(!n||n==="#"||tagMaster.find(t=>t.name===n)) return; setTagMaster(prev=>[...prev,{name:n,role:"category",excludeFromTotal:false,calendarDot:false,calendarDotColor:"#2980B9"}]); setNewTagName(""); };
  const roles=["category","flag","medical","person","exclude"];
  const roleLabel=r=>({category:"分類",flag:"フラグ",medical:"医療費",person:"人物",exclude:"除外"}[r]||r);
  return (
    <>
      <div style={S.header}>
        <div style={S.headerRow}>
          <span style={S.title}>{activeTag||"タグ"}</span>
          {activeTag?<button style={{...S.calNavBtn,fontSize:12}} onClick={()=>setActiveTag(null)}>← 戻る</button>
                    :<button style={{...S.calNavBtn,fontSize:12}} onClick={()=>setEditMode(v=>!v)}>{editMode?"完了":"編集"}</button>}
        </div>
      </div>
      {!activeTag?(
        <div style={S.tagSection}>
          {editMode&&(
            <div style={{background:"#fff",borderRadius:12,padding:"12px",marginBottom:10}}>
              <div style={{fontSize:11,color:"#999",marginBottom:6}}>タップでrole切替 ／ ●でドット ／ 除外で集計除外</div>
              {tagMaster.map(t=>(
                <div key={t.name} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid #F0EBE0"}}>
                  <span style={{fontSize:13,fontWeight:700,flex:1}}>{t.name}</span>
                  <button style={{fontSize:11,padding:"2px 6px",borderRadius:99,border:"1px solid #DDD",cursor:"pointer",background:t.role==="flag"?"#FFE4E1":t.role==="medical"?"#F0E6FF":t.role==="exclude"?"#F5F5F5":"#EBF5FB"}}
                    onClick={()=>setTagMaster(prev=>prev.map(x=>x.name===t.name?{...x,role:roles[(roles.indexOf(x.role)+1)%roles.length]}:x))}>{roleLabel(t.role)}</button>
                  <button style={{fontSize:11,padding:"2px 6px",borderRadius:6,border:"1px solid #DDD",background:t.calendarDot?"#E74C3C":"#fff",color:t.calendarDot?"#fff":"#999",cursor:"pointer"}}
                    onClick={()=>setTagMaster(prev=>prev.map(x=>x.name===t.name?{...x,calendarDot:!x.calendarDot}:x))}>●</button>
                  <button style={{fontSize:11,padding:"2px 6px",borderRadius:6,border:"1px solid #DDD",background:t.excludeFromTotal?"#555":"#fff",color:t.excludeFromTotal?"#fff":"#999",cursor:"pointer"}}
                    onClick={()=>setTagMaster(prev=>prev.map(x=>x.name===t.name?{...x,excludeFromTotal:!x.excludeFromTotal}:x))}>除外</button>
                </div>
              ))}
              <div style={{display:"flex",gap:6,marginTop:12}}>
                <input style={{...S.input,flex:1}} placeholder="#新しいタグ" value={newTagName} onChange={e=>setNewTagName(e.target.value)}/>
                <button style={{background:"#0369A1",color:"#fff",border:"none",borderRadius:8,padding:"0 14px",cursor:"pointer",fontSize:14}} onClick={addTag}>追加</button>
              </div>
            </div>
          )}
          {!editMode&&Object.keys(tagStats).length===0&&<div style={{background:"#fff",borderRadius:12,padding:24,textAlign:"center",color:"#CCC"}}>タグなし</div>}
          {!editMode&&(
            <div style={{background:"#fff",borderRadius:12,overflow:"hidden"}}>
            {Object.entries(tagStats).map(([t,cnt],i,arr)=>{
              const tot=records.filter(r=>r.tags.includes(t)).reduce((a,r)=>a+recordTotal(r),0);
              const tm=tagMaster.find(x=>x.name===t)||{};
              return (
                <div key={t} style={{...S.tagRow,padding:"10px 14px",borderBottom:i<arr.length-1?"1px solid #F3F4F6":"none"}} onClick={()=>setActiveTag(t)}>
                  <div><span style={S.tagName}>{t}</span>{tm.excludeFromTotal&&<span style={{fontSize:10,color:"#999",marginLeft:6}}>（集計除外）</span>}</div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#0369A1"}}>{fmtFull(tot)}</div>
                    <div style={S.tagCount}>{cnt}件</div>
                  </div>
                </div>
              );
            })}
            </div>
          )}
        </div>
      ):(
        <div style={{padding:"0 12px"}}>
          <div style={{background:"#F0FBFA",margin:"12px 0 8px",borderRadius:10,border:"1px solid #E8E4DC",padding:"10px 14px",display:"flex",gap:16,alignItems:"center"}}>
            <span style={{fontWeight:700,color:"#0369A1"}}>{fmtFull(tagTotal)}</span>
            <span style={{color:"#999",fontSize:12}}>{tagRecords.length}件</span>
          </div>
          {tagRecords.map(r=>(
            <div key={r.id} style={S.searchResult} onClick={()=>onEdit(r)}>
              <div style={{fontSize:12,color:"#999",marginBottom:2}}>📅 {r.purchaseDate} ／ {storeName(r.storeId,stores)}</div>
              {r.items.map((item,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:14}}>
                  <span>{item.name}</span><span style={{fontWeight:600}}>{fmtFull(item.price)}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
      )}
    </>
  );
}

// ══════════════════════════════════════════════════════════════
// 設定ビュー
// ══════════════════════════════════════════════════════════════
function SettingsView({stores,setStores,records,productMaster,setProductMaster,payMethods,setPayMethods,settings,setSettings,holidays,setHolidays,onExport,onImport,showToast}) {
  const [page,setPage]=useState("top");
  const fileRef=useRef();
  const [showPay,setShowPay]=useState(false);
  const [showHoli,setShowHoli]=useState(false);
  const [newPayName,setNewPayName]=useState("");
  const [newHoliDate,setNewHoliDate]=useState("");
  const [newHoliName,setNewHoliName]=useState("");
  const totalAmt=records.reduce((a,r)=>a+recordTotal(r),0);
  if (page==="stores")   return <StoreManagerView   stores={stores}   setStores={setStores}   records={records}         onBack={()=>setPage("top")} showToast={showToast}/>;
  if (page==="products") return <ProductManagerView productMaster={productMaster} setProductMaster={setProductMaster}   onBack={()=>setPage("top")} showToast={showToast}/>;
  const customEntries=Object.entries(holidays).sort((a,b)=>a[0].localeCompare(b[0]));
  const addPay=()=>{ if(!newPayName.trim()) return; setPayMethods(prev=>[...prev,{id:"pm"+Date.now(),name:newPayName.trim(),type:"other",active:true}]); setNewPayName(""); showToast("追加しました"); };
  const addHoli=()=>{ if(!newHoliDate||!newHoliName.trim()) return; setHolidays(prev=>({...prev,[newHoliDate]:newHoliName.trim()})); setNewHoliDate(""); setNewHoliName(""); showToast("祝日を追加しました"); };
  const removeHoli=(date)=>{ setHolidays(prev=>{ const n={...prev}; delete n[date]; return n; }); showToast("削除しました"); };
  return (
    <>
      <div style={S.header}><span style={S.title}>設定</span></div>
      <div style={S.sectionHead}>マスター管理</div>
      <button style={S.actionBtn()} onClick={()=>setPage("stores")}><span>🏪 店名管理</span><span style={S.settingValue}>{stores.length}件 ›</span></button>
      <button style={S.actionBtn()} onClick={()=>setPage("products")}><span>📦 商品管理</span><span style={S.settingValue}>{productMaster.length}件 ›</span></button>
      <div style={S.sectionHead}>DATA</div>
      <div style={S.settingRow}><span style={S.settingLabel}>総記録件数</span><span style={S.settingValue}>{records.length}件</span></div>
      <div style={S.settingRow}><span style={S.settingLabel}>総支出額</span><span style={{...S.settingValue,color:"#0369A1",fontWeight:700}}>{fmtFull(totalAmt)}</span></div>
      <div style={S.sectionHead}>バックアップ</div>
      <button style={S.actionBtn()} onClick={onExport}><span>📤 JSONエクスポート</span><span style={{fontSize:12,color:"#999"}}>全データを保存</span></button>
      <button style={S.actionBtn()} onClick={()=>fileRef.current.click()}><span>📥 JSONインポート</span><span style={{fontSize:12,color:"#999"}}>バックアップから復元</span></button>
      <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={e=>{ const f=e.target.files[0]; if(!f) return; importJSON(f,onImport,err=>showToast("読込エラー: "+err)); e.target.value=""; }}/>
      <div style={{padding:"8px 16px 4px",fontSize:11,color:"#BBB",lineHeight:1.6}}>インポートすると現在のデータは上書きされます。事前にエクスポートを推奨します。</div>
      <div style={S.sectionHead}>支払方法</div>
      <button style={S.actionBtn()} onClick={()=>setShowPay(v=>!v)}><span>💳 支払方法マスター</span><span style={S.settingValue}>{showPay?"▲":"▼"} {payMethods.length}件</span></button>
      {showPay&&(<div style={{background:"#fff",padding:"8px 16px 16px"}}>
        {payMethods.map(p=>(<div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #F0EBE0"}}>
          <div style={{fontSize:14,color:p.active?"#2C2C2C":"#BBB"}}>{p.name}<span style={{fontSize:11,color:"#999",marginLeft:6}}>({p.type})</span></div>
          <button style={{background:"none",border:"1px solid #DDD",borderRadius:6,padding:"3px 8px",fontSize:12,cursor:"pointer",color:"#888"}} onClick={()=>setPayMethods(prev=>prev.map(x=>x.id===p.id?{...x,active:!x.active}:x))}>{p.active?"無効化":"有効化"}</button>
        </div>))}
        <div style={{marginTop:12,display:"flex",gap:6}}>
          <input style={{...S.input,flex:1}} placeholder="支払方法名（例：PayPay）" value={newPayName} onChange={e=>setNewPayName(e.target.value)}/>
          <button style={{background:"#0369A1",color:"#fff",border:"none",borderRadius:8,padding:"0 12px",cursor:"pointer",fontSize:14}} onClick={addPay}>追加</button>
        </div>
      </div>)}
      <div style={S.sectionHead}>祝日管理</div>
      <button style={S.actionBtn()} onClick={()=>setShowHoli(v=>!v)}><span>🎌 祝日マスター</span><span style={S.settingValue}>{showHoli?"▲":"▼"} カスタム{customEntries.length}件</span></button>
      {showHoli&&(<div style={{background:"#fff",padding:"8px 16px 16px"}}>
        <div style={{fontSize:11,color:"#999",marginBottom:8}}>2010〜2030年は組み込み済みです。追加・修正が必要な場合のみ入力してください。同じ日付を登録すると上書きされます。</div>
        {customEntries.length===0&&<div style={{color:"#CCC",fontSize:13,padding:"8px 0"}}>カスタム祝日なし</div>}
        {customEntries.map(([date,name])=>(<div key={date} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #F0EBE0"}}>
          <div><span style={{fontSize:13,fontWeight:700,color:"#C0392B"}}>{date}</span><span style={{fontSize:13,marginLeft:8}}>{name}</span></div>
          <button style={{background:"none",border:"1px solid #E74C3C",borderRadius:6,padding:"2px 8px",fontSize:12,cursor:"pointer",color:"#E74C3C"}} onClick={()=>removeHoli(date)}>削除</button>
        </div>))}
        <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:6}}>
          <div style={{display:"flex",gap:6}}>
            <input style={{...S.input,flex:1}} type="date" value={newHoliDate} onChange={e=>setNewHoliDate(e.target.value)}/>
            <input style={{...S.input,flex:1.5}} placeholder="祝日名" value={newHoliName} onChange={e=>setNewHoliName(e.target.value)}/>
          </div>
          <button style={{background:"#0369A1",color:"#fff",border:"none",borderRadius:8,padding:"10px",cursor:"pointer",fontSize:14,fontWeight:600}} onClick={addHoli}>追加・上書き</button>
        </div>
      </div>)}
      <div style={S.sectionHead}>ABOUT</div>
      <div style={S.settingRow}><span style={S.settingLabel}>{APP_NAME}</span><span style={S.settingValue}>Ver {DATA_VERSION}</span></div>
      <div style={{padding:"12px 16px 20px",fontSize:12,color:"#BBB",lineHeight:1.8,textAlign:"center"}}>生活を振り返るための<br/>カレンダー型家計簿</div>
    </>
  );
}

// ══════════════════════════════════════════════════════════════
// 店名管理ページ
// ══════════════════════════════════════════════════════════════
function StoreManagerView({stores,setStores,records,onBack,showToast}) {
  const [editId,setEditId]=useState(null);
  const [newGroup,setNewGroup]=useState(""); const [newBranch,setNewBranch]=useState("");
  const [editGroup,setEditGroup]=useState(""); const [editBranch,setEditBranch]=useState("");
  const usedIds=new Set(records.map(r=>r.storeId));
  const addStore=()=>{ if(!newGroup.trim()) return; setStores(prev=>[...prev,{id:"s"+Date.now(),group:newGroup.trim(),branch:newBranch.trim(),closed:false}]); setNewGroup(""); setNewBranch(""); showToast("追加しました"); };
  const startEdit=(s)=>{ setEditId(s.id); setEditGroup(s.group); setEditBranch(s.branch||""); };
  const saveEdit=(s)=>{ if(!editGroup.trim()) return; setStores(prev=>prev.map(x=>x.id===s.id?{...x,group:editGroup.trim(),branch:editBranch.trim()}:x)); setEditId(null); showToast("更新しました"); };
  const deleteStore=(id)=>{ if(usedIds.has(id)){showToast("使用中のお店は削除できません");return;} setStores(prev=>prev.filter(x=>x.id!==id)); showToast("削除しました"); };
  return (
    <>
      <div style={S.subHeader}>
        <button style={S.subBackBtn} onClick={onBack}>‹ 設定へ戻る</button>
        <span style={S.subHeaderTitle}>店名管理</span>
        <span style={S.subHeaderCount}>{stores.length}件</span>
      </div>
      <div style={{background:"#fff",padding:"12px 16px",borderBottom:"1px solid #E8EDF2"}}>
        <div style={{fontSize:12,color:"#94A3B8",marginBottom:8}}>新規追加</div>
        <div style={{display:"flex",gap:6,marginBottom:8}}>
          <input style={{...S.input,flex:2}} placeholder="店名（例：コメダ珈琲）" value={newGroup} onChange={e=>setNewGroup(e.target.value)}/>
          <input style={{...S.input,flex:1.5}} placeholder="支店名（任意）" value={newBranch} onChange={e=>setNewBranch(e.target.value)}/>
        </div>
        <button style={{...S.saveBtn,marginTop:0,padding:"10px"}} onClick={addStore}>追加</button>
      </div>
      <div style={{paddingBottom:90}}>
        {stores.length===0&&<div style={{textAlign:"center",padding:"40px",color:"#C0C8D2",fontSize:14}}>お店が登録されていません</div>}
        {stores.map(s=>(<div key={s.id} style={{background:"#fff",borderBottom:"1px solid #F3F4F6",padding:"12px 16px"}}>
          {editId===s.id ? (
            <div>
              <div style={{display:"flex",gap:6,marginBottom:8}}>
                <input style={{...S.input,flex:2}} value={editGroup} onChange={e=>setEditGroup(e.target.value)}/>
                <input style={{...S.input,flex:1.5}} placeholder="支店名" value={editBranch} onChange={e=>setEditBranch(e.target.value)}/>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button style={{flex:1,background:"#0369A1",color:"#fff",border:"none",borderRadius:8,padding:"8px",cursor:"pointer",fontSize:13,fontWeight:600}} onClick={()=>saveEdit(s)}>保存</button>
                <button style={{flex:1,background:"#fff",color:"#64748B",border:"1px solid #DDD",borderRadius:8,padding:"8px",cursor:"pointer",fontSize:13}} onClick={()=>setEditId(null)}>キャンセル</button>
              </div>
            </div>
          ) : (
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:600,color:s.closed?"#94A3B8":"#1E293B"}}>{s.group}{s.branch?` ${s.branch}`:""}{s.closed&&<span style={{fontSize:11,color:"#E74C3C",marginLeft:6}}>閉店</span>}</div>
                {usedIds.has(s.id)&&<div style={{fontSize:11,color:"#94A3B8",marginTop:2}}>利用あり</div>}
              </div>
              <button style={{background:"none",border:"1px solid #DDD",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer",color:"#64748B"}} onClick={()=>startEdit(s)}>編集</button>
              <button style={{background:"none",border:"1px solid #DDD",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer",color:"#64748B"}} onClick={()=>setStores(prev=>prev.map(x=>x.id===s.id?{...x,closed:!x.closed}:x))}>{s.closed?"再開":"閉店"}</button>
              {!usedIds.has(s.id)&&<button style={{background:"none",border:"1px solid #E74C3C",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer",color:"#E74C3C"}} onClick={()=>deleteStore(s.id)}>削除</button>}
            </div>
          )}
        </div>))}
      </div>
    </>
  );
}

// ══════════════════════════════════════════════════════════════
// 商品管理ページ
// ══════════════════════════════════════════════════════════════
function ProductManagerView({productMaster,setProductMaster,onBack,showToast}) {
  const UNITS=["g","kg","ml","L","本","袋","枚","個","冊","着","足","組","台","式"];
  const [editId,setEditId]=useState(null);
  const [form,setForm]=useState({maker:"",name:"",volume:"",unit:"",janCode:""});
  const [editForm,setEditForm]=useState({});
  const addProduct=()=>{ if(!form.name.trim()){showToast("商品名は必須です");return;} setProductMaster(prev=>[...prev,{id:"p"+Date.now(),maker:form.maker.trim(),name:form.name.trim(),volume:form.volume,unit:form.unit,janCode:form.janCode.trim(),createdAt:nowISO(),mergedInto:null}]); setForm({maker:"",name:"",volume:"",unit:"",janCode:""}); showToast("追加しました"); };
  const startEdit=(p)=>{ setEditId(p.id); setEditForm({maker:p.maker||"",name:p.name,volume:p.volume||"",unit:p.unit||"",janCode:p.janCode||""}); };
  const saveEdit=(p)=>{ if(!editForm.name.trim()) return; setProductMaster(prev=>prev.map(x=>x.id===p.id?{...x,...editForm,name:editForm.name.trim(),maker:(editForm.maker||"").trim()}:x)); setEditId(null); showToast("更新しました"); };
  const deleteProduct=(id)=>{ setProductMaster(prev=>prev.filter(x=>x.id!==id)); showToast("削除しました"); };
  const sorted=[...productMaster].sort((a,b)=>a.name.localeCompare(b.name,"ja"));
  const Fields=({f,onChange})=>(<div>
    <div style={{display:"flex",gap:6,marginBottom:6}}>
      <input style={{...S.input,flex:1}} placeholder="メーカー（任意）" value={f.maker} onChange={e=>onChange({...f,maker:e.target.value})}/>
      <input style={{...S.input,flex:2}} placeholder="商品名（必須）★" value={f.name} onChange={e=>onChange({...f,name:e.target.value})}/>
    </div>
    <div style={{display:"flex",gap:6}}>
      <input style={{...S.input,flex:1}} placeholder="内容量" type="number" value={f.volume} onChange={e=>onChange({...f,volume:e.target.value})}/>
      <select style={{...S.select,flex:1}} value={f.unit} onChange={e=>onChange({...f,unit:e.target.value})}><option value="">単位</option>{UNITS.map(u=><option key={u} value={u}>{u}</option>)}</select>
      <input style={{...S.input,flex:1.5}} placeholder="JANコード（将来用）" value={f.janCode} onChange={e=>onChange({...f,janCode:e.target.value})}/>
    </div>
  </div>);
  return (
    <>
      <div style={S.subHeader}>
        <button style={S.subBackBtn} onClick={onBack}>‹ 設定へ戻る</button>
        <span style={S.subHeaderTitle}>商品管理</span>
        <span style={S.subHeaderCount}>{productMaster.length}件</span>
      </div>
      <div style={{background:"#fff",padding:"12px 16px",borderBottom:"1px solid #E8EDF2"}}>
        <div style={{fontSize:12,color:"#94A3B8",marginBottom:8}}>新規追加</div>
        <Fields f={form} onChange={setForm}/>
        <button style={{...S.saveBtn,marginTop:10,padding:"10px"}} onClick={addProduct}>追加</button>
      </div>
      <div style={{paddingBottom:90}}>
        {sorted.length===0&&<div style={{textAlign:"center",padding:"40px",color:"#C0C8D2",fontSize:14}}>商品が登録されていません</div>}
        {sorted.map(p=>(<div key={p.id} style={{background:"#fff",borderBottom:"1px solid #F3F4F6",padding:"12px 16px"}}>
          {editId===p.id ? (
            <div>
              <Fields f={editForm} onChange={setEditForm}/>
              <div style={{display:"flex",gap:6,marginTop:8}}>
                <button style={{flex:1,background:"#0369A1",color:"#fff",border:"none",borderRadius:8,padding:"8px",cursor:"pointer",fontSize:13,fontWeight:600}} onClick={()=>saveEdit(p)}>保存</button>
                <button style={{flex:1,background:"#fff",color:"#64748B",border:"1px solid #DDD",borderRadius:8,padding:"8px",cursor:"pointer",fontSize:13}} onClick={()=>setEditId(null)}>キャンセル</button>
              </div>
            </div>
          ) : (
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:600,color:"#1E293B"}}>{p.name}</div>
                <div style={{fontSize:12,color:"#64748B",marginTop:2}}>{p.maker&&<span style={{marginRight:8}}>{p.maker}</span>}{p.volume&&<span>{p.volume}{p.unit||""}</span>}</div>
              </div>
              <button style={{background:"none",border:"1px solid #DDD",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer",color:"#64748B"}} onClick={()=>startEdit(p)}>編集</button>
              <button style={{background:"none",border:"1px solid #E74C3C",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer",color:"#E74C3C"}} onClick={()=>deleteProduct(p.id)}>削除</button>
            </div>
          )}
        </div>))}
      </div>
    </>
  );
}
