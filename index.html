// ══════════════════════════════════════════════════════════════
// バックアップ・復元ロジック
// ══════════════════════════════════════════════════════════════
const RESTORE_TRIGGERS = ["復元", "ふくげん", "フクゲン"];
function isValidRestoreTrigger(text) {
  const t = (text || "").trim();
  return RESTORE_TRIGGERS.includes(t) || t.toLowerCase() === "fukugen";
}

async function collectAllImageIds(items, receipts) {
  const ids = new Set();
  receipts.forEach(r => (r.images || []).forEach(id => ids.add(id)));
  items.forEach(it => (it.attachments || []).forEach(id => ids.add(id)));
  return [...ids];
}

async function buildBackupPayload(items, receipts, tags, places, settings, dayNotes) {
  const imageIds = await collectAllImageIds(items, receipts);
  const images = [];
  for (const id of imageIds) {
    const dataUrl = await idbGet(id).catch(() => null);
    if (dataUrl) images.push({ id, dataUrl });
  }
  return { version: DATA_VERSION, exportedAt: nowISO(), items, receipts, tags, places, settings, dayNotes: dayNotes||{}, images };
}

async function writeBackupFile(payload) {
  const dateStr = todayStr().replace(/-/g, "");
  const base = `${dateStr}_ともたろぐ_最新`;
  let JSZipLib = null;
  try { JSZipLib = await loadJSZip(); } catch {}
  if (JSZipLib) {
    const zip = new JSZipLib();
    zip.file("tomotalog_backup.json", JSON.stringify(payload));
    const blob = await zip.generateAsync({ type: "blob" });
    downloadBlob(blob, base + ".zip");
  } else {
    const blob = new Blob([JSON.stringify(payload)], { type: "application/json" });
    downloadBlob(blob, base + ".json");
  }
}

async function rotateInternalSnapshot(payload) {
  const prevLatest = await idbGet("backup:latest").catch(() => null);
  if (prevLatest) await idbSet("backup:prev", prevLatest);
  await idbSet("backup:latest", payload);
}

async function parseBackupFile(file) {
  let payload;
  if (file.name.toLowerCase().endsWith(".zip")) {
    const JSZipLib = await loadJSZip();
    const zip = await JSZipLib.loadAsync(file);
    const jsonFile = zip.file("tomotalog_backup.json") || zip.file(Object.keys(zip.files).find(n => n.endsWith(".json")));
    if (!jsonFile) throw new Error("バックアップ形式が不正です（jsonが見つかりません）");
    payload = JSON.parse(await jsonFile.async("string"));
  } else {
    const text = await file.text();
    payload = JSON.parse(text);
  }
  if (!payload || !Array.isArray(payload.items) || !Array.isArray(payload.receipts)) {
    throw new Error("バックアップの内容を読み取れませんでした");
  }
  return payload;
}

// ══════════════════════════════════════════════════════════════
// 設定画面
// ══════════════════════════════════════════════════════════════
function SettingsView({ items, receipts, tags, places, settings, setSettings, dayNotes, applyRestoredData, showToast }) {
  const [newPay, setNewPay] = useState("");
  const [lastBackupAt, setLastBackupAt] = useState(null);
  const [restoreStep, setRestoreStep] = useState(0); // 0=none 1=file選択済み確認 2=確認文字列入力
  const [restoreFile, setRestoreFile] = useState(null);
  const [restoreText, setRestoreText] = useState("");
  const [busy, setBusy] = useState(false);
  const fileInputRef = useRef();

  useEffect(() => {
    idbGet("backup:latest").then(v => { if (v?.exportedAt) setLastBackupAt(v.exportedAt); }).catch(()=>{});
  }, []);

  const addPay = () => {
    const v = newPay.trim();
    if (!v || settings.payMethods.includes(v)) return;
    setSettings(prev => ({ ...prev, payMethods: [...prev.payMethods, v] }));
    setNewPay("");
  };
  const removePay = (p) => setSettings(prev => ({ ...prev, payMethods: prev.payMethods.filter(x=>x!==p) }));

  const doBackup = async () => {
    setBusy(true);
    try {
      const payload = await buildBackupPayload(items, receipts, tags, places, settings, dayNotes);
      await rotateInternalSnapshot(payload);
      await writeBackupFile(payload);
      setLastBackupAt(payload.exportedAt);
      showToast("バックアップを作成しました");
    } catch (e) {
      showToast("バックアップに失敗しました");
    } finally { setBusy(false); }
  };

  const onPickRestoreFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setRestoreFile(file);
    setRestoreStep(1);
  };

  const confirmRestoreStep1 = () => { setRestoreStep(2); };
  const cancelRestore = () => { setRestoreStep(0); setRestoreFile(null); setRestoreText(""); if (fileInputRef.current) fileInputRef.current.value=""; };

  const doRestore = async () => {
    if (!isValidRestoreTrigger(restoreText)) { showToast("確認文字列が一致しません"); return; }
    setBusy(true);
    try {
      const payload = await parseBackupFile(restoreFile); // 検証まで完了するまで何も書き換えない
      const currentSnapshot = await buildBackupPayload(items, receipts, tags, places, settings, dayNotes);
      await rotateInternalSnapshot(currentSnapshot); // 復元前の自動バックアップ
      for (const img of (payload.images || [])) { await idbSet(img.id, img.dataUrl); }
      applyRestoredData(payload); // ここで初めてlocalStorage状態を書き換える
      showToast("復元しました");
      cancelRestore();
    } catch (e) {
      showToast("復元に失敗しました（データは変更されていません）");
    } finally { setBusy(false); }
  };

  return (
    <div style={{ padding:"14px 16px 110px" }}>
      <div style={{ fontSize:12, fontWeight:700, color:C.textSecondary, marginBottom:8 }}>場所マスター</div>
      <div style={UI.cardFloat({ padding:"12px 14px", marginBottom:22, fontSize:12.5, color:C.textSecondary })}>
        店名・場所の登録や編集は、メニューの「場所図鑑」から行えます。現在 {places.length} 件登録されています。
      </div>

      <div style={{ fontSize:12, fontWeight:700, color:C.textSecondary, marginBottom:8 }}>支払方法</div>
      <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:10 }}>
        {settings.payMethods.map(p => (
          <span key={p} style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"6px 12px", borderRadius:99, background:C.card, fontSize:12.5, color:C.textPrimary, boxShadow:`0 1px 3px ${C.shadowCard}`, border:`1px solid ${C.border}` }}>
            {p} <button onClick={()=>removePay(p)} style={{ background:"none", border:"none", color:C.textFaint, cursor:"pointer", fontSize:12 }}>×</button>
          </span>
        ))}
        {settings.payMethods.length === 0 && <span style={{ fontSize:12.5, color:C.textFaint }}>まだ登録がありません</span>}
      </div>
      <div style={{ display:"flex", gap:8, marginBottom:26 }}>
        <input value={newPay} onChange={e=>setNewPay(e.target.value)} placeholder="例：クレジットカード" style={{ flex:1, padding:"9px 12px", borderRadius:10, border:`1px solid ${C.border}`, fontSize:13.5, background:"#fff" }} />
        <button onClick={addPay} style={{ background:C.accentDeep, color:"#fff", border:"none", borderRadius:10, padding:"0 16px", fontSize:13.5, fontWeight:700, cursor:"pointer" }}>追加</button>
      </div>

      <div style={{ fontSize:12, fontWeight:700, color:C.textSecondary, marginBottom:8 }}>バックアップ・復元</div>
      <div style={UI.cardFloat({ padding:"14px 16px", marginBottom:26 })}>
        <div style={{ fontSize:12.5, color:C.textSecondary, marginBottom:10 }}>
          {lastBackupAt ? `最終バックアップ：${new Date(lastBackupAt).toLocaleString("ja-JP")}` : "まだバックアップがありません"}
        </div>
        <button onClick={doBackup} disabled={busy} style={{ width:"100%", padding:"12px 0", borderRadius:10, border:"none", background:C.accentDeep, color:"#fff", fontSize:14, fontWeight:700, cursor:"pointer", marginBottom:10, opacity:busy?0.6:1 }}>バックアップを作成（ZIP/JSON）</button>

        {restoreStep === 0 && (
          <label style={{ display:"block", width:"100%", padding:"12px 0", borderRadius:10, border:`1px solid ${C.border}`, color:C.textSecondary, fontSize:14, fontWeight:700, textAlign:"center", cursor:"pointer" }}>
            バックアップから復元
            <input ref={fileInputRef} type="file" accept=".zip,.json" onChange={onPickRestoreFile} style={{ display:"none" }} />
          </label>
        )}
        {restoreStep === 1 && (
          <div style={{ padding:"12px", borderRadius:10, background:C.dangerBg }}>
            <div style={{ fontSize:13, color:C.danger, fontWeight:700, marginBottom:10 }}>本当に復元しますか？現在のデータは上書きされます（復元前に自動でバックアップを作成します）</div>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={cancelRestore} style={{ flex:1, padding:"10px 0", borderRadius:9, border:`1px solid ${C.border}`, background:"#fff", fontSize:13, cursor:"pointer" }}>キャンセル</button>
              <button onClick={confirmRestoreStep1} style={{ flex:1, padding:"10px 0", borderRadius:9, border:"none", background:C.danger, color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer" }}>次へ</button>
            </div>
          </div>
        )}
        {restoreStep === 2 && (
          <div style={{ padding:"12px", borderRadius:10, background:C.dangerBg }}>
            <div style={{ fontSize:13, color:C.danger, fontWeight:700, marginBottom:8 }}>確認のため「復元」と入力してください</div>
            <input value={restoreText} onChange={e=>setRestoreText(e.target.value)} placeholder="復元 / ふくげん / フクゲン / fukugen"
              style={{ width:"100%", padding:"10px 12px", borderRadius:9, border:`1px solid ${C.border}`, fontSize:14, marginBottom:10, background:"#fff" }} />
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={cancelRestore} style={{ flex:1, padding:"10px 0", borderRadius:9, border:`1px solid ${C.border}`, background:"#fff", fontSize:13, cursor:"pointer" }}>キャンセル</button>
              <button onClick={doRestore} disabled={!isValidRestoreTrigger(restoreText)||busy} style={{ flex:1, padding:"10px 0", borderRadius:9, border:"none", background:C.danger, color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer", opacity:(!isValidRestoreTrigger(restoreText)||busy)?0.4:1 }}>復元を実行</button>
            </div>
          </div>
        )}
      </div>

      <div style={{ fontSize:12, fontWeight:700, color:C.textSecondary, marginBottom:8 }}>このアプリについて</div>
      <div style={UI.cardFloat({ padding:"4px 14px", marginBottom:8 })}>
        <div style={{ display:"flex", justifyContent:"space-between", padding:"12px 0" }}>
          <span style={{ fontSize:14, color:C.textPrimary, fontWeight:600 }}>{APP_NAME}</span>
          <span style={{ fontSize:13, color:C.textSecondary }}>Ver {DATA_VERSION}</span>
        </div>
      </div>
      <div style={{ padding:"12px 16px 20px", fontSize:12, color:C.textFaint, lineHeight:1.8, textAlign:"center" }}>
        生活を振り返るための、カレンダー型の生活ログ<br/>関数よりPivotが好きだった。
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// App ルート
// ══════════════════════════════════════════════════════════════
function App() {
  const [items, setItems] = useState(() => loadLS(LS_KEYS.items, []));
  const [receipts, setReceipts] = useState(() => loadLS(LS_KEYS.receipts, []));
  const [tags, setTags] = useState(() => {
    const saved = loadLS(LS_KEYS.tags, null);
    if (saved && saved.length) return saved;
    const init = DEFAULT_TAGS();
    saveLS(LS_KEYS.tags, init);
    return init;
  });
  const [places, setPlaces] = useState(() => loadLS(LS_KEYS.places, DEFAULT_PLACES));
  const [settings, setSettings] = useState(() => loadLS(LS_KEYS.settings, DEFAULT_SETTINGS));
  const [dayNotes, setDayNotes] = useState(() => loadLS(LS_KEYS.dayNotes, {}));

  useEffect(() => saveLS(LS_KEYS.items, items), [items]);
  useEffect(() => saveLS(LS_KEYS.receipts, receipts), [receipts]);
  useEffect(() => saveLS(LS_KEYS.tags, tags), [tags]);
  useEffect(() => saveLS(LS_KEYS.places, places), [places]);
  useEffect(() => saveLS(LS_KEYS.settings, settings), [settings]);
  useEffect(() => saveLS(LS_KEYS.dayNotes, dayNotes), [dayNotes]);
  const saveDayNote = (date, text) => setDayNotes(prev => ({ ...prev, [date]: text }));

  const [tab, setTab] = useState("calendar");
  const [menuOpen, setMenuOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); };

  const [selectedDate, setSelectedDate] = useState(null);
  const [quickAddOpen, setQuickAddOpen] = useState(false);
  const [quickAddDate, setQuickAddDate] = useState(null);
  const [editingId, setEditingId] = useState(null);
  const [justEditedId, setJustEditedId] = useState(null);
  const [placeDetailId, setPlaceDetailId] = useState(null);
  const [placeAddOpen, setPlaceAddOpen] = useState(false);
  const [tagAddOpen, setTagAddOpen] = useState(false);

  const [searchQuery, setSearchQuery] = useState("");
  const [searchMode, setSearchMode] = useState("item");

  const warnCount = items.filter(it => (it.tags||[]).includes("tag_needcheck")).length;

  const openEdit = (itemId) => setEditingId(itemId);
  const closeEdit = () => { setJustEditedId(editingId); setEditingId(null); setTimeout(() => setJustEditedId(null), 1400); };

  const openQuickAdd = (date) => { setQuickAddDate(date || null); setQuickAddOpen(true); };
  const closeQuickAdd = () => { setQuickAddOpen(false); setQuickAddDate(null); };

  // ── 場所マスター ──────────────────────────
  const createPlace = ({ category, brand, place }) => {
    const p = makePlace({ category, brand, place });
    setPlaces(prev => [...prev, p]);
    return p;
  };
  const updatePlace = (id, patch) => setPlaces(prev => prev.map(p => p.id === id ? { ...p, ...patch } : p));
  const touchPlaceUsage = (placeId) => { if (placeId) setPlaces(prev => prev.map(p => p.id === placeId ? { ...p, lastUsedAt: Date.now() } : p)); };

  // ── タグマスター（＋ボタンからの主役追加用） ──────────────
  const createTag = (name, kind) => {
    const trimmed = (name||"").trim();
    if (!trimmed) return false;
    if (tags.some(t => t.name === trimmed)) { showToast("同名のタグが既にあります"); return false; }
    setTags(prev => [...prev, { id: uid(kind==="category"?"cat":"tag"), name:trimmed, kind, isSystem:false }]);
    showToast("追加しました");
    return true;
  };

  const addItemToReceipt = async ({ receiptId, name, amount, placeId, date, time, photoFile }) => {
    let rid = receiptId;
    if (!rid) {
      rid = uid("rc");
      setReceipts(prev => [...prev, { id: rid, date, time: time||null, placeId, payMethod: "", images: [], createdAt: Date.now() }]);
    }
    if (photoFile) {
      const dataUrl = await fileToDataURL(photoFile);
      const imgId = uid("img");
      await idbSet(imgId, dataUrl);
      setReceipts(prev => prev.map(r => r.id === rid ? { ...r, images: [...(r.images||[]), imgId] } : r));
    }
    const seq = items.filter(it => it.receiptId === rid).length + 1;
    const newItem = {
      id: uid("it"), receiptId: rid, seq, name, amount, placeId,
      payMethod: "", tags: ["tag_needcheck"], memo: "", attachments: [],
      purchaseDate: date, purchaseTime: time||null, createdAt: Date.now(), updatedAt: Date.now(),
    };
    setItems(prev => [...prev, newItem]);
    touchPlaceUsage(placeId);
    showToast("保存しました（要確認）");
    return rid;
  };

  const updateItem = (id, patch) => {
    setItems(prev => prev.map(it => it.id === id ? { ...it, ...patch, updatedAt: Date.now() } : it));
    if (patch.placeId) touchPlaceUsage(patch.placeId);
  };

  const deleteItem = (id) => {
    const it = items.find(i => i.id === id);
    if (it) (it.attachments||[]).forEach(imgId => idbDelete(imgId));
    const stillUsed = items.some(i => i.id !== id && i.receiptId === it?.receiptId);
    if (it && !stillUsed) {
      const r = receipts.find(r => r.id === it.receiptId);
      (r?.images||[]).forEach(imgId => idbDelete(imgId));
      setReceipts(prev => prev.filter(r => r.id !== it.receiptId));
    }
    setItems(prev => prev.filter(i => i.id !== id));
    showToast("削除しました");
  };

  const duplicateItem = (id) => {
    const src = items.find(i => i.id === id);
    if (!src) return;
    const newReceiptId = uid("rc");
    setReceipts(prev => [...prev, { id: newReceiptId, date: todayStr(), placeId: src.placeId, payMethod: src.payMethod, images: [], createdAt: Date.now() }]);
    const newItem = { ...src, id: uid("it"), receiptId: newReceiptId, seq: 1, purchaseDate: todayStr(),
      tags: [...new Set([...(src.tags||[]), "tag_copyunchecked"])], attachments: [], createdAt: Date.now(), updatedAt: Date.now() };
    setItems(prev => [...prev, newItem]);
    touchPlaceUsage(src.placeId);
    showToast("複写しました。内容を確認してください");
    setEditingId(newItem.id);
  };

  const updateReceipt = (receiptId, patch) => setReceipts(prev => prev.map(r => r.id === receiptId ? { ...r, ...patch } : r));
  const addReceiptImage = (receiptId, imgId) => setReceipts(prev => prev.map(r => r.id === receiptId ? { ...r, images: [...(r.images||[]), imgId] } : r));
  const removeReceiptImage = (receiptId, imgId) => { setReceipts(prev => prev.map(r => r.id === receiptId ? { ...r, images:(r.images||[]).filter(x=>x!==imgId) } : r)); idbDelete(imgId); };
  const addItemAttachment = (itemId, imgId) => setItems(prev => prev.map(it => it.id === itemId ? { ...it, attachments:[...(it.attachments||[]), imgId] } : it));
  const removeItemAttachment = (itemId, imgId) => setItems(prev => prev.map(it => it.id === itemId ? { ...it, attachments:(it.attachments||[]).filter(x=>x!==imgId) } : it));

  const applyRestoredData = (payload) => {
    setItems(payload.items || []);
    setReceipts(payload.receipts || []);
    setTags(payload.tags?.length ? payload.tags : DEFAULT_TAGS());
    setPlaces(payload.places?.length ? payload.places : DEFAULT_PLACES);
    setSettings(payload.settings || DEFAULT_SETTINGS);
    setDayNotes(payload.dayNotes || {});
  };

  const openDateFromPlace = (date) => { setPlaceDetailId(null); setSelectedDate(date); };

  // ハンバーガーメニューからの遷移
  const handleMenuNavigate = (item) => {
    if (item.future) return;
    setMenuOpen(false);
    if (item.key === "living") { setSelectedDate(todayStr()); return; }
    if (item.key === "genkan") { setTab("calendar"); return; }
    if (item.key === "search") { setTab("search"); return; }
    if (item.key === "places") { setTab("places"); return; }
    if (item.key === "tags") { setTab("tags"); return; }
    if (item.tab) { setTab(item.tab); return; }
  };

  return (
    <div style={{ maxWidth:430, margin:"0 auto", minHeight:"100vh", background:C.bg, position:"relative", color:C.textPrimary }}>
      <TopHeader warnCount={warnCount} />

      {tab === "calendar" && <CalendarView items={items} receipts={receipts} places={places} onSelectDate={setSelectedDate} />}
      {tab === "search" && (
        <SearchView items={items} receipts={receipts} tags={tags} places={places}
          query={searchQuery} setQuery={setSearchQuery} mode={searchMode} setMode={setSearchMode}
          onOpenItem={openEdit} justEditedId={justEditedId} />
      )}
      {tab === "tags" && <TagsView tags={tags} setTags={setTags} items={items} setItems={setItems} showToast={showToast} />}
      {tab === "places" && (
        <PlacesView places={places} items={items} onOpenPlace={setPlaceDetailId} onAddPlace={() => setPlaceAddOpen(true)} />
      )}
      {tab === "settings" && (
        <SettingsView items={items} receipts={receipts} tags={tags} places={places} dayNotes={dayNotes}
          settings={settings} setSettings={setSettings} applyRestoredData={applyRestoredData} showToast={showToast} />
      )}

      {tab !== "settings" && (
        <FAB onClick={() => {
          if (tab === "places") setPlaceAddOpen(true);
          else if (tab === "tags") setTagAddOpen(true);
          else openQuickAdd(null); // カレンダー・検索：記録追加が主役
        }} />
      )}
      <HamburgerButton active={menuOpen} onClick={() => setMenuOpen(o=>!o)} />
      <SideMenu open={menuOpen} onClose={() => setMenuOpen(false)} onNavigate={handleMenuNavigate} warnCount={warnCount} />

      {selectedDate && (
        <DayDetailOverlay date={selectedDate} items={items} receipts={receipts} places={places}
          dayNote={dayNotes[selectedDate]} onSaveDayNote={saveDayNote}
          onClose={() => setSelectedDate(null)} onOpenItem={openEdit} justEditedId={justEditedId}
          onQuickAdd={(date) => openQuickAdd(date)} onChangeDate={setSelectedDate} />
      )}

      {quickAddOpen && (
        <QuickAddOverlay onClose={closeQuickAdd} places={places} settings={settings}
          addItemToReceipt={addItemToReceipt} createPlace={createPlace} presetDate={quickAddDate} />
      )}

      {editingId && (
        <EditOverlay itemId={editingId} items={items} receipts={receipts} tags={tags} places={places} settings={settings}
          onClose={closeEdit} updateItem={updateItem} updateReceipt={updateReceipt} deleteItem={deleteItem} duplicateItem={duplicateItem}
          addReceiptImage={addReceiptImage} removeReceiptImage={removeReceiptImage}
          addItemAttachment={addItemAttachment} removeItemAttachment={removeItemAttachment}
          createPlace={createPlace} showToast={showToast} />
      )}

      {placeDetailId && (
        <PlaceDetailOverlay placeId={placeDetailId} places={places} items={items}
          onClose={() => setPlaceDetailId(null)} updatePlace={updatePlace} onOpenDate={openDateFromPlace} />
      )}

      {placeAddOpen && (
        <PlaceAddOverlay places={places} onClose={() => setPlaceAddOpen(false)} createPlace={createPlace} />
      )}

      {tagAddOpen && (
        <TagAddOverlay onClose={() => setTagAddOpen(false)} createTag={createTag} />
      )}

      <Toast message={toast} />
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
